<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Darla — Product Lookup</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#faf8f5;min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:120px}
/* Desktop max-width centering */
.hdr,.search-wrap,.cat-grid,.results-wrap,.wrap{max-width:680px;margin-left:auto;margin-right:auto}
@media(min-width:768px){
  body{padding-bottom:80px}
  .cat-grid{grid-template-columns:1fr 1fr 1fr 1fr}
  .cat-btn{padding:24px 16px}
  .fab-btn{bottom:20px}
  .search-card{padding:24px 22px}
  .ac-input{font-size:22px;padding:14px 18px}
  .dd-item{font-size:18px;padding:13px 18px}
}
button:focus-visible,input:focus-visible{outline:2px solid #c0392b;outline-offset:2px}
.hdr{background:#ffffff;border-bottom:2px solid #c0392b;padding:22px 20px 18px;text-align:center}
.hdr-logo{width:200px;height:72px;display:block;margin:0 auto 14px;object-fit:contain;object-position:center}
.hdr-brand{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#a89890;margin-bottom:8px}
.hdr-title{font-size:34px;font-weight:900;color:#1c1612;letter-spacing:-1.5px;line-height:1;margin-bottom:6px}
.hdr-code{display:inline-block;background:#f5f2ee;border:1px solid #e0dbd3;color:#6b5e52;font-size:13px;font-weight:700;letter-spacing:2px;padding:6px 16px;border-radius:8px;margin-bottom:6px}
.staff-badge{display:none;margin-top:8px;background:rgba(39,174,96,0.10);color:#1e7d47;font-size:10px;font-weight:800;letter-spacing:1.5px;padding:5px 14px;border-radius:6px}
.wrap{padding:12px 12px 0;display:flex;flex-direction:column;gap:8px}
.card{background:#ffffff;border:1px solid #e0dbd3;border-radius:16px;padding:16px 18px;text-align:center}
.card-accent-blue{border-top:3px solid #1a6bbf}
.card-accent-red{border-top:3px solid #c0392b}
.card-mrp{background:#fff;border:none;border-radius:16px}
.lbl{font-size:30px;font-weight:300;letter-spacing:-0.5px;color:#6b5e52;text-transform:uppercase;padding-bottom:5px}
.lbl-dark{color:#a89890}
.lbl-line{width:40px;height:3px;background:#c0392b;border-radius:2px;margin:0 auto 12px}
.val{font-size:38px;font-weight:900;color:#1c1612;letter-spacing:-1.5px;line-height:1.1;word-break:break-word}
.val-sm{font-size:20px;font-weight:400;color:#6b5e52;line-height:1.5;word-break:break-word}
.mrp-row{display:flex;align-items:baseline;justify-content:center;gap:3px}
.rsym{font-size:46px;font-weight:900;color:#a89890}
.mrp-val{font-size:46px;font-weight:900;color:#000;letter-spacing:-2px;line-height:1}
.card-mrp .lbl{color:#6b5e52;font-size:30px;font-weight:300}
.card-mrp .lbl-line{background:#c0392b}
.item-group{background:#f5f2ee;border:1px solid #e0dbd3;border-radius:16px;padding:12px;display:flex;flex-direction:column;gap:8px;margin-bottom:4px}
.link-btn{display:inline-block;margin-top:8px;background:#fff;color:#000;text-decoration:none;font-size:15px;font-weight:800;padding:12px 22px;border-radius:10px}
.nf{text-align:center;padding:50px 20px}
.nf-ico{font-size:48px;margin-bottom:16px}
.nf h3{font-size:24px;font-weight:900;color:#1c1612;margin-bottom:8px}
.nf p{color:#6b5e52;font-size:16px;line-height:1.5}
.back-link{color:#c0392b;font-size:15px;font-weight:700;text-decoration:none;display:inline-block;margin-top:16px}
.spinner{text-align:center;padding:50px 20px}
.spinner-ring{width:44px;height:44px;border:4px solid #e0dbd3;border-top-color:#c0392b;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner p{color:#6b5e52;font-size:16px}
.fab-btn{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#c0392b;color:#fff;border:none;border-radius:50px;padding:14px 30px;font-size:14px;font-weight:800;letter-spacing:0.5px;box-shadow:0 4px 30px rgba(192,57,43,0.35);cursor:pointer;z-index:50;-webkit-tap-highlight-color:transparent;white-space:nowrap;text-transform:uppercase;display:none}
.search-wrap{padding:12px 12px 0}
.search-card{background:#ffffff;border:1px solid #e0dbd3;border-top:3px solid #c0392b;border-radius:16px;padding:20px 18px;margin-bottom:8px}
.field-lbl{font-size:30px;font-weight:300;color:#6b5e52;text-transform:uppercase;letter-spacing:-0.5px;padding-bottom:5px;margin-top:16px}
.field-lbl:first-child{margin-top:0}
.lbl-line-sm{width:40px;height:3px;background:#c0392b;border-radius:2px;margin:0 0 10px}
.ac-input{width:100%;background:#fff;border:2px solid #e0dbd3;border-radius:12px;color:#1c1612;font-size:26px;font-weight:700;padding:13px 16px;outline:none;-webkit-appearance:none;display:block;text-align:center}
.ac-input:focus{border-color:#c0392b}
.ac-input::placeholder{color:#c8bdb5;font-size:20px;font-weight:400}
.ac-input:disabled{background:#ede9e3;color:#a89890;border-color:#e0dbd3;cursor:not-allowed}
.autocomplete-wrap{position:relative;margin-bottom:4px}
.dropdown{display:none;position:absolute;top:100%;left:0;right:0;background:#ffffff;border:1px solid #e0dbd3;border-radius:12px;max-height:220px;overflow-y:auto;z-index:200;margin-top:4px;box-shadow:0 4px 16px rgba(0,0,0,0.08)}
.dropdown.show{display:block}
.dd-item{padding:12px 16px;font-size:22px;font-weight:600;color:#1c1612;cursor:pointer;border-bottom:1px solid #ede9e3;text-align:left}
.dd-item:last-child{border-bottom:none}
.dd-item:active{background:#c0392b;color:#fff}
.dd-item mark{background:transparent;color:#c0392b;font-weight:900}
.submit-btn{width:100%;background:#c0392b;color:#fff;border:none;border-radius:12px;padding:17px;font-size:18px;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer;display:block;margin-top:20px;box-shadow:0 4px 24px rgba(192,57,43,0.35);-webkit-tap-highlight-color:transparent}
.submit-btn:active{opacity:0.85}
.submit-btn:disabled{opacity:0.4}
.clear-btn{display:block;width:100%;margin-top:10px;background:transparent;color:#6b5e52;border:1px solid #e0dbd3;border-radius:10px;padding:13px;font-size:15px;font-weight:600;cursor:pointer}
.status{text-align:center;padding:8px 0;color:#a89890;font-size:14px}
.results-wrap{padding:0 12px;display:flex;flex-direction:column;gap:10px;margin-top:8px}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 12px 0;max-width:680px;margin-left:auto;margin-right:auto}
.cat-btn{background:#ffffff;border:1px solid #e0dbd3;border-top:3px solid #c0392b;border-radius:16px;padding:20px 12px;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.cat-btn:active{background:#f5f2ee}
.cat-ico{font-size:28px;margin-bottom:8px}
.cat-name{font-size:18px;font-weight:800;color:#1c1612;letter-spacing:-0.5px}
.ctx-hdr{background:#ffffff;border:1px solid #e0dbd3;border-top:3px solid #1a6bbf;border-radius:14px;padding:14px 16px;margin-bottom:10px}
.ctx-chips{display:flex;gap:8px;flex-wrap:wrap}
.ctx-chip{background:#f5f2ee;border:1px solid #e0dbd3;border-radius:8px;padding:5px 12px;min-width:60px}
.ctx-chip-lbl{font-size:10px;font-weight:700;color:#a89890;letter-spacing:1px;text-transform:uppercase}
.ctx-chip-val{font-size:14px;font-weight:800;color:#1c1612;margin-top:2px}
.count-badge{background:#f5f2ee;border:1px solid #e0dbd3;border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.count-txt{color:#a89890;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.count-num{color:#c0392b;font-size:15px;font-weight:800}
.tbl-wrap{background:#ffffff;border:1px solid #e0dbd3;border-radius:14px;overflow:hidden}
.tbl-head{display:grid;background:#f5f2ee;border-bottom:1px solid #e0dbd3;padding:10px 14px}
.tbl-head span{font-size:10px;font-weight:800;letter-spacing:1.5px;color:#a89890;text-transform:uppercase}
.tbl-row{display:grid;padding:12px 14px;border-bottom:1px solid #ede9e3;align-items:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tbl-row:last-of-type{border-bottom:none}
.tbl-row.open{background:#f5f2ee}
.tr-main{font-size:15px;font-weight:700;color:#1c1612;word-break:break-word}
.tr-sub{font-size:11px;color:#a89890;margin-top:2px}
.tr-mrp{font-size:15px;font-weight:900;color:#000;background:#fff;border-radius:6px;padding:4px 8px;text-align:center;display:inline-block}
.tr-arr{color:#c8bdb5;font-size:18px;text-align:right;transition:transform 0.2s}
.tbl-row.open .tr-arr{transform:rotate(90deg)}
.exp-panel{display:none;background:#faf8f5;border-bottom:1px solid #e0dbd3;padding:12px 14px}
.exp-panel.show{display:block}
.exp-line{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid #ede9e3}
.exp-line:last-child{border-bottom:none}
.exp-lbl{font-size:11px;color:#a89890;font-weight:700;letter-spacing:1px;text-transform:uppercase;flex-shrink:0;margin-right:12px}
.exp-val{font-size:13px;color:#1c1612;font-weight:600;text-align:right;word-break:break-word}
.exp-link{color:#c0392b;font-size:13px;font-weight:800;text-decoration:none}
.tbl-hint{font-size:11px;color:#c8bdb5;text-align:center;padding:10px 0 4px}
.pin-gate{position:fixed;inset:0;background:#faf8f5;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.pin-gate-logo{width:160px;height:58px;object-fit:contain;margin-bottom:20px}
.pin-gate-title{font-size:26px;font-weight:900;color:#1c1612;margin-bottom:6px;text-align:center}
.pin-gate-sub{font-size:13px;color:#6b5e52;margin-bottom:32px;text-align:center}
.pin-gate-dots{display:flex;justify-content:center;gap:18px;margin-bottom:28px}
.pin-gate-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:320px;margin-bottom:14px}
.pin-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:100;align-items:flex-end;justify-content:center}
.pin-ov.open{display:flex}
.pin-sheet{background:#ffffff;border:1px solid #e0dbd3;border-top:3px solid #c0392b;border-bottom:none;border-radius:24px 24px 0 0;padding:18px 20px 44px;width:100%;max-width:480px;text-align:center}
.pin-handle{width:40px;height:4px;background:#e0dbd3;border-radius:2px;margin:0 auto 20px}
.pin-title{font-size:22px;font-weight:900;color:#1c1612;margin-bottom:4px}
.pin-sub{font-size:12px;color:#6b5e52;margin-bottom:24px;line-height:1.4}
.pin-dots{display:flex;justify-content:center;gap:18px;margin-bottom:24px}
.dot{width:16px;height:16px;border-radius:50%;background:#e0dbd3;border:2px solid #d4cec6;transition:background 0.12s,transform 0.12s}
.dot.on{background:#c0392b;border-color:#c0392b;transform:scale(1.1)}
.dot.err{background:#e53935;border-color:#e53935}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.pk{background:#ede9e3;border:1px solid #e0dbd3;border-radius:14px;height:64px;font-size:26px;font-weight:700;color:#1c1612;cursor:pointer;width:100%;-webkit-tap-highlight-color:transparent;transition:background 0.1s,transform 0.1s}
.pk:active{background:#c0392b;border-color:#c0392b;color:#fff;transform:scale(0.95)}
.pk.del{font-size:20px;color:#a89890}
.pk.ghost{background:transparent;border-color:transparent;pointer-events:none}
.pin-cancel{display:block;width:100%;background:none;border:none;color:#a89890;font-size:14px;padding:10px;cursor:pointer}

/* ── QUOTE MODE BANNER ── */
#quoteBanner{display:none;position:sticky;top:0;z-index:100;background:#eef9f2;border-bottom:2px solid #27ae60}
#quoteBanner.active{display:block}
.qb-top{display:flex;align-items:center;justify-content:space-between;padding:10px 14px}
.qb-label{font-size:11px;color:#1e7d47;font-weight:800;letter-spacing:1px;text-transform:uppercase}
.qb-sub{font-size:11px;color:#a89890;margin-top:2px}
.qb-cancel{background:none;border:1px solid #d4cec6;color:#6b5e52;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.qb-tabs{display:flex;background:#e4f5eb;border-top:1px solid #c5e1cc}
.qb-tab{flex:1;padding:11px 8px;font-size:13px;font-weight:700;color:#a89890;border:none;background:transparent;cursor:pointer;border-bottom:3px solid transparent;touch-action:manipulation;-webkit-tap-highlight-color:transparent}
.qb-tab.active{color:#1c1612;border-bottom-color:#c0392b}
/* Quote select button */
.quote-sel-btn{width:100%;background:#c0392b;color:#fff;border:none;border-radius:11px;padding:15px;font-size:15px;font-weight:800;cursor:pointer;display:block;margin:10px 0 4px;touch-action:manipulation;-webkit-tap-highlight-color:transparent;letter-spacing:0.5px}
/* Result cards */
.res-card{background:#ffffff;border:1px solid #e0dbd3;border-radius:14px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.rc-badge{font-size:10px;font-weight:800;color:#c0392b;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.rc-hdr{font-size:19px;font-weight:900;color:#1c1612;margin-bottom:10px;line-height:1.3;word-break:break-word}
.rc-row{display:flex;justify-content:space-between;align-items:baseline;padding:7px 0;border-bottom:1px solid #ede9e3;gap:10px}
.rc-row:last-of-type{border-bottom:none}
.rc-lbl{font-size:11px;font-weight:700;color:#a89890;text-transform:uppercase;letter-spacing:0.5px;flex-shrink:0}
.rc-val{font-size:14px;font-weight:700;color:#1c1612;text-align:right;word-break:break-word}
.rc-mrp-wrap{background:#fff;border:1px solid #e0dbd3;border-radius:10px;padding:14px 16px;text-align:center;margin-top:12px}
.rc-mrp-lbl{font-size:10px;font-weight:800;color:#a89890;text-transform:uppercase;letter-spacing:1px;margin-bottom:4px}
.rc-mrp-val{font-size:40px;font-weight:900;color:#000;letter-spacing:-2px}
.quote-sel-btn:active{opacity:0.85;transform:scale(0.98)}
</style>
<!-- Firebase compat SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="firebase-init.js"></script>
</head>
<body>
<div id="quoteBanner"></div>
<div id="app"></div>
<div class="pin-ov" id="pOv">
  <div class="pin-sheet">
    <div class="pin-handle"></div>
    <div class="pin-title">Staff Access</div>
    <select id="staffPinNameSel" style="width:100%;padding:11px;background:#ffffff;border:1px solid #e0dbd3;border-radius:8px;color:#1c1612;font-size:14px;margin-bottom:8px" onchange="staffPickName()">
      <option value="">— Select your name —</option>
    </select>
    <div class="pin-sub" id="staffPinSub">Select your name, then enter PIN</div>
    <div class="pin-dots">
      <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
    </div>
    <div class="pin-grid">
      <button class="pk" onclick="staffPk('1')">1</button>
      <button class="pk" onclick="staffPk('2')">2</button>
      <button class="pk" onclick="staffPk('3')">3</button>
      <button class="pk" onclick="staffPk('4')">4</button>
      <button class="pk" onclick="staffPk('5')">5</button>
      <button class="pk" onclick="staffPk('6')">6</button>
      <button class="pk" onclick="staffPk('7')">7</button>
      <button class="pk" onclick="staffPk('8')">8</button>
      <button class="pk" onclick="staffPk('9')">9</button>
      <button class="pk ghost"></button>
      <button class="pk" onclick="staffPk('0')">0</button>
      <button class="pk del" onclick="staffPd()">&#9003;</button>
    </div>
    <div id="staffPinErr" style="color:#e74c3c;font-size:13px;font-weight:600;min-height:16px;margin:6px 0"></div>
    <button class="pin-cancel" onclick="closeStaffPin()">Cancel</button>
  </div>
</div>
<script>
var FB  = "https://pricelist-qr-codes-default-rtdb.asia-southeast1.firebasedatabase.app";
var SK  = "darla_staff_v1";
var SAK = "darla_search_v1";
var BASE= window.location.origin+window.location.pathname;

// ── CATEGORY DEFINITIONS ──
// inputs: search fields in order
// rtdbPath: Firebase path (defaults to key if omitted)
// lvl4Field: Firebase field name for 4th-level client-side filter
// mrpLabel: label for MRP display
var CATS = {
  fabric: {
    label:"Fabric", icon:"&#129525;", codeSearch:false,
    inputs:["Brand","Catalog","S.No"],
    mrpLabel:"MRP / METRE"
  },
  hangers: {
    label:"Hangers", icon:"&#129693;", codeSearch:true,
    inputs:["Code"],
    mrpLabel:"MRP / METRE"
  },
  blinds: {
    label:"Blinds", icon:"&#129695;", codeSearch:false,
    inputs:["Brand","Blind Type","Catalog"],
    mrpLabel:"MRP"
  },
  wallpapers: {
    label:"Wallpapers", icon:"&#128444;", codeSearch:false,
    inputs:["Brand","Catalog","Design"],
    mrpLabel:"MRP / ROLL"
  },
  beds: {
    label:"Beds", icon:"&#128716;", codeSearch:false,
  inputs:["Brand","Model","Thickness"],
  bedsMode:true, mrpLabel:"MRP"
  },
  flooring: {
    label:"Flooring", icon:"&#128305;", codeSearch:false,
    inputs:["Category","Brand","Catalog","Item"],
    lvl4Field:"item", mrpLabel:"MRP"
  },
  motors: {
    label:"Motors", icon:"&#9881;", codeSearch:false,
    inputs:["Brand","Category","Product","Item Details"],
    lvl4Field:"item_details", mrpLabel:"MRP"
  },
  rods: {
    label:"Rods & Tracks", icon:"&#128296;", codeSearch:false,
    inputs:["Category","Product","Colour","Style"],
    lvl4Field:"style", mrpLabel:"MRP"
  }
};

// ── SANITIZERS ──
function sk(str){
  return String(str||"").trim()
    .replace(/[^a-zA-Z0-9\-_]/g,"_")
    .replace(/_+/g,"_")
    .replace(/^_+|_+$/g,"")
    ||"_";
}
function codeKey(str){
  return String(str||"").trim().toUpperCase().replace(/[^A-Z0-9\-]/g,"");
}
function gv(r,key){
  if(!r)return"";
  var s=key.replace(/[^a-z0-9_]/g,"_").replace(/_+/g,"_").replace(/^_|_$/g,"");
  return r[s]||r[key]||"";
}
function getParam(n){return new URLSearchParams(window.location.search).get(n)||"";}
// ── QUOTE MODE GLOBALS ──
var QUOTE_HANGERS  = false;  // alias for ALLOW_HANGERS  // true when curtain component (show Fabric+Hangers tabs)


function esc(t){
  if(!t)return"";
  return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function spinner(m){return '<div class="spinner"><div class="spinner-ring"></div><p>'+(m||"Loading...")+'</p></div>';}
function isStaff(){
  var u=AUTH.currentUser;
  if(u && !u.isAnonymous) return true;
  return localStorage.getItem(SK)==="1";  // fallback for offline
}
function hasSearchAccess(){
  var u=AUTH.currentUser;
  if(u && !u.isAnonymous) return true;
  return localStorage.getItem(SAK)==="1";
}

// Sync Firebase Auth state with localStorage flags so renderRows works before observer fires
AUTH.onAuthStateChanged(function(user){
  if(user && !user.isAnonymous){
    localStorage.setItem(SK,"1"); localStorage.setItem(SAK,"1");
    var sb=document.getElementById("sBadge");
    if(sb){ sb.style.display="inline-block"; sb.textContent="STAFF ✓"; }
    var fb=document.getElementById("fabBtn");
    if(fb) fb.style.display="none";
  } else {
    localStorage.removeItem(SK); localStorage.removeItem(SAK);
  }
});

// ── INIT ──
window.addEventListener("DOMContentLoaded",function(){
  var code     = getParam("code").trim().toUpperCase();
  var category = getParam("category").trim().toLowerCase() || "fabric";
  var mode     = getParam("mode");

  if(mode === "quote"){
    QUOTE_MODE    = true;
    ALLOW_HANGERS = (getParam("allowHangers") === "1");
    ACTIVE_CAT    = category;
    initQuoteBanner();          // populate persistent banner div
    showAdvancedSearch(category); // load search immediately
  } else if(code){
    showProductPage(code, category);
  } else {
    showHome();
  }
});





// ── HEADER ──
function hdr(title,code,badge){
  return '<div class="hdr">'
    +'<img class="hdr-logo" src="https://DeepeshDarla.github.io/darla-pricelist/Darla%20Final%20Logo%20-%20Copy.jpg" onerror="this.style.display=\'none\'" alt="Darla">'
    +'<div class="hdr-brand">Darla Sales &amp; Agencies</div>'
    +'<div class="hdr-title">'+esc(title)+'</div>'
    +(code?'<div class="hdr-code">'+esc(code)+'</div>':'')
    +(badge?'<div class="staff-badge" id="sBadge">&#10003; Staff View</div>':'')
    +'</div>';
}

// ── HOME ──
function showHome(){
  var html=hdr("Product Lookup","",false)
    +'<div style="padding:16px 12px 8px;text-align:center">'
    +'<div style="font-size:13px;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Select Category to Search</div>'
    +'</div><div class="cat-grid">';
  Object.keys(CATS).forEach(function(key){
    var c=CATS[key];
    html+='<div class="cat-btn" onclick="goSearch(\''+key+'\')">'
      +'<div class="cat-ico">'+c.icon+'</div>'
      +'<div class="cat-name">'+c.label+'</div></div>';
  });
  html+='</div>';
  document.getElementById("app").innerHTML=html;
}

function goSearch(cat){
  if(hasSearchAccess()) showAdvancedSearch(cat);
  else showSearchGate(cat);
}

// ── PIN GATE ──
var gateEn="",gateCat="",gateStaff=null;
function showSearchGate(cat){
  gateCat=cat; gateEn=""; gateStaff=null;
  // Load staff list from Firestore (public read)
  var staffOpts='<option value="">— Select Name —</option>';
  try{ var sc=JSON.parse(localStorage.getItem("darla_staff_cache")||"[]"); sc.forEach(function(s){ staffOpts+='<option value="'+esc(s.name)+'">'+esc(s.name)+'</option>'; }); }catch(e){}
  document.getElementById("app").innerHTML=
    '<div class="pin-gate">'
    +'<img class="pin-gate-logo" src="https://DeepeshDarla.github.io/darla-pricelist/Darla%20Final%20Logo%20-%20Copy.jpg" onerror="this.style.display=\'none\'" alt="Darla">'
    +'<div class="pin-gate-title">Staff Access Required</div>'
    +'<select id="gateNameSel" style="width:100%;max-width:280px;margin:12px auto 0;display:block;padding:12px;background:#ffffff;border:1.5px solid #e0dbd3;border-radius:8px;color:#1c1612;font-size:15px" onchange="gatePickStaff()">'+staffOpts+'</select>'
    +'<div class="pin-gate-sub" id="gateSubTxt" style="margin-top:10px">Select your name, then enter PIN</div>'
    +'<div class="pin-gate-dots">'
    +'<div class="dot" id="gd0"></div><div class="dot" id="gd1"></div>'
    +'<div class="dot" id="gd2"></div><div class="dot" id="gd3"></div>'
    +'</div><div class="pin-gate-grid">'
    +[1,2,3,4,5,6,7,8,9].map(function(n){return '<button class="pk" onclick="gatePk(\''+n+'\')">'+n+'</button>';}).join("")
    +'<button class="pk ghost"></button>'
    +'<button class="pk" onclick="gatePk(\'0\')">0</button>'
    +'<button class="pk del" onclick="gatePd()">&#9003;</button>'
    +'</div>'
    +'<div id="gateErr" style="color:#e74c3c;font-size:13px;font-weight:600;min-height:18px;margin-top:8px"></div>'
    +'<button class="pin-cancel" onclick="showHome()" style="color:#555;margin-top:8px">&#8592; Back</button>'
    +'</div>';
  // Also load fresh staff list from Firestore (simple get — no composite index needed)
  DB.collection("staffDirectory").get()
    .then(function(snap){
      var list=[];
      snap.forEach(function(d){ var dt=d.data(); if(dt.active!==false) list.push({uid:d.id,name:dt.name,role:dt.role}); });
      list.sort(function(a,b){ return a.name.localeCompare(b.name); });
      if(!list.length) return;
      localStorage.setItem("darla_staff_cache",JSON.stringify(list));
      var sel=document.getElementById("gateNameSel"); if(!sel) return;
      sel.innerHTML='<option value="">— Select Name —</option>';
      list.forEach(function(s){ var o=document.createElement("option"); o.value=s.name; o.textContent=s.name; sel.appendChild(o); });
    }).catch(function(){});
}
function gatePickStaff(){
  var n=document.getElementById("gateNameSel").value;
  try{ var sc=JSON.parse(localStorage.getItem("darla_staff_cache")||"[]"); gateStaff=sc.find(function(s){ return s.name===n; })||null; }catch(e){}
  if(!gateStaff && n) gateStaff={name:n};
  gateEn=""; gDots();
}
function gatePk(k){
  if(!gateStaff){ document.getElementById("gateErr").textContent="Select your name first"; return; }
  if(gateEn.length>=4)return; gateEn+=k; gDots(); if(gateEn.length===4)setTimeout(gChk,80);
}
function gatePd(){gateEn=gateEn.slice(0,-1);gDots();}
function gDots(err){
  for(var i=0;i<4;i++){
    var d=document.getElementById("gd"+i);if(!d)return;
    d.className="dot";
    if(err)d.classList.add("err");else if(i<gateEn.length)d.classList.add("on");
  }
}
function gChk(){
  if(!gateStaff) return;
  var email=gateStaff.name.toLowerCase().replace(/\s+/g,".")+"@darla.in";
  AUTH.signInWithEmailAndPassword(email, gateEn + PIN_SUFFIX)
    .then(function(){
      localStorage.setItem(SAK,"1");
      showAdvancedSearch(gateCat);
    })
    .catch(function(){
      gDots(true);
      var err=document.getElementById("gateErr");
      if(err) err.textContent="Incorrect PIN — try again";
      setTimeout(function(){ gateEn=""; gDots(); if(err) err.textContent=""; },1000);
    });
}

// ── SEARCH STATE ──
var BCM={},BCSM={},allBrands=[],currentCat="fabric",searchCtx={};

// ── ADVANCED SEARCH ──
function showAdvancedSearch(cat){
  currentCat=String(cat||"fabric").toLowerCase();
  var ci=CATS[currentCat]||CATS.fabric;
  BCM={};BCSM={};allBrands=[];searchCtx={};

  // Code search (Hangers)
  if(ci.codeSearch){
    document.getElementById("app").innerHTML=
      hdr(ci.label+" Search","",true)
      +'<div class="search-wrap"><div class="search-card">'
      +'<div class="field-lbl">Code</div><div class="lbl-line-sm"></div>'
      +'<div class="autocomplete-wrap">'
      +'<input class="ac-input" id="codeInp" placeholder="Enter code..." autocomplete="off" spellcheck="false" style="text-transform:uppercase">'
      +'</div>'
      +'<button class="submit-btn" onclick="doCodeSearch()">Search &#8594;</button>'
      +'<button class="clear-btn" onclick="clearSearch()">Clear</button>'
      +'<button class="clear-btn" style="margin-top:6px;color:#c0392b;border-color:#c0392b" onclick="showHome()">&#8592; Categories</button>'
      +'</div></div>'
      +'<div class="results-wrap"><div id="results"></div></div>';
    setTimeout(function(){
      var inp=document.getElementById("codeInp");
      if(inp)inp.addEventListener("keyup",function(e){if(e.key==="Enter")doCodeSearch();this.value=this.value.toUpperCase();});
    },0);
    return;
  }

  // Build dynamic input fields
  var fieldsHtml='';
  ci.inputs.forEach(function(label,idx){
    var fid=toFid(label);
    fieldsHtml+='<div class="field-lbl">'+label+'</div><div class="lbl-line-sm"></div>'
      +'<div class="autocomplete-wrap">'
      +'<input class="ac-input" id="f_'+fid+'" placeholder="'+(idx===0?'Loading...':'Select above first...')+'" '+(idx===0?'disabled':'')+' autocomplete="off" spellcheck="false">'
      +'<div class="dropdown" id="fd_'+fid+'"></div>'
      +'</div>';
  });

  document.getElementById("app").innerHTML=
    hdr(ci.label+" Search","",true)
    +'<div class="search-wrap"><div class="search-card">'
    +'<div id="status" class="status">Loading...</div>'
    +fieldsHtml
    +'<button class="submit-btn" id="searchBtn" onclick="doSearch()" disabled>Search &#8594;</button>'
    +'<button class="clear-btn" onclick="clearSearch()">Clear All</button>'
    +'<button class="clear-btn" style="margin-top:6px;color:#c0392b;border-color:#c0392b" onclick="showHome()">&#8592; Categories</button>'
    +'</div></div>'
    +'<div class="results-wrap"><div id="results"></div></div>';

  window._metaLoading=false;
  setTimeout(function(){loadMeta(1);},150);
}
function toFid(label){ return label.toLowerCase().replace(/[^a-z0-9]/g,"_"); }

// ── LOAD META ──
function loadMeta(attempt){
  if(window._metaLoading&&attempt===1)return;
  if(attempt===1)window._metaLoading=true;
  var st=document.getElementById("status");
  if(!st){window._metaLoading=false;return;}
  st.textContent=attempt>1?"Retrying... ("+attempt+"/3)":"Loading...";
  st.style.color="#555";st.style.cursor="default";st.onclick=null;

  var ci0=CATS[currentCat];
  fetch(FB+"/"+(ci0&&ci0.rtdbPath?ci0.rtdbPath:currentCat)+"/meta.json")
    .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
    .then(function(d){
      window._metaLoading=false;
      var st2=document.getElementById("status");
      var btn=document.getElementById("searchBtn");
      if(!st2)return;
      if(!d||!d.brandList||!d.brandList.length){
        st2.textContent="No data yet for this category.";return;
      }
      // Populate brand/catalog/sno maps
      allBrands=d.brandList.map(function(b){return b.label||b;}).sort();
      d.brandList.forEach(function(b){
        var bKey=b.key||b,bLabel=b.label||b;
        BCM[bLabel]=(d.bcmArr[bKey]||[]).map(function(c){return c.label||c;});
        (d.bcmArr[bKey]||[]).forEach(function(c){
          var cKey=c.key||c,cLabel=c.label||c;
          BCSM[bLabel+"|||"+cLabel]=(d.bcsmArr[bKey+"|||"+cKey]||[]).map(function(s){return s.label||s;});
        });
      });
      // Enable first field
      var ci=CATS[currentCat];
      var f0=document.getElementById("f_"+toFid(ci.inputs[0]));
      if(f0){f0.disabled=false;f0.placeholder="Type to search...";}
      if(btn)btn.disabled=false;
      st2.style.display="none";
      bindInputEvents();
    })
    .catch(function(){
      window._metaLoading=false;
      var st3=document.getElementById("status");
      if(!st3)return;
      if(attempt<3){setTimeout(function(){loadMeta(attempt+1);},3000);}
      else{
        st3.textContent="Tap here to retry";
        st3.style.color="#c0392b";st3.style.cursor="pointer";
        st3.onclick=function(){window._metaLoading=false;loadMeta(1);};
      }
    });
}

// ── BIND INPUT EVENTS ──
function bindInputEvents(){
  var ci=CATS[currentCat];if(!ci)return;
  ci.inputs.forEach(function(label,idx){
    var fid=toFid(label);
    var el=document.getElementById("f_"+fid);
    var drop=document.getElementById("fd_"+fid);
    if(!el)return;
    el.addEventListener("focus",function(){showDrop(drop,getOpts(idx),el,function(v){pickOpt(idx,v);});});
    el.addEventListener("input",function(){showDrop(drop,filt(getOpts(idx),this.value),el,function(v){pickOpt(idx,v);});});
    el.addEventListener("blur",function(){setTimeout(function(){if(drop)drop.classList.remove("show");},200);});
  });
}

function getOpts(idx){
  var ci=CATS[currentCat];
  if(idx===0) return allBrands;
  var brand=getFieldVal(ci.inputs[0]);
  if(idx===1) return BCM[brand]||[];
  if(idx===2){var lvl1=getFieldVal(ci.inputs[1]);return BCSM[brand+"|||"+lvl1]||[];}
  if(idx>=3) return window._lvl4Opts||[];
  return [];
}

function getFieldVal(label){
  var el=document.getElementById("f_"+toFid(label));
  return el?el.value.trim():"";
}

function pickOpt(idx,val){
  var ci=CATS[currentCat];
  var fid=toFid(ci.inputs[idx]);
  var el=document.getElementById("f_"+fid);
  var drop=document.getElementById("fd_"+fid);
  if(el)el.value=val;
  if(drop)drop.classList.remove("show");
  // Enable next field, reset subsequent
  for(var j=idx+1;j<ci.inputs.length;j++){
    var jEl=document.getElementById("f_"+toFid(ci.inputs[j]));
    if(jEl){
      if(j===idx+1){jEl.disabled=false;jEl.placeholder="Type to search...";}
      else{jEl.value="";jEl.disabled=true;}
    }
  }
  // After 3rd field picked: fetch level-4 opts or blinds mechanisms
  if(idx===2){
    var brand=getFieldVal(ci.inputs[0]);
    var lvl1=getFieldVal(ci.inputs[1]);
    var bKey=sk(brand),cKey=sk(lvl1),sKey=sk(val);
    var rp=ci.rtdbPath||currentCat;
    if(ci.inputs.length>=4&&ci.lvl4Field){
      window._lvl4Opts=[];
      var l4El=document.getElementById("f_"+toFid(ci.inputs[3]));
      if(l4El){l4El.disabled=true;l4El.placeholder="Loading...";}
      fetch(FB+"/"+rp+"/by_brand/"+encodeURIComponent(bKey)+"/"+encodeURIComponent(cKey)+"/"+encodeURIComponent(sKey)+".json")
        .then(function(r){return r.json();})
        .then(function(data){
          var res=[];function flat(o){if(Array.isArray(o))o.forEach(function(x){if(x&&x.code)res.push(x);});else if(o&&typeof o==="object")Object.values(o).forEach(flat);}flat(data);
          var fk=ci.lvl4Field,seen={},unique=[];
          res.forEach(function(x){var v=gv(x,fk)||x[fk]||"";if(v&&!seen[v]){seen[v]=true;unique.push(v);}});
          unique.sort();window._lvl4Opts=unique;
          var l4=document.getElementById("f_"+toFid(ci.inputs[3]));
          if(l4){l4.disabled=false;l4.placeholder=unique.length?"Type to filter...":"Type to search...";}
          bindLvl4Input();
        })
        .catch(function(){var l4=document.getElementById("f_"+toFid(ci.inputs[3]));if(l4){l4.disabled=false;l4.placeholder="Type to search...";}});
    } else if(currentCat==="blinds"){
  fetchBlindsMechanisms(bKey,cKey,sKey);
} else if(currentCat==="beds"){
  fetchBedsSizes(bKey,cKey,sKey);
}  }
}

function bindLvl4Input(){
  var ci=CATS[currentCat];if(!ci||ci.inputs.length<4)return;
  var label=ci.inputs[3],fid=toFid(label);
  var el=document.getElementById("f_"+fid);
  var drop=document.getElementById("fd_"+fid);
  if(!el)return;
  var n=el.cloneNode(true);el.parentNode.replaceChild(n,el);
  n.addEventListener("focus",function(){showDrop(drop,filt(window._lvl4Opts||[],""),n,function(v){n.value=v;if(drop)drop.classList.remove("show");});});
  n.addEventListener("input",function(){showDrop(drop,filt(window._lvl4Opts||[],this.value),n,function(v){n.value=v;if(drop)drop.classList.remove("show");});});
  n.addEventListener("blur",function(){setTimeout(function(){if(drop)drop.classList.remove("show");},200);});
}

function fetchBlindsMechanisms(bKey,cKey,sKey){
  var mw=document.getElementById("mech_wrap");if(mw)mw.remove();
  fetch(FB+"/blinds/by_brand/"+encodeURIComponent(bKey)+"/"+encodeURIComponent(cKey)+"/"+encodeURIComponent(sKey)+".json")
    .then(function(r){return r.json();})
    .then(function(data){
      var res=[];function flat(o){if(Array.isArray(o))o.forEach(function(x){if(x&&x.code)res.push(x);});else if(o&&typeof o==="object")Object.values(o).forEach(flat);}flat(data);
      var seen={},unique=[];
      res.forEach(function(x){var v=x.mechanism||gv(x,"mechanism")||"";if(v&&!seen[v]){seen[v]=true;unique.push(v);}});
      unique.sort();if(!unique.length)return;
      var card=document.querySelector(".search-card");if(!card)return;
      var btn=card.querySelector(".submit-btn");if(!btn)return;
      var wrap=document.createElement("div");wrap.id="mech_wrap";
      wrap.innerHTML='<div class="field-lbl">Mechanism</div><div class="lbl-line-sm"></div>'
        +'<div class="autocomplete-wrap"><input class="ac-input" id="f_mechanism" placeholder="All mechanisms..." autocomplete="off" spellcheck="false">'
        +'<div class="dropdown" id="fd_mechanism"></div></div>';
      card.insertBefore(wrap,btn);
      var mel=document.getElementById("f_mechanism");
      var mdrop=document.getElementById("fd_mechanism");
      mel.addEventListener("focus",function(){showDrop(mdrop,unique,mel,function(v){mel.value=v;mdrop.classList.remove("show");});});
      mel.addEventListener("input",function(){showDrop(mdrop,filt(unique,this.value),mel,function(v){mel.value=v;mdrop.classList.remove("show");});});
      mel.addEventListener("blur",function(){setTimeout(function(){mdrop.classList.remove("show");},200);});
    })
    .catch(function(){});
}
function fetchBedsSizes(bKey,cKey,sKey){
  var sw=document.getElementById("size_wrap");if(sw)sw.remove();
  fetch(FB+"/beds/by_brand/"+encodeURIComponent(bKey)+"/"+encodeURIComponent(cKey)+"/"+encodeURIComponent(sKey)+".json")
    .then(function(r){return r.json();})
    .then(function(data){
      var res=[];function flat(o){if(Array.isArray(o))o.forEach(function(x){if(x&&x.code)res.push(x);});else if(o&&typeof o==="object")Object.values(o).forEach(flat);}flat(data);
      var seen={},unique=[];
      res.forEach(function(x){var v=x.size||gv(x,"size")||"";if(v&&!seen[v]){seen[v]=true;unique.push(v);}});
      unique.sort();if(!unique.length)return;
      var card=document.querySelector(".search-card");if(!card)return;
      var btn=card.querySelector(".submit-btn");if(!btn)return;
      var wrap=document.createElement("div");wrap.id="size_wrap";
      wrap.innerHTML='<div class="field-lbl">Size</div><div class="lbl-line-sm"></div>'
        +'<div class="autocomplete-wrap"><input class="ac-input" id="f_size" placeholder="Select size..." autocomplete="off" spellcheck="false">'
        +'<div class="dropdown" id="fd_size"></div></div>';
      card.insertBefore(wrap,btn);
      var sel=document.getElementById("f_size");
      var sdrop=document.getElementById("fd_size");
      sel.addEventListener("focus",function(){showDrop(sdrop,unique,sel,function(v){sel.value=v;sdrop.classList.remove("show");});});
      sel.addEventListener("input",function(){showDrop(sdrop,filt(unique,this.value),sel,function(v){sel.value=v;sdrop.classList.remove("show");});});
      sel.addEventListener("blur",function(){setTimeout(function(){sdrop.classList.remove("show");},200);});
    })
    .catch(function(){});
}
  
// ── SEARCH ──
function doCodeSearch(){
  var inp=document.getElementById("codeInp");if(!inp)return;
  var code=codeKey(inp.value.trim());if(!code)return;
  searchCtx={code:inp.value.trim().toUpperCase()};
  var ci=CATS[currentCat];
  var rp=ci?ci.rtdbPath||currentCat:currentCat;
  var res=document.getElementById("results");if(res)res.innerHTML=spinner("Searching...");
  fetch(FB+"/"+rp+"/by_code/"+encodeURIComponent(code)+".json")
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d){renderRows([],currentCat);return;}
      renderRows(Array.isArray(d)?d:Object.values(d),currentCat);
    })
    .catch(function(){var r=document.getElementById("results");if(r)r.innerHTML='<div class="nf"><h3>Error</h3><p>Please try again.</p></div>';});
}

function doSearch(){
  var ci=CATS[currentCat];if(!ci)return;
  var res=document.getElementById("results");if(res)res.innerHTML=spinner("Searching...");
  var rp=ci.rtdbPath||currentCat;

  searchCtx={};
  ci.inputs.forEach(function(label){searchCtx[toFid(label)]=getFieldVal(label);});
  // Capture optional mechanism for blinds
  if(currentCat==="blinds"){var mel=document.getElementById("f_mechanism");if(mel)searchCtx["mechanism"]=mel.value.trim();}

  var brand=searchCtx[toFid(ci.inputs[0])]||"";
  var lvl1=ci.inputs[1]?searchCtx[toFid(ci.inputs[1])]||"":"";
  var lvl2=ci.inputs[2]?searchCtx[toFid(ci.inputs[2])]||"":"";
  var bKey=sk(brand),cKey=sk(lvl1),sKey=sk(lvl2);

  var url;
  if(bKey&&bKey!="_"&&cKey&&cKey!="_"&&sKey&&sKey!="_")
    url=FB+"/"+rp+"/by_brand/"+encodeURIComponent(bKey)+"/"+encodeURIComponent(cKey)+"/"+encodeURIComponent(sKey)+".json";
  else if(bKey&&bKey!="_"&&cKey&&cKey!="_")
    url=FB+"/"+rp+"/by_brand/"+encodeURIComponent(bKey)+"/"+encodeURIComponent(cKey)+".json";
  else if(bKey&&bKey!="_")
    url=FB+"/"+rp+"/by_brand/"+encodeURIComponent(bKey)+".json";
  else
    url=FB+"/"+rp+"/by_code.json";

  fetch(url)
    .then(function(r){return r.json();})
    .then(function(data){
      if(!data){renderRows([],currentCat);return;}
      var results=[];
      function flatten(obj){
        if(Array.isArray(obj))obj.forEach(function(item){if(item&&item.code)results.push(item);});
        else if(obj&&typeof obj==="object")Object.values(obj).forEach(function(v){flatten(v);});
      }
      flatten(data);
      // Filter by 4th-level field if provided
      if(ci.inputs.length>=4&&ci.lvl4Field){
        var v4=searchCtx[toFid(ci.inputs[3])]||"";
        if(v4){var fk=ci.lvl4Field;results=results.filter(function(x){return(gv(x,fk)||x[fk]||"").toLowerCase()===v4.toLowerCase();});}
      }
      // Filter by mechanism for blinds
      if(currentCat==="blinds"&&searchCtx["mechanism"]){
        var mv=searchCtx["mechanism"];
        results=results.filter(function(x){return(x.mechanism||gv(x,"mechanism")||"").toLowerCase()===mv.toLowerCase();});
      }
      renderRows(results,currentCat);
    })

    if(currentCat==="beds"){
  var sv=document.getElementById("f_size");
  if(sv&&sv.value.trim()){
    var sz=sv.value.trim();
    results=results.filter(function(x){return(x.size||gv(x,"size")||"").toLowerCase()===sz.toLowerCase();});
  }
}
    .catch(function(){var r=document.getElementById("results");if(r)r.innerHTML='<div class="nf"><h3>Error</h3><p>Please try again.</p></div>';});
}

function clearSearch(){
  var ci=CATS[currentCat];if(!ci)return;
  if(ci.codeSearch){
    var inp=document.getElementById("codeInp");if(inp)inp.value="";
  } else {
    ci.inputs.forEach(function(label,idx){
      var el=document.getElementById("f_"+toFid(label));
      if(el){el.value="";if(idx>0)el.disabled=true;}
    });
    var mw=document.getElementById("mech_wrap");if(mw)mw.remove();
    var sw=document.getElementById("size_wrap");if(sw)sw.remove();
    window._lvl4Opts=[];
  }
  searchCtx={};
  var r=document.getElementById("results");if(r)r.innerHTML="";
}

// ── PRODUCT PAGE (QR scan) ──
function showProductPage(code,cat){
  var safeCode=codeKey(code);
  var safeCat=String(cat||"fabric").toLowerCase();
  document.getElementById("app").innerHTML=
    hdr("Product Details",code,true)
    +'<div class="wrap"><div id="results">'+spinner("Loading...")+'</div></div>'
    +'<button class="fab-btn" id="fabBtn" onclick="openStaffPin()">&#128274; Staff Login</button>';
  fetch(FB+"/"+safeCat+"/by_code/"+encodeURIComponent(safeCode)+".json")
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d){renderRows([],safeCat);return;}
      renderRows(Array.isArray(d)?d:Object.values(d),safeCat);
    })
    .catch(function(){
      var r=document.getElementById("results");
      if(r)r.innerHTML='<div class="nf"><h3>Error</h3><p>Please try again</p><a class="back-link" href="'+BASE+'">&#8592; Home</a></div>';
    });
}

// ── RENDER ──
function renderRows(rows,cat){
  var el=document.getElementById("results");if(!el)return;
  if(!rows||!rows.length){
    el.innerHTML='<div class="nf"><div class="nf-ico">&#128269;</div><h3>Not Found</h3><p>No matching products</p><a class="back-link" href="'+BASE+'">&#8592; Home</a></div>';
    return;
  }
  window._rows=rows;window._cat=cat;
  var ci=CATS[cat]||CATS.fabric;
  var staff=isStaff();
  var html='';
  if(rows.length>1)html+='<div class="count-badge"><span class="count-txt">Items Found</span><span class="count-num">'+rows.length+' items</span></div>';
  rows.forEach(function(r,ridx){html+=buildResultCard(r,cat,ci,staff,ridx);});
  el.innerHTML=html;
  var fb=document.getElementById("fabBtn");var sb=document.getElementById("sBadge");
  if(staff){if(sb)sb.style.display="inline-block";if(fb)fb.style.display="none";}
  else{if(fb)fb.style.display="flex";}
}

function rcRow(lbl,val){if(!val&&val!==0)return"";return '<div class="rc-row"><span class="rc-lbl">'+lbl+'</span><span class="rc-val">'+esc(String(val))+'</span></div>';}
function rcMrp(val,lbl){if(!val)return"";return '<div class="rc-mrp-wrap"><div class="rc-mrp-lbl">'+esc(lbl||"MRP")+'</div><div class="rc-mrp-val">&#8377;'+esc(String(val))+'</div></div>';}

function buildResultCard(r,cat,ci,staff,ridx){
  var html='<div class="res-card">';
  if(cat==="fabric"){
    var h=[r.brand,r.catalog,gv(r,"s_no")].filter(Boolean).join(" / ");
    if(staff&&r.code)html+='<div class="rc-badge">'+esc(r.code)+'</div>';
    html+='<div class="rc-hdr">'+esc(h)+'</div>';
    html+=rcRow("Width",r.width);
    html+=rcRow("Item Details",gv(r,"item_details"));
    html+=rcMrp(r.mrp,ci.mrpLabel);
  } else if(cat==="hangers"){
    if(r.code)html+='<div class="rc-badge">'+esc(r.code)+'</div>';
    var h=[r.brand,r.catalog,gv(r,"s_no")].filter(Boolean).join(" / ");
    html+='<div class="rc-hdr">'+esc(h)+'</div>';
    html+=rcRow("Item Details",gv(r,"item_details"));
    html+=rcRow("Width",r.width);
    html+=rcMrp(r.mrp,ci.mrpLabel);
  } else if(cat==="blinds"){
    var h=[r.brand,gv(r,"blind_type")].filter(Boolean).join(" / ");
    html+='<div class="rc-hdr">'+esc(h)+'</div>';
    html+=rcRow("Catalog",r.catalog);
    var mech=r.mechanism||gv(r,"mechanism")||"";if(mech)html+=rcRow("Mechanism",mech);
    html+=rcRow("Other",gv(r,"other_details"));
    html+=rcMrp(r.mrp,ci.mrpLabel);
  } else if(cat==="wallpapers"){
    var h=[r.brand,r.catalog].filter(Boolean).join(" / ");
    html+='<div class="rc-hdr">'+esc(h)+'</div>';
    html+=rcRow("Design",gv(r,"design")||gv(r,"design_details"));
    html+=rcRow("Size",r.size);
    html+=rcMrp(r.mrp,ci.mrpLabel);
  } else if(cat==="beds"){
  var h=[r.brand,r.model].filter(Boolean).join(" / ");
  html+='<div class="rc-hdr">'+esc(h)+'</div>';
  html+=rcRow("Thickness",r.thickness||gv(r,"thickness"));
  html+=rcRow("Size",r.size);
  html+=rcMrp(r.mrp,ci.mrpLabel);
  } else if(cat==="flooring"){
    html+='<div class="rc-hdr">'+esc(r.category||"")+'</div>';
    html+=rcRow("Brand",r.brand);
    html+=rcRow("Catalog",r.catalog);
    html+=rcRow("Item",gv(r,"item")||gv(r,"item_details"));
    html+=rcRow("Width",r.width);
    html+=rcRow("Min Qty",gv(r,"min_qty")||gv(r,"min_quantity"));
    html+=rcMrp(r.mrp,ci.mrpLabel);
  } else if(cat==="motors"){
    html+='<div class="rc-hdr">'+esc(r.brand||"")+'</div>';
    html+=rcRow("Category",r.category);
    html+=rcRow("Product",r.product);
    html+=rcRow("Item Details",gv(r,"item_details"));
    html+=rcRow("Other Details",gv(r,"other_details"));
    html+=rcMrp(r.mrp,ci.mrpLabel);
  } else if(cat==="rods"){
    var h=[r.category,r.product,r.colour||r.color].filter(Boolean).join(" / ");
    html+='<div class="rc-hdr">'+esc(h)+'</div>';
    html+=rcRow("Style",r.style);
    html+=rcRow("Size",r.size);
    html+=rcMrp(r.mrp,ci.mrpLabel);
  } else {
    html+='<div class="rc-hdr">'+esc(r.brand||r.code||"")+'</div>';
    html+=rcRow("Item Details",gv(r,"item_details"));
    html+=rcMrp(r.mrp,ci.mrpLabel);
  }
  if(QUOTE_MODE)html+='<button class="quote-sel-btn" onclick="quotePickRow('+ridx+')">&#10003;&nbsp; Select This Product</button>';
  return html+'</div>';
}
function filt(arr,q){
  if(!arr||!arr.length)return[];
  if(!q||!q.trim())return arr.slice(0,50);
  var l=q.trim().toLowerCase();
  return arr.filter(function(x){return String(x).toLowerCase().indexOf(l)!==-1;}).slice(0,50);
}
function showDrop(drop,items,inp,onSel){
  if(!drop||!items||!items.length){if(drop)drop.classList.remove("show");return;}
  var q=(inp.value||"").trim().toLowerCase();
  var h=items.map(function(item){
    var s=String(item).replace(/&/g,"&amp;").replace(/</g,"&lt;");
    var hi=q?s.replace(new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi"),"<mark>$1</mark>"):s;
    return "<div class='dd-item' onmousedown='selItem(this,event)'>"+hi+"</div>";
  }).join("");
  drop.innerHTML=h;drop.classList.add("show");drop._cb=onSel;
}
function selItem(el,ev){ev.preventDefault();var cb=el.parentElement._cb;if(cb)cb(el.textContent);}

// ── STAFF PIN ──
var staffEn="", staffPinStaff=null;
function openStaffPin(){
  staffEn=""; staffPinStaff=null; sDots();
  // Populate dropdown from cache
  var sel=document.getElementById("staffPinNameSel");
  if(sel){
    sel.innerHTML='<option value="">— Select your name —</option>';
    try{ var sc=JSON.parse(localStorage.getItem("darla_staff_cache")||"[]");
      sc.forEach(function(s){ var o=document.createElement("option"); o.value=s.name; o.textContent=s.name; sel.appendChild(o); }); }catch(e){}
    // If already know who this is from previous session
    try{ var ss=JSON.parse(localStorage.getItem("darla_staff")||"null"); if(ss&&ss.name){ sel.value=ss.name; staffPinStaff=ss; }}catch(e){}
  }
  document.getElementById("pOv").classList.add("open");
}
function staffPickName(){
  var n=document.getElementById("staffPinNameSel").value;
  try{ var sc=JSON.parse(localStorage.getItem("darla_staff_cache")||"[]"); staffPinStaff=sc.find(function(s){ return s.name===n; })||null; }catch(e){}
  if(!staffPinStaff&&n) staffPinStaff={name:n};
  staffEn=""; sDots();
  var sub=document.getElementById("staffPinSub");
  if(sub) sub.textContent=n?"Enter your PIN":"Select your name, then enter PIN";
}
function closeStaffPin(){document.getElementById("pOv").classList.remove("open");staffEn="";staffPinStaff=null;sDots();}
function staffPk(k){
  if(!staffPinStaff){ var err=document.getElementById("staffPinErr"); if(err) err.textContent="Select your name first"; return; }
  if(staffEn.length>=4)return; staffEn+=k; sDots(); if(staffEn.length===4)setTimeout(sChk,80);
}
function staffPd(){staffEn=staffEn.slice(0,-1);sDots();}
function sDots(err){
  for(var i=0;i<4;i++){
    var d=document.getElementById("d"+i);if(!d)return;
    d.className="dot";
    if(err)d.classList.add("err");else if(i<staffEn.length)d.classList.add("on");
  }
}

// quoteSelectRow deprecated — quotePickRow(idx) used instead

function quoteSelectProduct(product){
  // Save selected product and return to quote
  localStorage.setItem("darla_selected_product", JSON.stringify({
    code:         product.code||"",
    brand:        product.brand||"",
    catalog:      product.catalog||product.model||product.product||product.category||"",
    s_no:         product.s_no||product["s.no"]||gv(product,"s_no")||"",
    mrp:          parseFloat(product.mrp)||0,
    width:        product.width||"",
    item_details: product.item_details||"",
    size:         product.size||"",
    thickness:    product.thickness||""
  }));
  window.location.href = "quote.html";
}

// QUOTE MODE — globals + clean implementation

// Switch tab — re-render tabs with new active state, load new category

// Called by showAdvancedSearch — if in quote mode with hangers, 
// inject the search UI into qSearchBody (not replacing the whole #app)
var _origShowAdvanced = null;

// Wrap showAdvancedSearch to keep banner+tabs intact in quote+hangers mode
(function() {
  var _orig = showAdvancedSearch;
  showAdvancedSearch = function(cat) {
    if (QUOTE_MODE && QUOTE_HANGERS) {
      // Let showAdvancedSearch render into #app first
      _orig(cat);
      // Then move its content into qSearchBody, restoring banner+tabs
      var app = document.getElementById("app");
      var body = document.getElementById("qSearchBody");
      if (!body) {
        // qSearchBody was wiped — re-render tabs then move content
        var content = app.innerHTML;
        _renderQuoteTabs(cat);
        var qs = document.getElementById("qSearchBody");
        if (qs) qs.innerHTML = content;
      }
      // Add cancel button to header if not already there
      injectCancelToHeader();
    } else if (QUOTE_MODE) {
      // Non-hangers quote mode — just add the cancel button
      _orig(cat);
      injectCancelToHeader();
    } else {
      _orig(cat);
    }
  };
})();

function injectCancelToHeader() {
  if (document.getElementById("qCancelBtn")) return; // already added
  var hdrEl = document.querySelector(".hdr");
  if (!hdrEl) return;
  var btn = document.createElement("button");
  btn.id = "qCancelBtn";
  btn.innerHTML = "&#8592; Cancel";
  btn.style.cssText = "background:none;border:1px solid #444;color:#aaa;border-radius:8px;"
    + "padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer;"
    + "touch-action:manipulation;margin-left:8px;white-space:nowrap";
  btn.onclick = function() { window.location.href = "quote.html"; };
  hdrEl.appendChild(btn);
}

function goSearchQuote(cat) {
  showAdvancedSearch(cat);
  injectCancelToHeader();
}


var PIN_SUFFIX = '!drla';

function sChk(){
  if(!staffPinStaff){ sDots(true); setTimeout(function(){staffEn="";sDots();},800); return; }
  var email = staffPinStaff.name.toLowerCase().replace(/\s+/g,'.') + '@darla.in';
  AUTH.signInWithEmailAndPassword(email, staffEn + PIN_SUFFIX)
    .then(function(cred){
      localStorage.setItem(SK,"1"); localStorage.setItem(SAK,"1");
      localStorage.setItem("darla_staff", JSON.stringify(Object.assign({},staffPinStaff,{uid:cred.user.uid})));
      closeStaffPin();
      if(window._rows) renderRows(window._rows, window._cat||"fabric");
    })
    .catch(function(){
      sDots(true);
      var err=document.getElementById("staffPinErr");
      if(err) err.textContent="Incorrect PIN";
      setTimeout(function(){ staffEn=""; sDots(); if(err) err.textContent=""; },1000);
    });
}

// ── QUOTE MODE: inject banner+tabs after any search renders ──────

function switchQuoteTab(cat){
  ACTIVE_QUOTE_CAT = cat;
  showAdvancedSearch(cat);
}

// QUOTE MODE — clean implementation
// ════════════════════════════════════════════════════════════
var QUOTE_MODE = false;
var ALLOW_HANGERS = false;
var ACTIVE_CAT = "fabric";

function initQuoteBanner(){
  var b = document.getElementById("quoteBanner");
  if(!b) return;
  b.className = "active";
  b.innerHTML =
    '<div class="qb-top">'
    + '<div><div class="qb-label">Selecting product for quote</div>'
    + '<div class="qb-sub">Tap any product to add it</div></div>'
    + '<button class="qb-cancel" onclick="window.location.href=\'quote.html\'">&#8592; Cancel</button>'
    + '</div>'
    + (ALLOW_HANGERS
      ? '<div class="qb-tabs">'
        + '<button id="qbTabFab" class="qb-tab active" onclick="switchCat(\'fabric\')">&#129525; Fabric</button>'
        + '<button id="qbTabHan" class="qb-tab" onclick="switchCat(\'hangers\')">&#129693; Hangers / Rods</button>'
        + '</div>'
      : '');
}

function switchCat(cat){
  ACTIVE_CAT = cat;
  // Update tab styles
  var tf = document.getElementById("qbTabFab");
  var th = document.getElementById("qbTabHan");
  if(tf){ tf.className = "qb-tab" + (cat==="fabric"?" active":""); }
  if(th){ th.className = "qb-tab" + (cat==="hangers"?" active":""); }
  showAdvancedSearch(cat);
}

// Called from Select button in results
function quotePickRow(idx){
  var rows = window._rows;
  if(!rows || idx < 0 || idx >= rows.length){ showToast("Error — please try again"); return; }
  quoteSelectProduct(rows[idx]);
}

// Show a toast inside product search
function showToast(msg){
  var t = document.createElement("div");
  t.textContent = msg;
  t.style.cssText = "position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#fff;color:#000;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:700;z-index:999;white-space:nowrap;pointer-events:none";
  document.body.appendChild(t);
  setTimeout(function(){ if(t.parentNode)t.parentNode.removeChild(t); }, 2500);
}
