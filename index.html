<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Darla — Product Lookup</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0a0a0a;min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:120px}
.hdr{background:#111;border-bottom:2px solid #c0392b;padding:24px 20px 20px;text-align:center}
.hdr-logo{max-width:110px;width:45%;height:auto;display:block;margin:0 auto 14px;object-fit:contain}
.hdr-brand{font-size:11px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#777;margin-bottom:10px}
.hdr-title{font-size:48px;font-weight:900;color:#fff;letter-spacing:-2px;line-height:1;margin-bottom:14px}
.hdr-code{display:inline-block;background:#1c1c1c;border:1px solid #333;color:#aaa;font-size:14px;font-weight:700;letter-spacing:2px;padding:7px 18px;border-radius:8px;margin-bottom:6px}
.staff-badge{display:none;margin-top:10px;background:#0e2b0e;color:#4caf50;font-size:11px;font-weight:800;letter-spacing:1.5px;padding:6px 16px;border-radius:6px}
.wrap{padding:16px 14px 0;display:flex;flex-direction:column;gap:10px}
.card{background:#161616;border:1px solid #252525;border-radius:18px;padding:20px 22px;text-align:center}
.card-accent-blue{border-top:3px solid #1a6bbf}
.card-accent-red{border-top:3px solid #c0392b}
.card-mrp{background:#fff;border:none;border-radius:18px}
.lbl{font-size:42px;font-weight:300;letter-spacing:-0.5px;color:#ccc;text-transform:uppercase;padding-bottom:6px}
.lbl-dark{color:#333}
.lbl-line{width:50px;height:3px;background:#c0392b;border-radius:2px;margin:0 auto 14px}
.val{font-size:52px;font-weight:900;color:#fff;letter-spacing:-2px;line-height:1.1;word-break:break-word}
.val-sm{font-size:28px;font-weight:400;color:#ccc;line-height:1.5;word-break:break-word}
.mrp-row{display:flex;align-items:baseline;justify-content:center;gap:4px}
.rsym{font-size:64px;font-weight:900;color:#888}
.mrp-val{font-size:64px;font-weight:900;color:#000;letter-spacing:-3px;line-height:1}
.card-mrp .lbl{color:#333;font-size:42px;font-weight:300}
.card-mrp .lbl-line{background:#c0392b}
.item-group{background:#111;border:1px solid #1e1e1e;border-radius:20px;padding:14px;display:flex;flex-direction:column;gap:10px;margin-bottom:4px}
.item-num{font-size:13px;font-weight:800;letter-spacing:2px;color:#c0392b;text-transform:uppercase;text-align:center;margin-bottom:4px}
.link-btn{display:inline-block;margin-top:8px;background:#fff;color:#000;text-decoration:none;font-size:18px;font-weight:800;padding:16px 28px;border-radius:12px}
.nf{text-align:center;padding:60px 24px}
.nf-ico{font-size:56px;margin-bottom:20px}
.nf h3{font-size:28px;font-weight:900;color:#fff;margin-bottom:10px}
.nf p{color:#555;font-size:18px;line-height:1.5}
.back-link{color:#c0392b;font-size:16px;font-weight:700;text-decoration:none;display:inline-block;margin-top:20px}
.spinner{text-align:center;padding:60px 24px}
.spinner-ring{width:52px;height:52px;border:4px solid #222;border-top-color:#c0392b;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner p{color:#555;font-size:18px}
.fab-btn{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:#c0392b;color:#fff;border:none;border-radius:50px;padding:17px 36px;font-size:16px;font-weight:800;letter-spacing:0.5px;box-shadow:0 4px 30px rgba(192,57,43,0.5);cursor:pointer;z-index:50;-webkit-tap-highlight-color:transparent;white-space:nowrap;text-transform:uppercase;display:none}
.search-wrap{padding:16px 14px 0}
.search-card{background:#161616;border:1px solid #252525;border-top:3px solid #c0392b;border-radius:18px;padding:24px 20px;margin-bottom:10px}
.field-lbl{font-size:42px;font-weight:300;color:#ccc;text-transform:uppercase;letter-spacing:-0.5px;padding-bottom:6px;margin-top:20px}
.field-lbl:first-child{margin-top:0}
.lbl-line-sm{width:50px;height:3px;background:#c0392b;border-radius:2px;margin:0 0 12px}
.autocomplete-wrap{position:relative;margin-bottom:4px}
.ac-input{width:100%;background:#fff;border:2px solid #ddd;border-radius:12px;color:#000;font-size:36px;font-weight:700;padding:16px 18px;outline:none;-webkit-appearance:none;display:block;text-align:center}
.ac-input:focus{border-color:#c0392b}
.ac-input::placeholder{color:#bbb;font-size:26px;font-weight:400}
.ac-input:disabled{background:#111;color:#333;border-color:#1e1e1e;cursor:not-allowed}
.dropdown{display:none;position:absolute;top:100%;left:0;right:0;background:#1e1e1e;border:1px solid #333;border-radius:12px;max-height:260px;overflow-y:auto;z-index:200;margin-top:4px}
.dropdown.show{display:block}
.dd-item{padding:16px 18px;font-size:28px;font-weight:600;color:#fff;cursor:pointer;border-bottom:1px solid #2a2a2a;text-align:left}
.dd-item:last-child{border-bottom:none}
.dd-item:active{background:#c0392b}
.dd-item mark{background:transparent;color:#c0392b;font-weight:900}
.submit-btn{width:100%;background:#c0392b;color:#fff;border:none;border-radius:14px;padding:22px;font-size:22px;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer;display:block;margin-top:24px;box-shadow:0 4px 24px rgba(192,57,43,0.4);-webkit-tap-highlight-color:transparent}
.submit-btn:active{opacity:0.85}
.submit-btn:disabled{opacity:0.4}
.clear-btn{display:block;width:100%;margin-top:12px;background:transparent;color:#555;border:1px solid #2a2a2a;border-radius:12px;padding:16px;font-size:18px;font-weight:600;cursor:pointer}
.status{text-align:center;padding:10px 0;color:#555;font-size:16px}
.results-wrap{padding:0 14px;display:flex;flex-direction:column;gap:12px;margin-top:10px}
.pin-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:flex-end;justify-content:center}
.pin-ov.open{display:flex}
.pin-sheet{background:#161616;border:1px solid #2a2a2a;border-top:3px solid #c0392b;border-bottom:none;border-radius:24px 24px 0 0;padding:20px 20px 48px;width:100%;max-width:480px;text-align:center}
.pin-handle{width:40px;height:4px;background:#2e2e2e;border-radius:2px;margin:0 auto 24px}
.pin-title{font-size:24px;font-weight:900;color:#fff;margin-bottom:4px}
.pin-sub{font-size:13px;color:#555;margin-bottom:28px;line-height:1.4}
.pin-dots{display:flex;justify-content:center;gap:20px;margin-bottom:28px}
.dot{width:18px;height:18px;border-radius:50%;background:#222;border:2px solid #333;transition:background 0.12s,transform 0.12s}
.dot.on{background:#c0392b;border-color:#c0392b;transform:scale(1.1)}
.dot.err{background:#e53935;border-color:#e53935}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
.pk{background:#222;border:1px solid #2e2e2e;border-radius:14px;height:70px;font-size:28px;font-weight:700;color:#fff;cursor:pointer;width:100%;-webkit-tap-highlight-color:transparent;transition:background 0.1s,transform 0.1s}
.pk:active{background:#c0392b;border-color:#c0392b;transform:scale(0.95)}
.pk.del{font-size:22px;color:#777}
.pk.ghost{background:transparent;border-color:transparent;pointer-events:none}
.pin-cancel{display:block;width:100%;background:none;border:none;color:#444;font-size:15px;padding:12px;cursor:pointer}
</style>
</head>
<body>

<div id="app"></div>

<div class="pin-ov" id="pOv">
  <div class="pin-sheet">
    <div class="pin-handle"></div>
    <div class="pin-title">Staff Access</div>
    <div class="pin-sub">Enter your PIN once — saved on this phone</div>
    <div class="pin-dots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>
    <div class="pin-grid">
      <button class="pk" onclick="pk('1')">1</button>
      <button class="pk" onclick="pk('2')">2</button>
      <button class="pk" onclick="pk('3')">3</button>
      <button class="pk" onclick="pk('4')">4</button>
      <button class="pk" onclick="pk('5')">5</button>
      <button class="pk" onclick="pk('6')">6</button>
      <button class="pk" onclick="pk('7')">7</button>
      <button class="pk" onclick="pk('8')">8</button>
      <button class="pk" onclick="pk('9')">9</button>
      <button class="pk ghost"></button>
      <button class="pk" onclick="pk('0')">0</button>
      <button class="pk del" onclick="pd()">⌫</button>
    </div>
    <button class="pin-cancel" onclick="closePin()">Cancel</button>
  </div>
</div>

<script>
var FB   = "https://pricelist-qr-codes-default-rtdb.asia-southeast1.firebasedatabase.app";
var PIN  = "1516";
var SK   = "darla2_v1";
var en   = "";
var BASE = window.location.origin + window.location.pathname;

// ── ROUTING ──
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name) || "";
}

window.addEventListener("DOMContentLoaded", function() {
  var code   = getParam("code").trim().toUpperCase();
  var search = getParam("search");
  if (code)   showProductPage(code);
  else        showAdvancedSearch();
});

// ── HELPERS ──
function esc(t) {
  if (!t) return "";
  return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function hdr(title, code, badge) {
  return '<div class="hdr">'
    + '<img class="hdr-logo" src="https://i.ibb.co/V0G4BqCT/darla-logo.jpg" onerror="this.style.display=\'none\'" alt="Darla">'
    + '<div class="hdr-brand">Darla Sales &amp; Agencies</div>'
    + '<div class="hdr-title">' + esc(title) + '</div>'
    + (code ? '<div class="hdr-code">' + esc(code) + '</div>' : '')
    + (badge ? '<div class="staff-badge" id="sBadge">✓ Staff View</div>' : '')
    + '</div>';
}

function spinner(msg) {
  return '<div class="spinner"><div class="spinner-ring"></div><p>' + (msg||"Loading...") + '</p></div>';
}

// ── CARD BUILDERS ──
function buildPublic(rows) {
  return rows.map(function(r,i) {
    var t = rows.length;
    return '<div class="item-group">'
      + (t>1 ? '<div class="item-num">Item '+(i+1)+' of '+t+'</div>' : '')
      + '<div class="card card-accent-blue"><div class="lbl">CATALOG</div><div class="lbl-line"></div><div class="val">'+esc(r.catalog)+'</div></div>'
      + '<div class="card card-accent-blue"><div class="lbl">S.NO</div><div class="lbl-line"></div><div class="val">'+esc(r.sno)+'</div></div>'
      + '<div class="card"><div class="lbl">WIDTH</div><div class="lbl-line"></div><div class="val">'+esc(r.width)+'</div></div>'
      + '<div class="card card-mrp"><div class="lbl lbl-dark">MRP / METRE</div><div class="lbl-line"></div>'
      + '<div class="mrp-row"><span class="rsym">₹</span><span class="mrp-val">'+esc(r.mrp)+'</span></div></div>'
      + '</div>';
  }).join("");
}

function buildStaff(rows) {
  return rows.map(function(r,i) {
    var t = rows.length;
    var lnk = r.link && r.link.indexOf("http")===0
      ? '<div class="card"><div class="lbl">LINK</div><div class="lbl-line"></div><a href="'+esc(r.link)+'" target="_blank" class="link-btn">View Product ↗</a></div>'
      : '';
    return '<div class="item-group">'
      + (t>1 ? '<div class="item-num">Item '+(i+1)+' of '+t+'</div>' : '')
      + '<div class="card card-accent-blue"><div class="lbl">CODE</div><div class="lbl-line"></div><div class="val">'+esc(r.code)+'</div></div>'
      + '<div class="card card-accent-red"><div class="lbl">BRAND</div><div class="lbl-line"></div><div class="val">'+esc(r.brand)+'</div></div>'
      + '<div class="card card-accent-blue"><div class="lbl">CATALOG</div><div class="lbl-line"></div><div class="val">'+esc(r.catalog)+'</div></div>'
      + '<div class="card"><div class="lbl">S.NO</div><div class="lbl-line"></div><div class="val">'+esc(r.sno)+'</div></div>'
      + '<div class="card"><div class="lbl">ITEM DETAILS</div><div class="lbl-line"></div><div class="val-sm">'+esc(r.item)+'</div></div>'
      + '<div class="card"><div class="lbl">WIDTH</div><div class="lbl-line"></div><div class="val">'+esc(r.width)+'</div></div>'
      + '<div class="card card-mrp"><div class="lbl lbl-dark">MRP / METRE</div><div class="lbl-line"></div>'
      + '<div class="mrp-row"><span class="rsym">₹</span><span class="mrp-val">'+esc(r.mrp)+'</span></div></div>'
      + lnk + '</div>';
  }).join("");
}

function renderRows(rows) {
  var el = document.getElementById("results");
  if (!rows || !rows.length) {
    el.innerHTML = '<div class="nf"><div class="nf-ico">🔍</div><h3>Not Found</h3>'
      + '<p>No matching products</p>'
      + '<a class="back-link" href="' + BASE + '">← Advanced Search</a></div>';
    return;
  }
  window._rows = rows;
  var isStaff = localStorage.getItem(SK) === "1";
  el.innerHTML = isStaff ? buildStaff(rows) : buildPublic(rows);
  var fb = document.getElementById("fabBtn");
  var sb = document.getElementById("sBadge");
  if (isStaff) { if(sb) sb.style.display="inline-block"; if(fb) fb.style.display="none"; }
  else { if(fb) fb.style.display="flex"; }
}

// ── PRODUCT PAGE ──
function showProductPage(code) {
  document.getElementById("app").innerHTML =
    hdr("Product Details", code, true)
    + '<div class="wrap"><div id="results">' + spinner("Loading...") + '</div></div>'
    + '<button class="fab-btn" id="fabBtn" onclick="openPin()">🔐 Staff Login</button>';

  // Direct Firebase key lookup — O(1), no scanning
  fetch(FB + "/by_code/" + encodeURIComponent(code) + ".json")
    .then(function(r) { return r.json(); })
    .then(function(d) {
      if (!d) { renderRows([]); return; }
      var rows = Array.isArray(d) ? d : Object.values(d);
      renderRows(rows);
    })
    .catch(function() {
      document.getElementById("results").innerHTML =
        '<div class="nf"><h3>Error</h3><p>Please try again</p></div>';
    });
}

// ── ADVANCED SEARCH ──
var BCM = {}, BCSM = {}, allBrands = [];

function showAdvancedSearch() {
  document.getElementById("app").innerHTML =
    hdr("Advanced Search", "", true)
    + '<div class="search-wrap"><div class="search-card">'
    + '<div id="status" class="status">Loading brands...</div>'
    + '<div class="field-lbl">Brand</div><div class="lbl-line-sm"></div>'
    + '<div class="autocomplete-wrap"><input class="ac-input" id="bInp" placeholder="Loading..." disabled autocomplete="off" autocorrect="off" spellcheck="false"><div class="dropdown" id="bDrop"></div></div>'
    + '<div class="field-lbl">Catalog</div><div class="lbl-line-sm"></div>'
    + '<div class="autocomplete-wrap"><input class="ac-input" id="cInp" placeholder="Select brand first..." disabled autocomplete="off" autocorrect="off" spellcheck="false"><div class="dropdown" id="cDrop"></div></div>'
    + '<div class="field-lbl">S.No</div><div class="lbl-line-sm"></div>'
    + '<div class="autocomplete-wrap"><input class="ac-input" id="sInp" placeholder="Select catalog first..." disabled autocomplete="off" autocorrect="off" spellcheck="false"><div class="dropdown" id="sDrop"></div></div>'
    + '<button class="submit-btn" id="searchBtn" onclick="doSearch()" disabled>Search →</button>'
    + '<button class="clear-btn" onclick="clearAll()">Clear All</button>'
    + '</div></div>'
    + '<div class="results-wrap"><div id="results"></div></div>';

  // Fetch meta from Firebase — fast, ~200ms
  fetch(FB + "/meta.json")
    .then(function(r) { return r.json(); })
    .then(function(d) {
      allBrands = d.brandList.map(function(b){ return b.label || b; }).sort();
      d.brandList.forEach(function(b) {
        var bKey = b.key || b, bLabel = b.label || b;
        var cats = d.bcmArr[bKey] || [];
        BCM[bLabel] = cats.map(function(c){ return c.label || c; });
        cats.forEach(function(c) {
          var cKey = c.key || c, cLabel = c.label || c;
          var snos = d.bcsmArr[bKey + "|||" + cKey] || [];
          BCSM[bLabel + "|||" + cLabel] = snos.map(function(s){ return s.label || s; });
        });
      });
      var bInp = document.getElementById("bInp");
      var searchBtn = document.getElementById("searchBtn");
      bInp.disabled = false;
      bInp.placeholder = "Type brand name...";
      searchBtn.disabled = false;
      document.getElementById("status").style.display = "none";
      bindSearchEvents();
    })
    .catch(function() {
      document.getElementById("status").textContent = "Failed to load. Please refresh.";
    });
}

function bindSearchEvents() {
  var bInp = document.getElementById("bInp");
  var cInp = document.getElementById("cInp");
  var sInp = document.getElementById("sInp");
  var bDrop = document.getElementById("bDrop");
  var cDrop = document.getElementById("cDrop");
  var sDrop = document.getElementById("sDrop");

  bInp.addEventListener("focus", function(){ showDrop(bDrop, filt(allBrands, this.value), bInp, pickBrand); });
  bInp.addEventListener("input", function(){
    cInp.value=""; sInp.value=""; cInp.disabled=true; sInp.disabled=true;
    showDrop(bDrop, filt(allBrands, this.value), bInp, pickBrand);
  });
  bInp.addEventListener("blur", function(){ setTimeout(function(){ bDrop.classList.remove("show"); }, 200); });

  cInp.addEventListener("focus", function(){
    showDrop(cDrop, filt(BCM[bInp.value.trim()]||[], this.value), cInp, pickCatalog);
  });
  cInp.addEventListener("input", function(){
    sInp.value=""; sInp.disabled=true;
    showDrop(cDrop, filt(BCM[bInp.value.trim()]||[], this.value), cInp, pickCatalog);
  });
  cInp.addEventListener("blur", function(){ setTimeout(function(){ cDrop.classList.remove("show"); }, 200); });

  sInp.addEventListener("focus", function(){
    var key = bInp.value.trim() + "|||" + cInp.value.trim();
    showDrop(sDrop, filt(BCSM[key]||[], this.value), sInp, pickSno);
  });
  sInp.addEventListener("input", function(){
    var key = bInp.value.trim() + "|||" + cInp.value.trim();
    showDrop(sDrop, filt(BCSM[key]||[], this.value), sInp, pickSno);
  });
  sInp.addEventListener("blur", function(){ setTimeout(function(){ sDrop.classList.remove("show"); }, 200); });
}

function pickBrand(v) {
  document.getElementById("bInp").value = v;
  document.getElementById("bDrop").classList.remove("show");
  var c = document.getElementById("cInp");
  c.disabled = false; c.placeholder = "Type catalog..."; c.value = "";
  document.getElementById("sInp").disabled = true;
  document.getElementById("sInp").value = "";
  c.focus();
}
function pickCatalog(v) {
  document.getElementById("cInp").value = v;
  document.getElementById("cDrop").classList.remove("show");
  var s = document.getElementById("sInp");
  s.disabled = false; s.placeholder = "Type S.No..."; s.value = "";
  s.focus();
}
function pickSno(v) {
  document.getElementById("sInp").value = v;
  document.getElementById("sDrop").classList.remove("show");
}

function filt(arr, q) {
  if (!arr || !arr.length) return [];
  if (!q || !q.trim()) return arr.slice(0, 50);
  var l = q.trim().toLowerCase();
  return arr.filter(function(x){ return String(x).toLowerCase().indexOf(l) !== -1; }).slice(0, 50);
}

function showDrop(drop, items, inp, onSel) {
  if (!items || !items.length) { drop.classList.remove("show"); return; }
  var q = (inp.value || "").trim().toLowerCase();
  var h = items.map(function(item) {
    var s = String(item).replace(/&/g,"&amp;").replace(/</g,"&lt;");
    var hi = q ? s.replace(new RegExp("(" + q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&") + ")","gi"), "<mark>$1</mark>") : s;
    return "<div class='dd-item' onmousedown='selItem(this,event)'>" + hi + "</div>";
  }).join("");
  drop.innerHTML = h; drop.classList.add("show"); drop._cb = onSel;
}

function selItem(el, ev) {
  ev.preventDefault();
  var cb = el.parentElement._cb;
  if (cb) cb(el.textContent);
}

function doSearch() {
  var b = document.getElementById("bInp").value.trim();
  var c = document.getElementById("cInp").value.trim();
  var s = document.getElementById("sInp").value.trim();
  if (!b && !c && !s) return;
  document.getElementById("results").innerHTML = spinner("Searching...");

  // Fetch ALL by_code and filter client-side — no Apps Script needed
  fetch(FB + "/by_code.json")
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var bl = b.toLowerCase(), cl = c.toLowerCase(), sl = s.toLowerCase();
      var results = [];
      Object.keys(data).forEach(function(code) {
        var items = data[code];
        var arr = Array.isArray(items) ? items : Object.values(items);
        arr.forEach(function(r) {
          if ((!bl || String(r.brand||"").toLowerCase() === bl)
           && (!cl || String(r.catalog||"").toLowerCase() === cl)
           && (!sl || String(r.sno||"").toLowerCase() === sl)) {
            results.push(r);
          }
        });
      });
      renderRows(results);
    })
    .catch(function() {
      document.getElementById("results").innerHTML = '<div class="nf"><h3>Error</h3><p>Please try again.</p></div>';
    });
}

function clearAll() {
  ["bInp","cInp","sInp"].forEach(function(id){ document.getElementById(id).value=""; });
  document.getElementById("cInp").disabled = true;
  document.getElementById("sInp").disabled = true;
  document.getElementById("cInp").placeholder = "Select brand first...";
  document.getElementById("sInp").placeholder = "Select catalog first...";
  document.getElementById("results").innerHTML = "";
}

// ── PIN SYSTEM ──
function openPin()  { document.getElementById("pOv").classList.add("open"); }
function closePin() { document.getElementById("pOv").classList.remove("open"); en=""; dots(); }
function pk(k) { if(en.length>=4)return; en+=k; dots(); if(en.length===4) setTimeout(chk,80); }
function pd()  { en=en.slice(0,-1); dots(); }
function dots(s) {
  for(var i=0;i<4;i++){
    var d=document.getElementById("d"+i); d.className="dot";
    if(s==="e") d.classList.add("err");
    else if(i<en.length) d.classList.add("on");
  }
}
function chk() {
  if(en===PIN){
    localStorage.setItem(SK,"1"); closePin();
    if(window._rows){
      document.getElementById("results").innerHTML = buildStaff(window._rows);
      var sb=document.getElementById("sBadge"); if(sb) sb.style.display="inline-block";
      var fb=document.getElementById("fabBtn"); if(fb) fb.style.display="none";
    }
  } else { dots("e"); setTimeout(function(){ en=""; dots(); }, 800); }
}
