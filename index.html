<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>Darla — Product Lookup</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0a0a0a;min-height:100vh;-webkit-font-smoothing:antialiased;padding-bottom:120px}
.hdr{background:#111;border-bottom:2px solid #c0392b;padding:22px 20px 18px;text-align:center}
.hdr-logo{width:200px;height:72px;display:block;margin:0 auto 14px;object-fit:contain;object-position:center}
.hdr-brand{font-size:10px;font-weight:700;letter-spacing:3px;text-transform:uppercase;color:#777;margin-bottom:8px}
.hdr-title{font-size:34px;font-weight:900;color:#fff;letter-spacing:-1.5px;line-height:1;margin-bottom:6px}
.hdr-code{display:inline-block;background:#1c1c1c;border:1px solid #333;color:#aaa;font-size:13px;font-weight:700;letter-spacing:2px;padding:6px 16px;border-radius:8px;margin-bottom:6px}
.staff-badge{display:none;margin-top:8px;background:#0e2b0e;color:#4caf50;font-size:10px;font-weight:800;letter-spacing:1.5px;padding:5px 14px;border-radius:6px}
.wrap{padding:12px 12px 0;display:flex;flex-direction:column;gap:8px}
.card{background:#161616;border:1px solid #252525;border-radius:16px;padding:16px 18px;text-align:center}
.card-accent-blue{border-top:3px solid #1a6bbf}
.card-accent-red{border-top:3px solid #c0392b}
.card-mrp{background:#fff;border:none;border-radius:16px}
.lbl{font-size:30px;font-weight:300;letter-spacing:-0.5px;color:#ccc;text-transform:uppercase;padding-bottom:5px}
.lbl-dark{color:#333}
.lbl-line{width:40px;height:3px;background:#c0392b;border-radius:2px;margin:0 auto 12px}
.val{font-size:38px;font-weight:900;color:#fff;letter-spacing:-1.5px;line-height:1.1;word-break:break-word}
.val-sm{font-size:20px;font-weight:400;color:#ccc;line-height:1.5;word-break:break-word}
.mrp-row{display:flex;align-items:baseline;justify-content:center;gap:3px}
.rsym{font-size:46px;font-weight:900;color:#888}
.mrp-val{font-size:46px;font-weight:900;color:#000;letter-spacing:-2px;line-height:1}
.card-mrp .lbl{color:#333;font-size:30px;font-weight:300}
.card-mrp .lbl-line{background:#c0392b}
.item-group{background:#111;border:1px solid #1e1e1e;border-radius:16px;padding:12px;display:flex;flex-direction:column;gap:8px;margin-bottom:4px}
.link-btn{display:inline-block;margin-top:8px;background:#fff;color:#000;text-decoration:none;font-size:15px;font-weight:800;padding:12px 22px;border-radius:10px}
.nf{text-align:center;padding:50px 20px}
.nf-ico{font-size:48px;margin-bottom:16px}
.nf h3{font-size:24px;font-weight:900;color:#fff;margin-bottom:8px}
.nf p{color:#555;font-size:16px;line-height:1.5}
.back-link{color:#c0392b;font-size:15px;font-weight:700;text-decoration:none;display:inline-block;margin-top:16px}
.spinner{text-align:center;padding:50px 20px}
.spinner-ring{width:44px;height:44px;border:4px solid #222;border-top-color:#c0392b;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner p{color:#555;font-size:16px}
.fab-btn{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#c0392b;color:#fff;border:none;border-radius:50px;padding:14px 30px;font-size:14px;font-weight:800;letter-spacing:0.5px;box-shadow:0 4px 30px rgba(192,57,43,0.5);cursor:pointer;z-index:50;-webkit-tap-highlight-color:transparent;white-space:nowrap;text-transform:uppercase;display:none}
.search-wrap{padding:12px 12px 0}
.search-card{background:#161616;border:1px solid #252525;border-top:3px solid #c0392b;border-radius:16px;padding:20px 18px;margin-bottom:8px}
.field-lbl{font-size:30px;font-weight:300;color:#ccc;text-transform:uppercase;letter-spacing:-0.5px;padding-bottom:5px;margin-top:16px}
.field-lbl:first-child{margin-top:0}
.lbl-line-sm{width:40px;height:3px;background:#c0392b;border-radius:2px;margin:0 0 10px}
.ac-input{width:100%;background:#fff;border:2px solid #ddd;border-radius:12px;color:#000;font-size:26px;font-weight:700;padding:13px 16px;outline:none;-webkit-appearance:none;display:block;text-align:center}
.ac-input:focus{border-color:#c0392b}
.ac-input::placeholder{color:#bbb;font-size:20px;font-weight:400}
.ac-input:disabled{background:#111;color:#333;border-color:#1e1e1e;cursor:not-allowed}
.autocomplete-wrap{position:relative;margin-bottom:4px}
.dropdown{display:none;position:absolute;top:100%;left:0;right:0;background:#1e1e1e;border:1px solid #333;border-radius:12px;max-height:220px;overflow-y:auto;z-index:200;margin-top:4px}
.dropdown.show{display:block}
.dd-item{padding:12px 16px;font-size:22px;font-weight:600;color:#fff;cursor:pointer;border-bottom:1px solid #2a2a2a;text-align:left}
.dd-item:last-child{border-bottom:none}
.dd-item:active{background:#c0392b}
.dd-item mark{background:transparent;color:#c0392b;font-weight:900}
.submit-btn{width:100%;background:#c0392b;color:#fff;border:none;border-radius:12px;padding:17px;font-size:18px;font-weight:800;letter-spacing:1px;text-transform:uppercase;cursor:pointer;display:block;margin-top:20px;box-shadow:0 4px 24px rgba(192,57,43,0.4);-webkit-tap-highlight-color:transparent}
.submit-btn:active{opacity:0.85}
.submit-btn:disabled{opacity:0.4}
.clear-btn{display:block;width:100%;margin-top:10px;background:transparent;color:#555;border:1px solid #2a2a2a;border-radius:10px;padding:13px;font-size:15px;font-weight:600;cursor:pointer}
.status{text-align:center;padding:8px 0;color:#555;font-size:14px}
.results-wrap{padding:0 12px;display:flex;flex-direction:column;gap:10px;margin-top:8px}
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 12px 0}
.cat-btn{background:#161616;border:1px solid #252525;border-top:3px solid #c0392b;border-radius:16px;padding:20px 12px;text-align:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.cat-btn:active{background:#1e1e1e}
.cat-ico{font-size:28px;margin-bottom:8px}
.cat-name{font-size:18px;font-weight:800;color:#fff;letter-spacing:-0.5px}
.ctx-hdr{background:#161616;border:1px solid #252525;border-top:3px solid #1a6bbf;border-radius:14px;padding:14px 16px;margin-bottom:10px}
.ctx-chips{display:flex;gap:8px;flex-wrap:wrap}
.ctx-chip{background:#1e1e1e;border:1px solid #2a2a2a;border-radius:8px;padding:5px 12px;min-width:60px}
.ctx-chip-lbl{font-size:10px;font-weight:700;color:#555;letter-spacing:1px;text-transform:uppercase}
.ctx-chip-val{font-size:14px;font-weight:800;color:#fff;margin-top:2px}
.count-badge{background:#1a1a1a;border:1px solid #252525;border-radius:10px;padding:10px 14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.count-txt{color:#888;font-size:13px;font-weight:600;letter-spacing:1px;text-transform:uppercase}
.count-num{color:#c0392b;font-size:15px;font-weight:800}
.tbl-wrap{background:#161616;border:1px solid #252525;border-radius:14px;overflow:hidden}
.tbl-head{display:grid;background:#1e1e1e;border-bottom:1px solid #2a2a2a;padding:10px 14px}
.tbl-head span{font-size:10px;font-weight:800;letter-spacing:1.5px;color:#555;text-transform:uppercase}
.tbl-row{display:grid;padding:12px 14px;border-bottom:1px solid #1e1e1e;align-items:center;cursor:pointer;-webkit-tap-highlight-color:transparent}
.tbl-row:last-of-type{border-bottom:none}
.tbl-row.open{background:#1a1a1a}
.tr-main{font-size:15px;font-weight:700;color:#fff;word-break:break-word}
.tr-sub{font-size:11px;color:#666;margin-top:2px}
.tr-mrp{font-size:15px;font-weight:900;color:#000;background:#fff;border-radius:6px;padding:4px 8px;text-align:center;display:inline-block}
.tr-arr{color:#555;font-size:18px;text-align:right;transition:transform 0.2s}
.tbl-row.open .tr-arr{transform:rotate(90deg)}
.exp-panel{display:none;background:#111;border-bottom:1px solid #252525;padding:12px 14px}
.exp-panel.show{display:block}
.exp-line{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid #1a1a1a}
.exp-line:last-child{border-bottom:none}
.exp-lbl{font-size:11px;color:#555;font-weight:700;letter-spacing:1px;text-transform:uppercase;flex-shrink:0;margin-right:12px}
.exp-val{font-size:13px;color:#ccc;font-weight:600;text-align:right;word-break:break-word}
.exp-link{color:#c0392b;font-size:13px;font-weight:800;text-decoration:none}
.tbl-hint{font-size:11px;color:#444;text-align:center;padding:10px 0 4px}
.pin-gate{position:fixed;inset:0;background:#0a0a0a;z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.pin-gate-logo{width:160px;height:58px;object-fit:contain;margin-bottom:20px}
.pin-gate-title{font-size:26px;font-weight:900;color:#fff;margin-bottom:6px;text-align:center}
.pin-gate-sub{font-size:13px;color:#555;margin-bottom:32px;text-align:center}
.pin-gate-dots{display:flex;justify-content:center;gap:18px;margin-bottom:28px}
.pin-gate-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:320px;margin-bottom:14px}
.pin-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.85);z-index:100;align-items:flex-end;justify-content:center}
.pin-ov.open{display:flex}
.pin-sheet{background:#161616;border:1px solid #2a2a2a;border-top:3px solid #c0392b;border-bottom:none;border-radius:24px 24px 0 0;padding:18px 20px 44px;width:100%;max-width:480px;text-align:center}
.pin-handle{width:40px;height:4px;background:#2e2e2e;border-radius:2px;margin:0 auto 20px}
.pin-title{font-size:22px;font-weight:900;color:#fff;margin-bottom:4px}
.pin-sub{font-size:12px;color:#555;margin-bottom:24px;line-height:1.4}
.pin-dots{display:flex;justify-content:center;gap:18px;margin-bottom:24px}
.dot{width:16px;height:16px;border-radius:50%;background:#222;border:2px solid #333;transition:background 0.12s,transform 0.12s}
.dot.on{background:#c0392b;border-color:#c0392b;transform:scale(1.1)}
.dot.err{background:#e53935;border-color:#e53935}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:12px}
.pk{background:#222;border:1px solid #2e2e2e;border-radius:14px;height:64px;font-size:26px;font-weight:700;color:#fff;cursor:pointer;width:100%;-webkit-tap-highlight-color:transparent;transition:background 0.1s,transform 0.1s}
.pk:active{background:#c0392b;border-color:#c0392b;transform:scale(0.95)}
.pk.del{font-size:20px;color:#777}
.pk.ghost{background:transparent;border-color:transparent;pointer-events:none}
.pin-cancel{display:block;width:100%;background:none;border:none;color:#444;font-size:14px;padding:10px;cursor:pointer}
</style>
</head>
<body>
<div id="app"></div>
<div class="pin-ov" id="pOv">
  <div class="pin-sheet">
    <div class="pin-handle"></div>
    <div class="pin-title">Staff Access</div>
    <div class="pin-sub">Enter your PIN once — saved on this phone</div>
    <div class="pin-dots">
      <div class="dot" id="d0"></div><div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div><div class="dot" id="d3"></div>
    </div>
    <div class="pin-grid">
      <button class="pk" onclick="staffPk('1')">1</button>
      <button class="pk" onclick="staffPk('2')">2</button>
      <button class="pk" onclick="staffPk('3')">3</button>
      <button class="pk" onclick="staffPk('4')">4</button>
      <button class="pk" onclick="staffPk('5')">5</button>
      <button class="pk" onclick="staffPk('6')">6</button>
      <button class="pk" onclick="staffPk('7')">7</button>
      <button class="pk" onclick="staffPk('8')">8</button>
      <button class="pk" onclick="staffPk('9')">9</button>
      <button class="pk ghost"></button>
      <button class="pk" onclick="staffPk('0')">0</button>
      <button class="pk del" onclick="staffPd()">&#9003;</button>
    </div>
    <button class="pin-cancel" onclick="closeStaffPin()">Cancel</button>
  </div>
</div>
<script>
var FB  = "https://pricelist-qr-codes-default-rtdb.asia-southeast1.firebasedatabase.app";
var PIN = "1516";
var SK  = "darla_staff_v1";
var SAK = "darla_search_v1";
var BASE= window.location.origin+window.location.pathname;

// ── CATEGORY DEFINITIONS ──
// inputs: search fields in order (first is always Brand except Hangers)
// ctxCols: chips shown above results [label, firebaseKey]
// tblCols: columns in results table [label, firebaseKey]
// mrpLabel: label for MRP card
var CATS = {
  fabric: {
    label:"Fabric", icon:"&#129525;", codeSearch:false,
    inputs:["Brand","Catalog","S.No"],
    ctxCols:[["Brand","brand"],["Catalog","catalog"],["S.No","s_no"]],
    tblCols:[["Catalog","catalog"],["S.No","s_no"],["Item Details","item_details"],["MRP","mrp"],["Width","width"]],
    mrpLabel:"MRP / METRE"
  },
  hangers: {
    label:"Hangers", icon:"&#129693;", codeSearch:true,
    inputs:["Code"],
    ctxCols:[["Code","code"]],
    tblCols:[["Brand","brand"],["Catalog","catalog"],["S.No","s_no"],["Item Details","item_details"],["MRP","mrp"],["Width","width"]],
    mrpLabel:"MRP / METRE"
  },
  blinds: {
    label:"Blinds", icon:"&#129695;", codeSearch:false,
    inputs:["Brand","Blind Type","Catalog","Mechanism","Others"],
    ctxCols:[["Brand","brand"],["Blind Type","blind_type"],["Catalog","catalog"],["Mechanism","mechanism"],["Others","others"]],
    tblCols:[["Brand","brand"],["Blind Type","blind_type"],["Catalog","catalog"],["Mechanism","mechanism"],["Others","others"],["MRP","mrp"]],
    mrpLabel:"MRP"
  },
  wallpapers: {
    label:"Wallpapers", icon:"&#128444;", codeSearch:false,
    inputs:["Brand","Catalog","Design Details"],
    ctxCols:[["Brand","brand"],["Catalog","catalog"],["Design Details","design_details"]],
    tblCols:[["Design Details","design_details"],["Size","size"],["MRP","mrp"]],
    mrpLabel:"MRP / METRE"
  },
  motors: {
    label:"Motors", icon:"&#9881;", codeSearch:false,
    inputs:["Brand","Category","Product","Item Details"],
    ctxCols:[["Brand","brand"],["Category","category"],["Product","product"]],
    tblCols:[["Product","product"],["Item Details","item_details"],["MRP","mrp"],["Other Details","other_details"]],
    mrpLabel:"MRP"
  },
  beds: {
    label:"Beds", icon:"&#128716;", codeSearch:false,
    inputs:["Brand","Model","Size"],
    ctxCols:[["Brand","brand"],["Model","model"],["Size","size"]],
    tblCols:[["Model","model"],["Size","size"],["MRP","mrp"]],
    mrpLabel:"MRP"
  },
  sleepwell: {
    label:"Sleepwell", icon:"&#128716;", codeSearch:false,
    inputs:["Brand","Model","Size"],
    ctxCols:[["Brand","brand"],["Model","model"],["Size","size"]],
    tblCols:[["Model","model"],["Size","size"],["MRP","mrp"]],
    mrpLabel:"MRP"
  }
};

// ── SANITIZERS ──
function sk(str){
  return String(str||"").trim()
    .replace(/[^a-zA-Z0-9\-_]/g,"_")
    .replace(/_+/g,"_")
    .replace(/^_+|_+$/g,"")
    ||"_";
}
function codeKey(str){
  return String(str||"").trim().toUpperCase().replace(/[^A-Z0-9\-]/g,"");
}
function gv(r,key){
  if(!r)return"";
  var s=key.replace(/[^a-z0-9_]/g,"_").replace(/_+/g,"_").replace(/^_|_$/g,"");
  return r[s]||r[key]||"";
}
function getParam(n){return new URLSearchParams(window.location.search).get(n)||"";}
function esc(t){
  if(!t)return"";
  return String(t).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}
function spinner(m){return '<div class="spinner"><div class="spinner-ring"></div><p>'+(m||"Loading...")+'</p></div>';}
function isStaff(){return localStorage.getItem(SK)==="1";}
function hasSearchAccess(){return localStorage.getItem(SAK)==="1";}

// ── INIT ──
window.addEventListener("DOMContentLoaded",function(){
  var code    =getParam("code").trim().toUpperCase();
  var category=getParam("category").trim().toLowerCase()||"fabric";
  if(code) showProductPage(code,category);
  else     showHome();
});

// ── HEADER ──
function hdr(title,code,badge){
  return '<div class="hdr">'
    +'<img class="hdr-logo" src="https://DeepeshDarla.github.io/darla-pricelist/Darla%20Final%20Logo%20-%20Copy.jpg" onerror="this.style.display=\'none\'" alt="Darla">'
    +'<div class="hdr-brand">Darla Sales &amp; Agencies</div>'
    +'<div class="hdr-title">'+esc(title)+'</div>'
    +(code?'<div class="hdr-code">'+esc(code)+'</div>':'')
    +(badge?'<div class="staff-badge" id="sBadge">&#10003; Staff View</div>':'')
    +'</div>';
}

// ── HOME ──
function showHome(){
  var html=hdr("Product Lookup","",false)
    +'<div style="padding:16px 12px 8px;text-align:center">'
    +'<div style="font-size:13px;color:#555;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px">Select Category to Search</div>'
    +'</div><div class="cat-grid">';
  Object.keys(CATS).forEach(function(key){
    var c=CATS[key];
    html+='<div class="cat-btn" onclick="goSearch(\''+key+'\')">'
      +'<div class="cat-ico">'+c.icon+'</div>'
      +'<div class="cat-name">'+c.label+'</div></div>';
  });
  html+='</div>';
  document.getElementById("app").innerHTML=html;
}

function goSearch(cat){
  if(hasSearchAccess()) showAdvancedSearch(cat);
  else showSearchGate(cat);
}

// ── PIN GATE ──
var gateEn="",gateCat="";
function showSearchGate(cat){
  gateCat=cat; gateEn="";
  document.getElementById("app").innerHTML=
    '<div class="pin-gate">'
    +'<img class="pin-gate-logo" src="https://DeepeshDarla.github.io/darla-pricelist/Darla%20Final%20Logo%20-%20Copy.jpg" onerror="this.style.display=\'none\'" alt="Darla">'
    +'<div class="pin-gate-title">Staff Access Required</div>'
    +'<div class="pin-gate-sub">Enter your PIN to access search</div>'
    +'<div class="pin-gate-dots">'
    +'<div class="dot" id="gd0"></div><div class="dot" id="gd1"></div>'
    +'<div class="dot" id="gd2"></div><div class="dot" id="gd3"></div>'
    +'</div><div class="pin-gate-grid">'
    +[1,2,3,4,5,6,7,8,9].map(function(n){return '<button class="pk" onclick="gatePk(\''+n+'\')">'+n+'</button>';}).join("")
    +'<button class="pk ghost"></button>'
    +'<button class="pk" onclick="gatePk(\'0\')">0</button>'
    +'<button class="pk del" onclick="gatePd()">&#9003;</button>'
    +'</div>'
    +'<button class="pin-cancel" onclick="showHome()" style="color:#555;margin-top:8px">&#8592; Back</button>'
    +'</div>';
}
function gatePk(k){if(gateEn.length>=4)return;gateEn+=k;gDots();if(gateEn.length===4)setTimeout(gChk,80);}
function gatePd(){gateEn=gateEn.slice(0,-1);gDots();}
function gDots(err){
  for(var i=0;i<4;i++){
    var d=document.getElementById("gd"+i);if(!d)return;
    d.className="dot";
    if(err)d.classList.add("err");else if(i<gateEn.length)d.classList.add("on");
  }
}
function gChk(){
  if(gateEn===PIN){localStorage.setItem(SAK,"1");showAdvancedSearch(gateCat);}
  else{gDots(true);setTimeout(function(){gateEn="";gDots();},800);}
}

// ── SEARCH STATE ──
var BCM={},BCSM={},allBrands=[],currentCat="fabric",searchCtx={};

// ── ADVANCED SEARCH ──
function showAdvancedSearch(cat){
  currentCat=String(cat||"fabric").toLowerCase();
  var ci=CATS[currentCat]||CATS.fabric;
  BCM={};BCSM={};allBrands=[];searchCtx={};

  // Code search (Hangers)
  if(ci.codeSearch){
    document.getElementById("app").innerHTML=
      hdr(ci.label+" Search","",true)
      +'<div class="search-wrap"><div class="search-card">'
      +'<div class="field-lbl">Code</div><div class="lbl-line-sm"></div>'
      +'<div class="autocomplete-wrap">'
      +'<input class="ac-input" id="codeInp" placeholder="Enter code..." autocomplete="off" spellcheck="false" style="text-transform:uppercase">'
      +'</div>'
      +'<button class="submit-btn" onclick="doCodeSearch()">Search &#8594;</button>'
      +'<button class="clear-btn" onclick="clearSearch()">Clear</button>'
      +'<button class="clear-btn" style="margin-top:6px;color:#c0392b;border-color:#c0392b" onclick="showHome()">&#8592; Categories</button>'
      +'</div></div>'
      +'<div class="results-wrap"><div id="results"></div></div>';
    setTimeout(function(){
      var inp=document.getElementById("codeInp");
      if(inp)inp.addEventListener("keyup",function(e){if(e.key==="Enter")doCodeSearch();this.value=this.value.toUpperCase();});
    },0);
    return;
  }

  // Build dynamic input fields
  var fieldsHtml='';
  ci.inputs.forEach(function(label,idx){
    var fid=toFid(label);
    fieldsHtml+='<div class="field-lbl">'+label+'</div><div class="lbl-line-sm"></div>'
      +'<div class="autocomplete-wrap">'
      +'<input class="ac-input" id="f_'+fid+'" placeholder="'+(idx===0?'Loading...':'Select above first...')+'" '+(idx===0?'disabled':'')+' autocomplete="off" spellcheck="false">'
      +'<div class="dropdown" id="fd_'+fid+'"></div>'
      +'</div>';
  });

  document.getElementById("app").innerHTML=
    hdr(ci.label+" Search","",true)
    +'<div class="search-wrap"><div class="search-card">'
    +'<div id="status" class="status">Loading...</div>'
    +fieldsHtml
    +'<button class="submit-btn" id="searchBtn" onclick="doSearch()" disabled>Search &#8594;</button>'
    +'<button class="clear-btn" onclick="clearSearch()">Clear All</button>'
    +'<button class="clear-btn" style="margin-top:6px;color:#c0392b;border-color:#c0392b" onclick="showHome()">&#8592; Categories</button>'
    +'</div></div>'
    +'<div class="results-wrap"><div id="results"></div></div>';

  window._metaLoading=false;
  setTimeout(function(){loadMeta(1);},150);
}

function toFid(label){ return label.toLowerCase().replace(/[^a-z0-9]/g,"_"); }

// ── LOAD META ──
function loadMeta(attempt){
  if(window._metaLoading&&attempt===1)return;
  if(attempt===1)window._metaLoading=true;
  var st=document.getElementById("status");
  if(!st){window._metaLoading=false;return;}
  st.textContent=attempt>1?"Retrying... ("+attempt+"/3)":"Loading...";
  st.style.color="#555";st.style.cursor="default";st.onclick=null;

  fetch(FB+"/"+currentCat+"/meta.json")
    .then(function(r){if(!r.ok)throw new Error("HTTP "+r.status);return r.json();})
    .then(function(d){
      window._metaLoading=false;
      var st2=document.getElementById("status");
      var btn=document.getElementById("searchBtn");
      if(!st2)return;
      if(!d||!d.brandList||!d.brandList.length){
        st2.textContent="No data yet for this category.";return;
      }
      // Populate brand/catalog/sno maps
      allBrands=d.brandList.map(function(b){return b.label||b;}).sort();
      d.brandList.forEach(function(b){
        var bKey=b.key||b,bLabel=b.label||b;
        BCM[bLabel]=(d.bcmArr[bKey]||[]).map(function(c){return c.label||c;});
        (d.bcmArr[bKey]||[]).forEach(function(c){
          var cKey=c.key||c,cLabel=c.label||c;
          BCSM[bLabel+"|||"+cLabel]=(d.bcsmArr[bKey+"|||"+cKey]||[]).map(function(s){return s.label||s;});
        });
      });
      // Enable first field
      var ci=CATS[currentCat];
      var f0=document.getElementById("f_"+toFid(ci.inputs[0]));
      if(f0){f0.disabled=false;f0.placeholder="Type to search...";}
      if(btn)btn.disabled=false;
      st2.style.display="none";
      bindInputEvents();
    })
    .catch(function(){
      window._metaLoading=false;
      var st3=document.getElementById("status");
      if(!st3)return;
      if(attempt<3){setTimeout(function(){loadMeta(attempt+1);},3000);}
      else{
        st3.textContent="Tap here to retry";
        st3.style.color="#c0392b";st3.style.cursor="pointer";
        st3.onclick=function(){window._metaLoading=false;loadMeta(1);};
      }
    });
}

// ── BIND INPUT EVENTS ──
function bindInputEvents(){
  var ci=CATS[currentCat];if(!ci)return;
  ci.inputs.forEach(function(label,idx){
    var fid=toFid(label);
    var el=document.getElementById("f_"+fid);
    var drop=document.getElementById("fd_"+fid);
    if(!el)return;
    el.addEventListener("focus",function(){showDrop(drop,getOpts(idx),el,function(v){pickOpt(idx,v);});});
    el.addEventListener("input",function(){showDrop(drop,filt(getOpts(idx),this.value),el,function(v){pickOpt(idx,v);});});
    el.addEventListener("blur",function(){setTimeout(function(){if(drop)drop.classList.remove("show");},200);});
  });
}

function getOpts(idx){
  var ci=CATS[currentCat];
  if(idx===0) return allBrands;
  var brand=getFieldVal(ci.inputs[0]);
  if(idx===1) return BCM[brand]||[];
  if(idx>=2){
    var lvl1=getFieldVal(ci.inputs[1]);
    var third=BCSM[brand+"|||"+lvl1]||[];
    if(idx===2) return third;
    // For idx>=3, return same third level options as no deeper hierarchy
    return third;
  }
  return [];
}

function getFieldVal(label){
  var el=document.getElementById("f_"+toFid(label));
  return el?el.value.trim():"";
}

function pickOpt(idx,val){
  var ci=CATS[currentCat];
  var fid=toFid(ci.inputs[idx]);
  var el=document.getElementById("f_"+fid);
  var drop=document.getElementById("fd_"+fid);
  if(el)el.value=val;
  if(drop)drop.classList.remove("show");
  // Enable next, reset subsequent
  for(var j=idx+1;j<ci.inputs.length;j++){
    var jEl=document.getElementById("f_"+toFid(ci.inputs[j]));
    if(jEl){
      if(j===idx+1){jEl.disabled=false;jEl.placeholder="Type to search...";}
      else{jEl.value="";jEl.disabled=true;}
    }
  }
}

// ── SEARCH ──
function doCodeSearch(){
  var inp=document.getElementById("codeInp");if(!inp)return;
  var code=codeKey(inp.value.trim());if(!code)return;
  searchCtx={code:inp.value.trim().toUpperCase()};
  var res=document.getElementById("results");if(res)res.innerHTML=spinner("Searching...");
  fetch(FB+"/"+currentCat+"/by_code/"+encodeURIComponent(code)+".json")
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d){renderRows([],currentCat);return;}
      renderRows(Array.isArray(d)?d:Object.values(d),currentCat);
    })
    .catch(function(){var r=document.getElementById("results");if(r)r.innerHTML='<div class="nf"><h3>Error</h3><p>Please try again.</p></div>';});
}

function doSearch(){
  var ci=CATS[currentCat];if(!ci)return;
  var res=document.getElementById("results");if(res)res.innerHTML=spinner("Searching...");

  // Collect all field values into searchCtx
  searchCtx={};
  ci.inputs.forEach(function(label){
    var fid=toFid(label);
    searchCtx[fid]=getFieldVal(label);
  });

  var brand=searchCtx[toFid(ci.inputs[0])]||"";
  var lvl1 =ci.inputs[1]?searchCtx[toFid(ci.inputs[1])]||"":"";
  var lvl2 =ci.inputs[2]?searchCtx[toFid(ci.inputs[2])]||"":"";
  var bKey=sk(brand),cKey=sk(lvl1),sKey=sk(lvl2);

  var url;
  if(bKey&&bKey!="_"&&cKey&&cKey!="_"&&sKey&&sKey!="_")
    url=FB+"/"+currentCat+"/by_brand/"+encodeURIComponent(bKey)+"/"+encodeURIComponent(cKey)+"/"+encodeURIComponent(sKey)+".json";
  else if(bKey&&bKey!="_"&&cKey&&cKey!="_")
    url=FB+"/"+currentCat+"/by_brand/"+encodeURIComponent(bKey)+"/"+encodeURIComponent(cKey)+".json";
  else if(bKey&&bKey!="_")
    url=FB+"/"+currentCat+"/by_brand/"+encodeURIComponent(bKey)+".json";
  else
    url=FB+"/"+currentCat+"/by_code.json";

  fetch(url)
    .then(function(r){return r.json();})
    .then(function(data){
      if(!data){renderRows([],currentCat);return;}
      var results=[];
      function flatten(obj){
        if(Array.isArray(obj))obj.forEach(function(item){if(item&&item.code)results.push(item);});
        else if(obj&&typeof obj==="object")Object.values(obj).forEach(function(v){flatten(v);});
      }
      flatten(data);
      renderRows(results,currentCat);
    })
    .catch(function(){var r=document.getElementById("results");if(r)r.innerHTML='<div class="nf"><h3>Error</h3><p>Please try again.</p></div>';});
}

function clearSearch(){
  var ci=CATS[currentCat];if(!ci)return;
  if(ci.codeSearch){
    var inp=document.getElementById("codeInp");if(inp)inp.value="";
  } else {
    ci.inputs.forEach(function(label,idx){
      var el=document.getElementById("f_"+toFid(label));
      if(el){el.value="";if(idx>0)el.disabled=true;}
    });
  }
  searchCtx={};
  var r=document.getElementById("results");if(r)r.innerHTML="";
}

// ── PRODUCT PAGE (QR scan) ──
function showProductPage(code,cat){
  var safeCode=codeKey(code);
  var safeCat=String(cat||"fabric").toLowerCase();
  document.getElementById("app").innerHTML=
    hdr("Product Details",code,true)
    +'<div class="wrap"><div id="results">'+spinner("Loading...")+'</div></div>'
    +'<button class="fab-btn" id="fabBtn" onclick="openStaffPin()">&#128274; Staff Login</button>';
  fetch(FB+"/"+safeCat+"/by_code/"+encodeURIComponent(safeCode)+".json")
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d){renderRows([],safeCat);return;}
      renderRows(Array.isArray(d)?d:Object.values(d),safeCat);
    })
    .catch(function(){
      var r=document.getElementById("results");
      if(r)r.innerHTML='<div class="nf"><h3>Error</h3><p>Please try again</p><a class="back-link" href="'+BASE+'">&#8592; Home</a></div>';
    });
}

// ── RENDER ──
function renderRows(rows,cat){
  var el=document.getElementById("results");if(!el)return;
  if(!rows||!rows.length){
    el.innerHTML='<div class="nf"><div class="nf-ico">&#128269;</div><h3>Not Found</h3><p>No matching products</p><a class="back-link" href="'+BASE+'">&#8592; Home</a></div>';
    return;
  }
  window._rows=rows;window._cat=cat;
  var ci=CATS[cat]||CATS.fabric;
  var staff=isStaff();

  // Build context chips header
  var ctxHtml="";
  if(Object.keys(searchCtx).length>0){
    var chips="";
    if(ci.codeSearch){
      chips+='<div class="ctx-chip"><div class="ctx-chip-lbl">Code</div><div class="ctx-chip-val">'+esc(searchCtx.code||"")+'</div></div>';
    } else {
      ci.ctxCols.forEach(function(col){
        var val=searchCtx[col[1]]||searchCtx[toFid(col[0])]||gv(rows[0],col[1])||"";
        if(val)chips+='<div class="ctx-chip"><div class="ctx-chip-lbl">'+col[0]+'</div><div class="ctx-chip-val">'+esc(val)+'</div></div>';
      });
    }
    if(chips)ctxHtml='<div class="ctx-hdr"><div class="ctx-chips">'+chips+'</div></div>';
  }

  var tbl=rows.length===1?buildSingleCard(rows[0],cat,ci,staff):buildTable(rows,cat,ci,staff);
  el.innerHTML=ctxHtml+tbl;

  var fb=document.getElementById("fabBtn");
  var sb=document.getElementById("sBadge");
  if(staff){if(sb)sb.style.display="inline-block";if(fb)fb.style.display="none";}
  else{if(fb)fb.style.display="flex";}
}

// ── SINGLE CARD VIEW ──
function buildSingleCard(r,cat,ci,staff){
  var html='<div class="item-group">';
  if(staff&&r.code) html+=card("CODE",r.code,"card-accent-blue");
  if(r.brand)       html+=card("BRAND",r.brand,"card-accent-red");

  if(cat==="fabric"){
    if(r.catalog)           html+=card("CATALOG",r.catalog,"card-accent-blue");
    if(gv(r,"s_no"))        html+=card("S.NO",gv(r,"s_no"),"");
    if(gv(r,"item_details"))html+=cardSm("ITEM DETAILS",gv(r,"item_details"));
    if(r.width)             html+=card("WIDTH",r.width,"");
    if(r.mrp)               html+=cardMrp(r.mrp,ci.mrpLabel);
  } else if(cat==="hangers"){
    if(r.catalog)           html+=card("CATALOG",r.catalog,"card-accent-blue");
    if(gv(r,"s_no"))        html+=card("S.NO",gv(r,"s_no"),"");
    if(gv(r,"item_details"))html+=cardSm("ITEM DETAILS",gv(r,"item_details"));
    if(r.width)             html+=card("WIDTH",r.width,"");
    if(r.mrp)               html+=cardMrp(r.mrp,ci.mrpLabel);
  } else if(cat==="blinds"){
    if(gv(r,"blind_type"))  html+=card("BLIND TYPE",gv(r,"blind_type"),"card-accent-blue");
    if(r.catalog)           html+=card("CATALOG",r.catalog,"");
    if(r.mechanism)         html+=card("MECHANISM",r.mechanism,"");
    if(r.others)            html+=card("OTHERS",r.others,"");
    if(r.mrp)               html+=cardMrp(r.mrp,ci.mrpLabel);
  } else if(cat==="wallpapers"){
    if(r.catalog)               html+=card("CATALOG",r.catalog,"card-accent-blue");
    if(gv(r,"design_details"))  html+=cardSm("DESIGN DETAILS",gv(r,"design_details"));
    if(r.size)                  html+=card("SIZE",r.size,"");
    if(r.mrp)                   html+=cardMrp(r.mrp,ci.mrpLabel);
  } else if(cat==="motors"){
    if(r.category)              html+=card("CATEGORY",r.category,"card-accent-blue");
    if(r.product)               html+=card("PRODUCT",r.product,"");
    if(gv(r,"item_details"))    html+=cardSm("ITEM DETAILS",gv(r,"item_details"));
    if(gv(r,"other_details"))   html+=cardSm("OTHER DETAILS",gv(r,"other_details"));
    if(r.mrp)                   html+=cardMrp(r.mrp,ci.mrpLabel);
  } else if(cat==="beds"||cat==="sleepwell"){
    if(r.model)     html+=card("MODEL",r.model,"card-accent-blue");
    if(r.thickness) html+=card("THICKNESS",r.thickness,"");
    if(r.width)     html+=card("WIDTH",r.width,"");
    if(r.length)    html+=card("LENGTH",r.length,"");
    if(r.size)      html+=card("SIZE",r.size,"");
    if(r.mrp)       html+=cardMrp(r.mrp,ci.mrpLabel);
  }

  if(r.link&&r.link.indexOf("http")===0)
    html+='<div class="card"><div class="lbl">LINK</div><div class="lbl-line"></div><a href="'+esc(r.link)+'" target="_blank" class="link-btn">View Product &#8599;</a></div>';
  return html+'</div>';
}

// ── TABLE VIEW ──
function buildTable(rows,cat,ci,staff){
  var tblCols=ci.tblCols||[["MRP","mrp"]];

  // Build grid columns: first col flexible, rest fixed, arrow
  var gridCols="2fr";
  tblCols.slice(1).forEach(function(){gridCols+=" 70px";});
  gridCols+=" 24px";

  var html='<div class="count-badge"><span class="count-txt">Items Found</span><span class="count-num">'+rows.length+' items</span></div>'
    +'<div class="tbl-wrap">'
    +'<div class="tbl-head" style="grid-template-columns:'+gridCols+'">'
    +'<span>'+tblCols[0][0]+'</span>';
  tblCols.slice(1).forEach(function(c){html+='<span style="text-align:center">'+c[0]+'</span>';});
  html+='<span></span></div>';

  rows.forEach(function(r){
    // Main column value
    var mainVal=gv(r,tblCols[0][1])||r[tblCols[0][1]]||"—";
    // Sub text under main
    var sub="";
    if(cat==="fabric"||cat==="hangers") sub=gv(r,"s_no")||"";
    else if(cat==="blinds") sub=gv(r,"blind_type")||"";

    // Extra columns
    var extraHtml="";
    tblCols.slice(1).forEach(function(c){
      var v=gv(r,c[1])||r[c[1]]||"";
      if(c[1]==="mrp"&&v){
        extraHtml+='<div style="text-align:center"><span class="tr-mrp">&#8377;'+esc(v)+'</span></div>';
      } else {
        extraHtml+='<div style="text-align:center;font-size:12px;color:#aaa;font-weight:600">'+(v?esc(v):"—")+'</div>';
      }
    });

    // Expand panel — all fields not already in table columns
    var shown={};
    tblCols.forEach(function(c){shown[c[1]]=true;});
    if(cat==="fabric"||cat==="hangers") shown["s_no"]=true; // already in sub

    var allFields=[
      ["Code","code"],["Brand","brand"],["Catalog","catalog"],
      ["S.No","s_no"],["Item Details","item_details"],
      ["Blind Type","blind_type"],["Mechanism","mechanism"],["Others","others"],
      ["Design Details","design_details"],
      ["Category","category"],["Product","product"],["Other Details","other_details"],
      ["Model","model"],["Thickness","thickness"],["Width","width"],
      ["Length","length"],["Size","size"],["MRP","mrp"]
    ];
    var expandHtml="";
    allFields.forEach(function(f){
      if(!shown[f[1]]){
        var v=gv(r,f[1])||r[f[1]]||"";
        if(v)expandHtml+=expLine(f[0],v);
      }
    });
    if(r.link&&r.link.indexOf("http")===0)expandHtml+=expLinkLine(r.link);

    html+='<div class="tbl-row" style="grid-template-columns:'+gridCols+'" onclick="toggleRow(this)">'
      +'<div><div class="tr-main">'+esc(mainVal)+'</div>'+(sub?'<div class="tr-sub">'+esc(sub)+'</div>':'')+'</div>'
      +extraHtml
      +'<div class="tr-arr">'+(expandHtml?"&#8250;":"")+'</div></div>'
      +'<div class="exp-panel">'+expandHtml+'</div>';
  });

  return html+'</div><div class="tbl-hint">Tap row to expand details</div>';
}

// ── CARD HELPERS ──
function card(lbl,val,cls){if(!val)return"";return '<div class="card '+(cls||'')+'"><div class="lbl">'+lbl+'</div><div class="lbl-line"></div><div class="val">'+esc(val)+'</div></div>';}
function cardSm(lbl,val){if(!val)return"";return '<div class="card"><div class="lbl">'+lbl+'</div><div class="lbl-line"></div><div class="val-sm">'+esc(val)+'</div></div>';}
function cardMrp(val,lbl){if(!val)return"";return '<div class="card card-mrp"><div class="lbl lbl-dark">'+(lbl||"MRP")+'</div><div class="lbl-line"></div><div class="mrp-row"><span class="rsym">&#8377;</span><span class="mrp-val">'+esc(val)+'</span></div></div>';}
function expLine(lbl,val){if(!val)return"";return '<div class="exp-line"><span class="exp-lbl">'+lbl+'</span><span class="exp-val">'+esc(val)+'</span></div>';}
function expLinkLine(url){if(!url||url.indexOf("http")!==0)return"";return '<div class="exp-line"><span class="exp-lbl">Link</span><span class="exp-val"><a class="exp-link" href="'+esc(url)+'" target="_blank">View &#8599;</a></span></div>';}

function toggleRow(row){
  var panel=row.nextElementSibling;
  var isOpen=panel.classList.contains("show");
  document.querySelectorAll(".exp-panel.show").forEach(function(p){p.classList.remove("show");});
  document.querySelectorAll(".tbl-row.open").forEach(function(r){r.classList.remove("open");});
  if(!isOpen){panel.classList.add("show");row.classList.add("open");row.scrollIntoView({behavior:"smooth",block:"nearest"});}
}
function filt(arr,q){
  if(!arr||!arr.length)return[];
  if(!q||!q.trim())return arr.slice(0,50);
  var l=q.trim().toLowerCase();
  return arr.filter(function(x){return String(x).toLowerCase().indexOf(l)!==-1;}).slice(0,50);
}
function showDrop(drop,items,inp,onSel){
  if(!drop||!items||!items.length){if(drop)drop.classList.remove("show");return;}
  var q=(inp.value||"").trim().toLowerCase();
  var h=items.map(function(item){
    var s=String(item).replace(/&/g,"&amp;").replace(/</g,"&lt;");
    var hi=q?s.replace(new RegExp("("+q.replace(/[.*+?^${}()|[\]\\]/g,"\\$&")+")","gi"),"<mark>$1</mark>"):s;
    return "<div class='dd-item' onmousedown='selItem(this,event)'>"+hi+"</div>";
  }).join("");
  drop.innerHTML=h;drop.classList.add("show");drop._cb=onSel;
}
function selItem(el,ev){ev.preventDefault();var cb=el.parentElement._cb;if(cb)cb(el.textContent);}

// ── STAFF PIN ──
var staffEn="";
function openStaffPin(){staffEn="";sDots();document.getElementById("pOv").classList.add("open");}
function closeStaffPin(){document.getElementById("pOv").classList.remove("open");staffEn="";sDots();}
function staffPk(k){if(staffEn.length>=4)return;staffEn+=k;sDots();if(staffEn.length===4)setTimeout(sChk,80);}
function staffPd(){staffEn=staffEn.slice(0,-1);sDots();}
function sDots(err){
  for(var i=0;i<4;i++){
    var d=document.getElementById("d"+i);if(!d)return;
    d.className="dot";
    if(err)d.classList.add("err");else if(i<staffEn.length)d.classList.add("on");
  }
}
function sChk(){
  if(staffEn===PIN){
    localStorage.setItem(SK,"1");localStorage.setItem(SAK,"1");
    closeStaffPin();
    if(window._rows)renderRows(window._rows,window._cat||"fabric");
  } else {sDots(true);setTimeout(function(){staffEn="";sDots();},800);}
}
</script>
