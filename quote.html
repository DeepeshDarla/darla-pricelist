window.addEventListener('DOMContentLoaded', function(){
  addPinTouchFeedback();
  loadStaff();

  AUTH.onAuthStateChanged(function(user) {
    _fbReady = true;
    var loginEl = document.getElementById('screen-login');
    var loginVisible = loginEl && loginEl.classList.contains('active');
    if(user && !user.isAnonymous) {
      if(loginVisible) {
        // Page load with active session OR just signed in via checkPin
        var cached = null;
        try{ cached = JSON.parse(localStorage.getItem('darla_staff')||'null'); }catch(e){}
        if(cached && cached.name){ APP.staff = cached; }
        else { APP.staff = { name: user.displayName || (user.email||'').split('@')[0] || 'Staff', uid: user.uid }; }
        DB.collection('staff').doc(user.uid).update({ lastLoginAt: firebase.firestore.FieldValue.serverTimestamp() }).catch(function(){});
        var lid = qp('load');
        if(lid){ _dismissLogin(function(){ loadById(lid); }); return; }
        // Capture any unsaved draft BEFORE clearForm() wipes localStorage
        var _pendingDraft=null;
        try{ _pendingDraft=JSON.parse(localStorage.getItem('darla_draft')||'null'); }catch(e){}
        clearForm();
        _dismissLogin(function(){
          setNavForCustomer(); goTo('screen-customer');
          if(_pendingDraft&&_pendingDraft.customer&&_pendingDraft.customer.name&&
             (((_pendingDraft.rooms||[]).length>0)||_pendingDraft.id)){
            _showDraftResume(_pendingDraft);
          }
        });
      }
      // else: already past login, auth state refreshed — do nothing
    } else {
      // Not signed in — ensure login screen is showing
      if(!loginVisible && loginEl) {
        loginEl.classList.add('active');
        document.getElementById('top-nav').classList.remove('visible');
      }
    }
  });
});

// Animate login screen away, then run callback
function _dismissLogin(cb) {
  var el = document.getElementById('screen-login');
  if(!el || !el.classList.contains('active')) { if(cb) cb(); return; }
  el.classList.add('ls-exit');
  setTimeout(function(){
    el.classList.remove('active','ls-exit');
    if(cb) cb();
  }, 400);
}

function addPinTouchFeedback() {
  document.querySelectorAll('.pin-key').forEach(function(btn){
    btn.addEventListener('touchstart',function(){ this.classList.add('pressed'); },{passive:true});
    btn.addEventListener('touchend',function(){ var s=this; setTimeout(function(){ s.classList.remove('pressed'); },120); },{passive:true});
    btn.addEventListener('touchcancel',function(){ this.classList.remove('pressed'); },{passive:true});
  });
}

function buildSales1Drop() {

function loadStaff() {
  // Seed from localStorage cache for instant display
  try{
    var c=localStorage.getItem('darla_staff_cache');
    if(c){ var l=JSON.parse(c); if(l&&l.length){ STAFF=l; buildStaffDrop(); buildSales1Drop(); }}
  }catch(e){}

  // Fetch fresh list from Firestore staffDirectory (simple get — no composite index needed)
  DB.collection('staffDirectory').get()
    .then(function(snap){
      var list=[];
      snap.forEach(function(doc){ var d=doc.data(); if(d.active!==false) list.push({ uid:doc.id, name:d.name, role:d.role }); });
      list.sort(function(a,b){ return a.name.localeCompare(b.name); });
      if(list.length){ STAFF=list; localStorage.setItem('darla_staff_cache',JSON.stringify(list)); buildStaffDrop(); buildSales1Drop(); }
    }).catch(function(){
      // Firestore unavailable — cached list already shown
    });
}

function pk(k) {
  if(!_pickedStaff){ document.getElementById('pinErr').textContent='Select your name first'; return; }
  if(_pinBuf.length>=4) return;
  _pinBuf+=k; dotUpdate();
  if(_pinBuf.length===4) setTimeout(checkPin,100);
}
function pd(){ _pinBuf=_pinBuf.slice(0,-1); dotUpdate(); }
function dotUpdate(err) {
  for(var i=0;i<4;i++){
    var d=document.getElementById('pd'+i); if(!d) continue;
    d.className='pin-dot';
    if(err) d.classList.add('error');
    else if(i<_pinBuf.length) d.classList.add('filled');
  }
}
var PIN_SUFFIX = '!drla'; // appended to every PIN before Firebase Auth — never shown to user

function checkPin() {
  if(!_pickedStaff) return;
  var email = _pickedStaff.name.toLowerCase().replace(/\s+/g,'.') + '@darla.in';
  AUTH.signInWithEmailAndPassword(email, _pinBuf + PIN_SUFFIX)
    .then(function(cred){
      // Store staff in local state; onAuthStateChanged handles navigation
      APP.staff = Object.assign({}, _pickedStaff, { uid: cred.user.uid });
      localStorage.setItem('darla_staff', JSON.stringify(APP.staff));
    })
    .catch(function(err){
      dotUpdate(true);
      var msg = (err.code==='auth/wrong-password'||err.code==='auth/invalid-credential')
        ? 'Incorrect PIN — try again' : 'Login error: '+err.message;
      document.getElementById('pinErr').textContent = msg;
      setTimeout(function(){ _pinBuf=''; dotUpdate(); document.getElementById('pinErr').textContent=''; }, 1400);
    });
}

function lookupCustomerByMobile(mobile) {
  clearTimeout(_custSearchTimer);
  mobile = (mobile||'').trim();
  var resultsEl = document.getElementById('custSearchResults');
  APP.quote.customerId = null; _custResults = [];
  if(mobile.length < 10){ resultsEl.innerHTML=''; return; }
  _custSearchTimer = setTimeout(function(){
    DB.collection('customers').where('mobile','==',mobile).limit(10).get()
      .then(function(snap){
        resultsEl.innerHTML='';
        if(snap.empty) return; // new customer — leave form blank
        snap.forEach(function(doc){ _custResults.push(Object.assign({id:doc.id},doc.data())); });
        if(_custResults.length===1){ selectCustomer(0); return; }
        // Multiple names on same number — show picker
        var h='<div style="margin-top:8px;border:1px solid var(--border);border-radius:var(--r-md);overflow:hidden">'
          +'<div style="padding:7px 12px;font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;background:var(--bg2)">Select customer</div>';
        _custResults.forEach(function(c,i){
          h+='<div style="padding:12px 14px;border-top:1px solid var(--border);cursor:pointer;background:var(--bg)" onclick="selectCustomer('+i+')">'
            +'<div style="font-size:14px;font-weight:700;color:var(--text)">'+esc(c.name)+'</div>'
            +(c.addr?'<div style="font-size:12px;color:var(--text3)">'+esc(c.addr)+'</div>':'')
            +'</div>';
        });
        h+='</div>';
        resultsEl.innerHTML=h;

  _custResults=[];

function _upsertCustomer(customer, existingId) {
  if(!DB||!AUTH.currentUser||AUTH.currentUser.isAnonymous) return;
  var data={
    name:customer.name, nameLower:customer.name.toLowerCase(),
    mobile:customer.mobile, arch:customer.arch||'', addr:customer.addr||'',
    updatedAt:firebase.firestore.FieldValue.serverTimestamp()
  };
  if(existingId){
    DB.collection('customers').doc(existingId).update(data)
      .then(function(){ APP.quote.customerId=existingId; saveDraftLocal(); })
      .catch(function(){});
    return;
  }
  // No prior record selected — create a new customer document
  // (multiple customers can legitimately share a mobile number)
  data.createdAt=firebase.firestore.FieldValue.serverTimestamp();
  data.createdBy=APP.staff?APP.staff.name:'';
  DB.collection('customers').add(data).then(function(ref){
    APP.quote.customerId=ref.id;
    saveDraftLocal();
  }).catch(function(){});
}

function goTo(screenId) {
  document.querySelectorAll('.screen').forEach(function(s){ s.classList.remove('active'); });
  var s=document.getElementById(screenId); if(s) s.classList.add('active');
  window.scrollTo(0,0);
  document.getElementById('bldBar').classList.toggle('visible', _bldScreens.indexOf(screenId)!==-1);
  document.getElementById('sumBar').classList.toggle('visible', screenId==='screen-summary');

  var quoteScreens=['screen-builder','screen-summary','screen-room-measurements',
    'screen-room-selections','screen-add-area','screen-add-selection','screen-add-hardware'];
  if(quoteScreens.indexOf(screenId)!==-1) _startAutoSave(); else _stopAutoSave();
  if(screenId==='screen-builder')           { renderBld(); setNavForBuilder(); }
  else if(screenId==='screen-summary')      { renderSum(); setNavForSummary(); }
  else if(screenId==='screen-quotes')       { renderQList(); setNavForQuotes(); }
  else if(screenId==='screen-customer')     { setNavForCustomer(); }
  else if(screenId==='screen-room-measurements') { renderMeasurements(); setNavForRoom('Measurements'); }
  else if(screenId==='screen-room-selections')   { renderSelections(); setNavForRoom('Selections'); }
  else if(screenId==='screen-add-area')     { renderAddArea(); setNavForRoom(_editAreaIdx>=0?'Edit Area':'Add Area'); }
  else if(screenId==='screen-add-selection'){ renderAddSelection(); setNavForRoom(_editSelIdx>=0?'Edit Selection':'Add Selection'); }
  else if(screenId==='screen-add-hardware') { renderAddHardware(); setNavForRoom('Add Hardware'); }
  else if(screenId==='screen-settings')     { renderSettings(); setNavForSettings(); }
}

function startQuote() {
  var name=document.getElementById('cName').value.trim();
  var mob=document.getElementById('cMobile').value.trim();
  if(!name){ showToast('Enter customer name'); return; }
  if(!mob||mob.length<10){ showToast('Enter valid 10-digit mobile'); return; }
  APP.quote.customer={name:name,mobile:mob,arch:document.getElementById('cArch').value.trim(),addr:document.getElementById('cAddr').value.trim()};

  APP.quote.staff2=document.getElementById('cSales2').value.trim();
  _upsertCustomer(APP.quote.customer, APP.quote.customerId||null);
  if(APP.quote.id){
    saveDraft(); setNavForBuilder(); goTo('screen-builder');
    startQuoteSync(APP.quote.id);
    return;
  }
  // New quote — get atomic ID from Cloud Function then save to Firestore
  APP.quote.date = new Date().toLocaleDateString('en-IN');
  _generateQuoteId(function(qid){
    APP.quote.id = qid;
    saveDraftLocal();
    _saveToFirestore(false);
    startQuoteSync(qid);
    setNavForBuilder();
    goTo('screen-builder');
  });
}

function openTxModal(ri,wi) {
  document.getElementById('mTxRi').value=ri;
  document.getElementById('mTxWi').value=wi;
  openModal('mTx');
}
function confirmTx(type) {
  var ri=parseInt(document.getElementById('mTxRi').value);
  var wi=parseInt(document.getElementById('mTxWi').value);
  var room=APP.quote.rooms[ri];
  var tx={id:uid(),type:type,components:[],stitchStyle:'Pleated',blindMode:'single'};
  // Auto-copy products from previous window
  if(wi>0){
    var srcComps=[];
    for(var pw=wi-1;pw>=0;pw--){
      var prevWin=room.windows[pw];
      if(!prevWin||!prevWin.treatments) continue;
      prevWin.treatments.forEach(function(pt){
        if(pt.type==='curtains'||pt.type==='roman_blinds'){
          pt.components.forEach(function(c){
            if(c.product&&(c.layer==='main'||c.layer==='sheer'))
              srcComps.push({layer:c.layer,product:c.product,stitchStyle:c.stitchStyle||'Pleated'});
          });
        }
      });
      if(srcComps.length>0) break;
    }
    if(type==='curtains'&&srcComps.length>0){
      srcComps.forEach(function(sc){
        tx.components.push({id:uid(),layer:sc.layer,product:JSON.parse(JSON.stringify(sc.product)),stitchStyle:sc.stitchStyle,discount:0,calc:{}});
      });
      showToast('Products copied ✓');
    } else if(type==='roman_blinds'&&srcComps.length>0){
      var hasMain=srcComps.some(function(c){ return c.layer==='main'; });
      var hasSheer=srcComps.some(function(c){ return c.layer==='sheer'; });
      tx.blindMode=hasSheer?'double':'single';
      srcComps.forEach(function(sc){
        if(sc.layer==='main'||(sc.layer==='sheer'&&tx.blindMode==='double'))
          tx.components.push({id:uid(),layer:sc.layer,product:JSON.parse(JSON.stringify(sc.product)),stitchStyle:sc.stitchStyle,discount:0,calc:{}});
      });
      showToast('Products copied ('+tx.blindMode+') ✓');
    }
  }
  room.windows[wi].treatments.push(tx);
  closeModal('mTx'); saveDraft(); renderBld();
}
function delTx(ri,wi,ti) {
  APP.quote.rooms[ri].windows[wi].treatments.splice(ti,1); saveDraft(); renderBld();

function addMeasForRoom(ri){
  _activeRoom=ri;
  var r=APP.quote.rooms[ri]; if(!r) return;
  var areas=r.areas||[], sels=r.selections||[];
  function hasSel(a){ return sels.some(function(s){ return s.openingId===a.id||(s.areaIds||[]).indexOf(a.id)!==-1; }); }
  // first priority: unmeasured AND already has a selection (quote needs dims to calculate)
  for(var ai=0;ai<areas.length;ai++){
    if((!areas[ai].width||!areas[ai].height)&&hasSel(areas[ai])){ openEditArea(ai); return; }
  }
  // second priority: any other unmeasured area
  for(var ai=0;ai<areas.length;ai++){
    if(!areas[ai].width||!areas[ai].height){ openEditArea(ai); return; }
  }
  _editAreaIdx=-1; goTo('screen-add-area');
}
function goToAddMeasurements(){
  for(var ri=0;ri<APP.quote.rooms.length;ri++){
    var r=APP.quote.rooms[ri];
    if((r.areas||[]).some(function(a){ return !a.width||!a.height; })){
      _activeRoom=ri; goTo('screen-room-measurements'); return;
    }
  }
  _activeRoom=Math.max(0,APP.quote.rooms.length-1); goTo('screen-room-measurements');
}
function goToAddSelections(){
  for(var ri=0;ri<APP.quote.rooms.length;ri++){
    var r=APP.quote.rooms[ri];
    var areas=r.areas||[], sels=r.selections||[];
    for(var ai=0;ai<areas.length;ai++){
      var a=areas[ai];
      if(!sels.some(function(s){ return s.openingId===a.id||(s.areaIds||[]).indexOf(a.id)!==-1; })){
        _activeRoom=ri; addSelForArea(a.id); return;
      }
    }
  }
  _activeRoom=Math.max(0,APP.quote.rooms.length-1); startAddSel();
}

function saveArea(){

  var name=(document.getElementById('areaName').value||'').trim();
  var type=document.getElementById('areaType').value;
  var w=parseFloat(document.getElementById('areaW').value)||0;
  var h2=parseFloat(document.getElementById('areaH').value)||0;
  var qty=parseInt(document.getElementById('areaQty').value)||1;
  var rem=(document.getElementById('areaRemarks').value||'').trim();
  if(!w||!h2){ showToast('Enter width and height'); return; }
  if(!name) name=autoAreaName(room,type);
  var area={id:'a_'+Date.now(),name:name,type:type,width:w,height:h2,qty:qty,remarks:rem};
  if(type==='roman_blinds') area.blindMode=_areaState.blindMode||'single';
  if(type==='headboard') area.rotationAllowed=_areaState.rotationAllowed!==false;
  if(type==='flooring'){ var ftEl=document.getElementById('areaFloorType'); area.flooringType=ftEl?ftEl.value:'wooden'; }

  if(editing){ area.id=room.areas[_editAreaIdx].id; room.areas[_editAreaIdx]=area; }
  else {
    if(!room.areas) room.areas=[];
    room.areas.push(area);
  }

    (room.areas||[]).forEach(function(a){ if(a.id!==area.id&&a.type===type){ a.width=w; a.height=h2; a.qty=qty; } });

function handleFabricPhoto(evt,i){
  var file=evt.target.files[0]; if(!file) return;
  var reader=new FileReader();
  reader.onload=function(e){
    var img=new Image();
    img.onload=function(){
      var maxW=480, scale=Math.min(1,maxW/img.width);
      var canvas=document.createElement('canvas');
      canvas.width=img.width*scale; canvas.height=img.height*scale;
      canvas.getContext('2d').drawImage(img,0,0,canvas.width,canvas.height);
      var dataUrl=canvas.toDataURL('image/jpeg',0.65);
      if(i<0){ _selSheerProducts[Math.abs(i)-1].photo=dataUrl; }
      else { _selProducts[i].photo=dataUrl; var key=fabricPhotoKey(_selProducts[i].product||{}); if(key) saveFabricPhoto(key,dataUrl); }
      renderAddSelection();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

function _renderRatesPanel(){

    h+='<div id="selPostSave"></div>';
    h+='<button class="btn" style="width:100%;margin-top:20px" onclick="saveSelection()">Save Selections</button>';

function saveSelection(){
  var room=APP.quote.rooms[_activeRoom]; if(!room) return;
  var rem=_selRemarks;
  if(!_selCategory){ showToast('Select a category'); return; }
  var oid=_selOpeningId||(_selAreaIds[0]||null);
  var aids=oid?[oid]:_selAreaIds.slice();
  var sel={
    id:'s_'+Date.now(), category:_selCategory,
    products:_selProducts.map(function(p){ return Object.assign({},p,{product:Object.assign({},p.product||{})}); }),
    openingId:oid, areaIds:aids, remarks:rem, stitchStyle:_selStitch,
    stitchStyleType:_selStitchStyle, fabricSplit:_selFabricSplit.slice(),
    boxSqft:_selBoxSqft?parseFloat(_selBoxSqft):null,
    rollSqft:_selRollSqft?parseFloat(_selRollSqft):null,
    trackType:_selTrackType, ctrkType:_selCtrkType, ctrkColor:_selCtrkColor,
    ctrkRing:_selCtrkRing, ctrkFinial:_selCtrkFinial||null,
    rates:Object.assign({},_selRates),
    lining:_selLining, romanType:_selRomanType||undefined
  };
  var editing=_editSelIdx>=0;
  if(editing){ sel.id=(room.selections[_editSelIdx]||{}).id||sel.id; room.selections[_editSelIdx]=sel; }
  else { if(!room.selections) room.selections=[]; room.selections.push(sel); }
  // If sheer layer enabled, also save curtains_sheer selection
  if(!editing && _selCategory==='curtains_main' && _selSheerEnabled && _selSheerProducts.length){
    var sheerSel={
      id:'s_'+Date.now()+'1', category:'curtains_sheer',
      products:_selSheerProducts.map(function(p){ return Object.assign({},p,{product:Object.assign({},p.product||{})}); }),
      openingId:oid, areaIds:aids, remarks:'', stitchStyle:_selSheerStitch,
      stitchStyleType:_selSheerStitchStyle, fabricSplit:[], trackType:'', rates:(function(){ var r=Object.assign({},_selRates); delete r.stitchRate; return r; })(),
      lining:_selLining
    };
    room.selections.push(sheerSel);
  }
  _lastSavedAreaIds = aids.slice();
  _lastSavedOpeningId = oid;
  saveDraft(); showToast((editing?'Updated':'Saved')+' ✓');
  if(_editFromSummary){
    _editFromSummary=false;
    renderSum(); goTo('screen-summary');
    return;
  }
  _renderSelPostSave(editing);
}
function copySelectionsFromArea(srcAreaId,destAreaId){
  var room=APP.quote.rooms[_activeRoom]; if(!room) return;
  var srcSels=(room.selections||[]).filter(function(s){ return s.openingId===srcAreaId||(s.areaIds||[]).indexOf(srcAreaId)!==-1; });
  if(!srcSels.length){ showToast('No selections to copy'); return; }
  srcSels.forEach(function(s,idx){
    var clone=JSON.parse(JSON.stringify(s));
    clone.id='s_'+Date.now()+idx; clone.openingId=destAreaId; clone.areaIds=[destAreaId];
    room.selections.push(clone);
  });
  saveDraft(); showToast(srcSels.length+' selection'+(srcSels.length>1?'s':'')+' copied ✓');
  var destArea=(room.areas||[]).find(function(a){ return a.id===destAreaId; });
  if(destArea) _renderAreaPostSave(destArea,false);
}
function applySelToAllAreas(selId){
  var room=APP.quote.rooms[_activeRoom]; if(!room) return;
  var srcSel=(room.selections||[]).find(function(s){ return s.id===selId; }); if(!srcSel) return;
  var areaType=_catToAreaType(srcSel.category);
  var sameUncov=(room.areas||[]).filter(function(a){
    if(a.id===srcSel.openingId) return false;
    if(areaType&&a.type!==areaType) return false;
    return !(room.selections||[]).some(function(s){ return s.category===srcSel.category&&(s.openingId===a.id||(s.areaIds||[]).indexOf(a.id)!==-1); });
  });
  if(!sameUncov.length){ showToast('No other areas to apply to'); return; }
  sameUncov.forEach(function(a,idx){
    var clone=JSON.parse(JSON.stringify(srcSel));
    clone.id='s_'+Date.now()+idx; clone.openingId=a.id; clone.areaIds=[a.id];
    room.selections.push(clone);
  });
  saveDraft();
  showToast('Applied to '+sameUncov.length+' area'+(sameUncov.length>1?'s':'')+' ✓');
  _renderSelPostSave(false);
}

function _postSaveProdRows(products, catLabel, stitchPattern){
  if(!products||!products.length) return '';
  var h='<div style="margin-top:10px">'
    +'<div style="font-size:11px;font-weight:900;color:var(--red);text-transform:uppercase;letter-spacing:1.5px">'+catLabel+'</div>'
    +'<div style="width:28px;height:2px;background:var(--red);border-radius:1px;margin:4px 0 8px"></div>';
  products.forEach(function(p){
    var prod=p.product||{};
    var pname=[prod.brand,prod.catalog,prod.s_no].filter(Boolean).join(' / ')||(prod.manualName||'—');
    var wCm=p.widthCm||parseFloat(prod.width)||0;
    var role=p.role||'main';
    var isOption=p.mode==='option';
    var roleLabel=role==='border'?'Border / Mix Match':isOption?'Alternative Selection':null;
    var details=[];
    if(prod.mrp) details.push('₹'+fmt(prod.mrp)+'/m');
    if(wCm) details.push(wCm+' cm');
    if(stitchPattern&&!isOption) details.push(stitchPattern.charAt(0).toUpperCase()+stitchPattern.slice(1));
    h+='<div style="margin-bottom:8px;'+(isOption?'opacity:0.8':'')+'">';
    if(roleLabel){
      h+='<div style="font-size:9px;font-weight:900;color:'+(isOption?'var(--text3)':'var(--red)')+';text-transform:uppercase;letter-spacing:1px;margin-bottom:3px">'+roleLabel+'</div>';
    }
    h+='<div style="font-size:14px;font-weight:800;color:var(--text)">'+esc(pname)+'</div>';
    if(details.length){
      h+='<div style="font-size:12px;font-weight:700;color:var(--text2);margin-top:2px">'+details.join('  ·  ')+'</div>';
    }
    h+='</div>';
  });
  return h+'</div>';
}
function _renderSelPostSave(editing){
  var isCurtainsMain=_selCategory==='curtains_main';
  var subLabel=(function(){
    if(!isCurtainsMain) return selCatLabel(_selCategory);
    var hasBorder=_selProducts.some(function(p){ return p.role==='border'; });
    var hasSheer=_selSheerEnabled&&_selSheerProducts.length>0;
    if(hasBorder&&hasSheer) return 'Curtains – Main, Border & Sheer';
    if(hasBorder) return 'Curtains (Border / Mix Match)';
    if(hasSheer) return 'Curtains – Main & Sheer';
    return 'Curtains – Main';
  })();
  var room=APP.quote.rooms[_activeRoom];
  var roomName=room?room.name:'';
  var allSels=room?(room.selections||[]):[];
  // Find areas in this room with no selection linked
  var uncovered=[];
  if(room&&!editing){
    (room.areas||[]).forEach(function(area){
      var hasAny=allSels.some(function(s){ return s.openingId===area.id||(s.areaIds||[]).indexOf(area.id)!==-1; });
      if(!hasAny){ var cat=_areaTypeToCat(area.type); if(cat) uncovered.push({area:area,cat:cat}); }
    });
  }
  var h='<div class="post-save-card"><div class="post-save-icon">✅</div>'
    +'<div class="post-save-title">Selection '+(editing?'updated':'saved')+'</div>'
    +'<div class="post-save-sub">'+subLabel+'</div>';
  // ── Room name header ──
  if(roomName){
    h+='<div style="display:flex;align-items:center;gap:10px;margin:16px 0 10px;text-align:left">'
      +'<div style="font-size:14px;font-weight:900;color:var(--text);text-transform:uppercase;letter-spacing:0.8px">'+esc(roomName)+'</div>'
      +'<div style="flex:1;height:1px;background:var(--border)"></div>'
      +'</div>';
  }
  // ── All selections in this room ──
  if(allSels.length){
    h+='<div style="background:var(--bg2);border:1px solid var(--border);border-radius:var(--r-md);padding:12px 14px;text-align:left;margin-bottom:8px">';
    allSels.forEach(function(sel,idx){
      if(idx>0) h+='<div style="border-top:1px solid var(--border);margin:10px 0"></div>';
      var linkedAreas=(room.areas||[]).filter(function(a){ return a.id===sel.openingId||(sel.areaIds||[]).indexOf(a.id)!==-1; });
      if(linkedAreas.length){
        h+='<div style="font-size:11px;color:var(--text3);font-weight:700;margin-bottom:2px">'
          +linkedAreas.map(function(a){ return esc(a.name); }).join(' · ')
          +'</div>';
      }
      h+=_postSaveProdRows(sel.products||[], selCatLabel(sel.category), sel.stitchStyle||'');
    });
    h+='</div>';
  }
  // ── Uncovered areas nudge ──
  if(uncovered.length){
    h+='<div style="margin:0 0 8px;padding:10px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm)">';
    h+='<div style="font-size:11px;font-weight:800;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">No selection yet</div>';
    uncovered.forEach(function(u){
      h+='<div style="display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border)">'
        +'<div><div style="font-size:13px;font-weight:700;color:var(--text)">'+esc(u.area.name)+'</div>'
        +'<div style="font-size:11px;color:var(--text3)">'+u.area.width+'" × '+u.area.height+'" · '+selCatLabel(u.cat)+'</div></div>'
        +'<button class="btn sm" style="margin:0;padding:6px 12px;font-size:12px" onclick="addSelForAreaQuick(\''+u.area.id+'\',\''+u.cat+'\')">+ Add</button>'
        +'</div>';
    });
    h+='</div>';
  }
  // ── Apply same to all ──
  if(!editing&&_lastSavedOpeningId){
    var _ast=_catToAreaType(_selCategory);
    var _sameUncov=room?(room.areas||[]).filter(function(a){
      if(a.id===_lastSavedOpeningId) return false;
      if(_ast&&a.type!==_ast) return false;
      return !(room.selections||[]).some(function(s){ return s.category===_selCategory&&(s.openingId===a.id||(s.areaIds||[]).indexOf(a.id)!==-1); });
    }):[];
    if(_sameUncov.length){
      var _savedSel=(room.selections||[]).find(function(s){ return s.openingId===_lastSavedOpeningId||(s.areaIds||[]).indexOf(_lastSavedOpeningId)!==-1; });
      if(_savedSel){
        h+='<div id="applyAllPrompt" style="background:rgba(39,174,96,0.07);border:1px solid rgba(39,174,96,0.25);border-radius:var(--r-md);padding:12px 14px;margin-bottom:10px;text-align:left">';
        h+='<div style="font-size:12px;font-weight:800;color:var(--text2);margin-bottom:6px">Apply same '+selCatLabel(_selCategory)+' fabric to '+_sameUncov.length+' other '+areaTypeName(_ast||'area')+(+_sameUncov.length>1?'s':'')+' in this room?</div>';
        h+='<div style="font-size:11px;color:var(--text3);margin-bottom:10px">'+_sameUncov.map(function(a){ return esc(a.name); }).join(', ')+'</div>';
        h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'
          +'<button class="btn" style="margin:0;font-size:12px" onclick="applySelToAllAreas(\''+_savedSel.id+'\')">Yes, apply to all</button>'
          +'<button class="btn ghost" style="margin:0;font-size:12px" onclick="document.getElementById(\'applyAllPrompt\').style.display=\'none\'">No, keep separate</button>'
          +'</div></div>';
      }
    }
  }
  h+='<div class="post-save-actions">';
  h+='<button class="btn sm" style="width:100%" onclick="startAddSel()">+ Add Another Selection</button>';
  h+='<button class="btn sm" style="width:100%;background:var(--bg2);color:var(--text);border:1px solid var(--border)" onclick="openRoomModal()">+ Add Room</button>';
  if(isCurtainsMain){
    var sheerJustSaved=_selSheerEnabled&&_selSheerProducts.length>0;
    var sheerExistsForAreas=(_lastSavedOpeningId||_lastSavedAreaIds.length>0)&&room&&allSels.some(function(s){
      return s.category==='curtains_sheer'&&(s.openingId===_lastSavedOpeningId||(s.areaIds||[]).some(function(id){ return _lastSavedAreaIds.indexOf(id)!==-1; }));
    });
    if(!sheerJustSaved&&!sheerExistsForAreas){
      h+='<button class="btn ghost sm" onclick="startSelWithCat(\'curtains_sheer\')">+ Add Sheer Curtains</button>';
    }
  }
  var hasAreas=room&&(room.areas||[]).length>0;
  if(!hasAreas){
    h+='<button class="btn ghost sm" onclick="_editAreaIdx=-1;goTo(\'screen-add-area\')">+ Add Measurement</button>';
  }
  h+='<button class="btn ghost sm" style="font-size:12px;color:var(--text3)" onclick="goTo(\'screen-summary\')">View Summary →</button>'
    +'<button class="btn ghost sm" style="font-size:12px;color:var(--text3)" onclick="goTo(\'screen-builder\')">← Back to Rooms</button>'
    +'</div></div>';
  document.getElementById('addSelWrap').innerHTML=h;
}

var _prodCtx   = null;  // {ri,wi,ti,ci}
var _prodCat   = 'fabric';
var _prodMeta  = {};    // cat → {brandList, BCM, BCSM}
var _prodRows  = [];
var _prodLoading = false;
var _openExpIdx = -1;

function openProductModal() {
  if(_selProductTarget!=='sheer') _selProductTarget='main';
  var showCats=SEL_CAT_MAP[_selCategory]||['fabric'];
  if(!showCats.length) return;
  _prodCat=showCats[0];

  showCats.forEach(function(cat){
    var ci2=CATS[cat]; if(!ci2) return;
    tabsHtml+='<button class="search-cat-tab'+(cat===_prodCat?' active':'')+'" onclick="switchProdCat(\''+cat+'\')">'+ci2.icon+' '+ci2.label+'</button>';
  });
  document.getElementById('productCatTabs').innerHTML=tabsHtml;
  document.getElementById('productModalSub').textContent=selCatLabel(_selCategory);
  document.getElementById('productModal').classList.add('open');

}
function closeProductModal() {
  document.getElementById('productModal').classList.remove('open');
  _prodRows=[];
}
function switchProdCat(cat) {
  _prodCat=cat;
  document.querySelectorAll('.search-cat-tab').forEach(function(btn){
    btn.classList.toggle('active', btn.textContent.trim().indexOf(CATS[cat].label)!==-1);
  });
  loadProdCat(cat);
}

function loadProdCat(cat) {
  _openExpIdx=-1; _prodRows=[];
  document.getElementById('productResults').innerHTML='';
  renderProdFields(cat);
  // Load meta if not cached
  if(_prodMeta[cat]) { bindProdInputs(cat); return; }
  document.getElementById('productSearchBtn').disabled=true;
  fetch(CFG.firebase+'/'+cat+'/meta.json')
    .then(function(r){ return r.json(); })
    .then(function(d){
      if(d&&d.brandList){
        var BCM={}, BCSM={};
        d.brandList.forEach(function(b){
          var bKey=b.key||b, bLabel=b.label||b;
          BCM[bLabel]=(d.bcmArr[bKey]||[]).map(function(c){ return c.label||c; });
          (d.bcmArr[bKey]||[]).forEach(function(c){
            var cKey=c.key||c, cLabel=c.label||c;
            BCSM[bLabel+'|||'+cLabel]=(d.bcsmArr[bKey+'|||'+cKey]||[]).map(function(s){ return s.label||s; });
          });
        });
        _prodMeta[cat]={
          brands:d.brandList.map(function(b){ return b.label||b; }).sort(),
          BCM:BCM, BCSM:BCSM
        };
        bindProdInputs(cat);
        document.getElementById('productSearchBtn').disabled=false;
      }
    })
    .catch(function(){
      document.getElementById('productResults').innerHTML='<div style="padding:20px;text-align:center;color:var(--text3)">Failed to load. Check connection.</div>';
      document.getElementById('productSearchBtn').disabled=false;
    });
}

function renderProdFields(cat) {
  var ci=CATS[cat];
  var html='';
  if(ci.codeSearch){
    html='<div class="search-field-group"><label class="field-label">Code</label>'
      +'<div class="ac-wrap"><input class="ac-inp" id="pf_code" placeholder="Enter code..." autocomplete="off" spellcheck="false" style="text-transform:uppercase"></div></div>';
  } else {
    ci.inputs.forEach(function(lbl,idx){
      var fid='pf_'+toFid(lbl);
      var ph = idx===0 ? 'Tap to browse brands…' : 'Select '+ci.inputs[idx-1]+' first';
      html+='<div class="search-field-group"><label class="field-label">'+lbl+'</label>'
        +'<div class="ac-wrap"><input class="ac-inp" id="'+fid+'" placeholder="'+ph+'" '+(idx>0?'disabled':'')+' autocomplete="off" spellcheck="false" autocorrect="off">'
        +'<div class="ac-dropdown" id="dd_'+fid+'"></div></div></div>';
    });
  }
  document.getElementById('productSearchFields').innerHTML=html;
}

function bindProdInputs(cat) {
  var ci=CATS[cat];
  if(ci.codeSearch){
    var inp=document.getElementById('pf_code');
    if(inp) inp.addEventListener('keyup',function(e){ if(e.key==='Enter') doProductSearch(); this.value=this.value.toUpperCase(); });
    return;
  }
  ci.inputs.forEach(function(lbl,idx){
    var fid='pf_'+toFid(lbl);
    var el=document.getElementById(fid), drop=document.getElementById('dd_'+fid);
    if(!el) return;
    function openDrop(){ showAcDrop(drop, filtAc(getProdOpts(cat,idx,lbl),el.value), el, function(v){ pickProdOpt(cat,idx,lbl,v); }); }
    el.addEventListener('focus', openDrop);
    el.addEventListener('click', openDrop);    // mobile: focus alone may not re-open
    el.addEventListener('input',function(){ showAcDrop(drop, filtAc(getProdOpts(cat,idx,lbl),this.value), el, function(v){ pickProdOpt(cat,idx,lbl,v); }); });
    el.addEventListener('blur',function(){ setTimeout(function(){ if(drop) drop.classList.remove('open'); },200); });
    // If this input already has focus (meta loaded after user tapped field) — trigger immediately
    if(document.activeElement===el) openDrop();
  });
}
function getProdFieldVal(lbl){ var el=document.getElementById('pf_'+toFid(lbl)); return el?el.value.trim():''; }
function getProdOpts(cat,idx,lbl) {
  var meta=_prodMeta[cat]; if(!meta) return [];
  if(idx===0) return meta.brands;
  var ci=CATS[cat];
  var brand=getProdFieldVal(ci.inputs[0]);
  if(idx===1) return meta.BCM[brand]||[];
  if(idx>=2){
    var lvl1=getProdFieldVal(ci.inputs[1]);
    return meta.BCSM[brand+'|||'+lvl1]||[];
  }
  return [];
}
function pickProdOpt(cat,idx,lbl,val) {
  var ci=CATS[cat];
  var fid='pf_'+toFid(lbl);
  var el=document.getElementById(fid), drop=document.getElementById('dd_'+fid);
  if(el) el.value=val;
  if(drop) drop.classList.remove('open');
  for(var j=idx+1;j<ci.inputs.length;j++){
    var jEl=document.getElementById('pf_'+toFid(ci.inputs[j]));
    if(jEl){ if(j===idx+1){ jEl.disabled=false; jEl.placeholder='Type to search...'; } else { jEl.value=''; jEl.disabled=true; } }
  }
}
function showAcDrop(drop,items,inp,onSel) {
  if(!drop||!items||!items.length){ if(drop) drop.classList.remove('open'); return; }
  var q=(inp.value||'').trim().toLowerCase();
  drop.innerHTML=items.map(function(item){
    var s=esc(String(item));
    if(q){ s=s.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>'); }
    return '<div class="ac-item" onmousedown="selAcItem(this,event)">'+s+'</div>';
  }).join('');
  drop.classList.add('open'); drop._cb=onSel;
}
function selAcItem(el,ev){ ev.preventDefault(); var cb=el.parentElement._cb; if(cb) cb(el.textContent); }
function filtAc(arr,q){ if(!arr||!arr.length) return []; if(!q||!q.trim()) return arr.slice(0,50); var l=q.trim().toLowerCase(); return arr.filter(function(x){ return String(x).toLowerCase().indexOf(l)!==-1; }).slice(0,50); }

function doProductSearch() {
  var cat=_prodCat, ci=CATS[cat];
  var results=document.getElementById('productResults');
  results.innerHTML='<div class="loading-state"><span class="spin"></span>Searching...</div>';
  _openExpIdx=-1;
  if(ci.codeSearch){
    var code=((document.getElementById('pf_code')||{}).value||'').trim().toUpperCase().replace(/[^A-Z0-9\-]/g,'');
    if(!code){ results.innerHTML=''; return; }
    fetch(CFG.firebase+'/'+cat+'/by_code/'+encodeURIComponent(code)+'.json')
      .then(function(r){ return r.json(); })
      .then(function(d){ renderProdResults(d?[].concat(Array.isArray(d)?d:Object.values(d)):[]); })
      .catch(function(){ results.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3)">Error loading results.</div>'; });
    return;
  }
  var brand=getProdFieldVal(ci.inputs[0])||'';
  var lvl1 =ci.inputs[1]?getProdFieldVal(ci.inputs[1])||'':'';
  var lvl2 =ci.inputs[2]?getProdFieldVal(ci.inputs[2])||'':'';
  var bKey=sk(brand), cKey=sk(lvl1), sKey=sk(lvl2);
  var url;
  if(bKey&&bKey!=='_'&&cKey&&cKey!=='_'&&sKey&&sKey!=='_')
    url=CFG.firebase+'/'+cat+'/by_brand/'+encodeURIComponent(bKey)+'/'+encodeURIComponent(cKey)+'/'+encodeURIComponent(sKey)+'.json';
  else if(bKey&&bKey!=='_'&&cKey&&cKey!=='_')
    url=CFG.firebase+'/'+cat+'/by_brand/'+encodeURIComponent(bKey)+'/'+encodeURIComponent(cKey)+'.json';
  else if(bKey&&bKey!=='_')
    url=CFG.firebase+'/'+cat+'/by_brand/'+encodeURIComponent(bKey)+'.json';
  else
    url=CFG.firebase+'/'+cat+'/by_code.json';
  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(!data){ renderProdResults([]); return; }
      var rows=[];
      (function flatten(obj){ if(Array.isArray(obj)) obj.forEach(function(item){ if(item&&item.code) rows.push(item); }); else if(obj&&typeof obj==='object') Object.values(obj).forEach(function(v){ flatten(v); }); })(data);
      renderProdResults(rows);
    })
    .catch(function(){ results.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3)">Error loading results.</div>'; });
}

function renderProdResults(rows) {
  _prodRows=rows;
  var el=document.getElementById('productResults');
  if(!rows||!rows.length){
    el.innerHTML='<div style="padding:40px 20px;text-align:center;color:var(--text3)">No products found</div>'; return;
  }
  var cat=_prodCat;
  var html='<div class="results-count"><span class="results-count-lbl">Found</span><span class="results-count-num">'+rows.length+' items</span></div>'
    +'<div class="result-table">';
  rows.forEach(function(r,idx){
    var brand=gv(r,'brand'), catalog=gv(r,'catalog')||gv(r,'model')||gv(r,'product')||'', sno=gv(r,'s_no')||'';
    var mainLabel=[brand,catalog].filter(Boolean).join(' / ')||gv(r,'blind_type')||'—';
    var mrp=gv(r,'mrp')||r.mrp||'';
    html+='<div class="result-row" onclick="toggleResultRow('+idx+')" id="rrow_'+idx+'">'
      +'<div class="result-row-main">'+esc(mainLabel)+'</div>'
      +(sno?'<div class="result-row-sub">'+esc(sno)+'</div>':'')
      +(mrp?'<div class="result-row-mrp">₹'+esc(mrp)+(cat==='blinds'?'/sqft':'/mtr')+'</div>':'')
      +'</div>'
      +'<div class="result-expand" id="rexp_'+idx+'">'
      +buildExpPanel(r,cat,idx)
      +'</div>';
  });
  html+='</div>';
  el.innerHTML=html;
}
function buildExpPanel(r,cat,idx) {
  var fields=[['Brand','brand'],['Catalog','catalog'],['S.No','s_no'],['Blind Type','blind_type'],
    ['Mechanism','mechanism'],['Other Details','other_details'],['Design Details','design_details'],
    ['Model','model'],['Size','size'],['Width','width'],['Item Details','item_details'],['MRP','mrp']];
  var html='';
  fields.forEach(function(f){ var v=gv(r,f[1])||r[f[1]]||''; if(v) html+='<div class="exp-line"><span class="exp-lbl">'+f[0]+'</span><span class="exp-val">'+esc(v)+'</span></div>'; });
  html+='<button class="select-product-btn" onclick="selectProduct('+idx+')">✓ Select This Product</button>';
  return html;
}
function toggleResultRow(idx) {
  if(_openExpIdx===idx){
    document.getElementById('rexp_'+idx).classList.remove('open');
    _openExpIdx=-1; return;
  }
  if(_openExpIdx>=0){ var old=document.getElementById('rexp_'+_openExpIdx); if(old) old.classList.remove('open'); }
  var exp=document.getElementById('rexp_'+idx); if(exp) exp.classList.add('open');
  _openExpIdx=idx;
}
function selectProduct(idx) {
  var r=_prodRows[idx]; if(!r) return;
  var prod={
    code:r.code||'', brand:gv(r,'brand'),
    catalog:gv(r,'catalog')||gv(r,'model')||gv(r,'product')||'',
    s_no:gv(r,'s_no')||gv(r,'s.no')||'',
    mrp:parseFloat(r.mrp||gv(r,'mrp'))||0,
    width:gv(r,'width')||'', item_details:gv(r,'item_details')||''
  };
  if(_selCategory==='flooring'&&r.box_sqft) _selBoxSqft=String(r.box_sqft);
  if(_selCategory==='wallpaper'&&r.roll_sqft) _selRollSqft=String(r.roll_sqft);
  var _wCm=parseFloat(gv(r,'width'))||0;
  var entry={product:prod,mode:_nextProdMode,role:_nextProdRole,chosen:false,discount:0,notes:'',
    widthType:_wCm>280?'wider':'standard', widthCm:_wCm, rotationAllowed:null};
  if(_selCategory==='roman_blind'&&_selRomanType==='double') entry.romanLayer=_selRomanLayerTarget;
  _nextProdMode='component'; _nextProdRole='main';
  if(_selProductTarget==='sheer'){
    _selSheerProducts.push(entry);
  } else if(_replaceSelProdIdx>=0){
    var _ri=_replaceSelProdIdx; _replaceSelProdIdx=-1;
    entry.role=(_selProducts[_ri]||{}).role||'main';
    entry.mode=(_selProducts[_ri]||{}).mode||'component';
    _selProducts[_ri]=entry;
    loadFabricPhoto(prod,function(dataUrl){ if(_selProducts[_ri]) { _selProducts[_ri].photo=dataUrl; renderAddSelection(); } });
  } else {
    _selProducts.push(entry);
    var _pidx=_selProducts.length-1;
    loadFabricPhoto(prod,function(dataUrl){ if(_selProducts[_pidx]) { _selProducts[_pidx].photo=dataUrl; renderAddSelection(); } });
  }
  closeProductModal();
  renderAddSelection();
  showToast('Product added ✓');
}

function _calcSelForArea_detail(sel,area){
  var cat=sel.category, fp=fabricProd(sel), r={total:0,lines:[],_meta:{}};
  try{
    if(cat==='curtains_main'){
      if(!fp) return null;
      var c=calcCurtains(area,sel,fp);
      r.total=c.total; r._meta={fabricM:c.fabricM,panels:c.panels,panelLen:c.panelLen};
      r.lines=[
        {l:'Fabric'+(c.rotationUsed?' (rotated)':c.widthType==='wider'?' (wider)':''),v:c.fabricM+' m',a:c.fabricCost},
        {l:'Stitching',v:c.fabricM+' m',a:c.stitchCost},
        {l:'Belt Making',v:c.panels+' pcs',a:c.beltCost},
        {l:'Lining'+(c.liningType&&c.liningType!=='none'?' ('+c.liningType+')':''),v:c.fabricM+' m',a:c.liningCost},
        {l:'Lining Stitching',v:c.fabricM+' m',a:c.liningStitchCost},
        {l:'Install',v:area.qty+' win',a:c.installCost}
      ].filter(function(ln){return ln.a>0;});
      if(sel.trackType){
        var tkInstRate=sel.rates&&sel.rates.trackInstallRate!=null?sel.rates.trackInstallRate:qrate('trackInstall');
        var tkCost=Math.round(tkInstRate*(parseInt(area.qty)||1));
        r.lines.push({l:'Track: '+sel.trackType,v:area.qty+' win',a:tkCost});
        r.total+=tkCost;
      }
    } else if(cat==='curtains_sheer'){
      if(!fp) return null;
      var c=calcCurtains(area,sel,fp);
      r.total=c.total; r._meta={fabricM:c.fabricM,panels:c.panels,panelLen:c.panelLen};
      r.lines=[
        {l:'Fabric (Sheer)'+(c.rotationUsed?' (rotated)':c.widthType==='wider'?' (wider)':''),v:c.fabricM+' m',a:c.fabricCost},
        {l:'Stitching',v:c.fabricM+' m',a:c.stitchCost},
        {l:'Bottom Weight',v:c.panels+' pcs × 1.5m',a:c.bottomWeightCost},
        {l:'Belt Making',v:c.panels+' pcs',a:c.beltCost},
        {l:'Lining'+(c.liningType&&c.liningType!=='none'?' ('+c.liningType+')':''),v:c.fabricM+' m',a:c.liningCost},
        {l:'Lining Stitching',v:c.fabricM+' m',a:c.liningStitchCost},
        {l:'Install',v:area.qty+' win',a:c.installCost}
      ].filter(function(ln){return ln.a>0;});
      if(sel.trackType){
        var tkInstRate=sel.rates&&sel.rates.trackInstallRate!=null?sel.rates.trackInstallRate:qrate('trackInstall');
        var tkCost=Math.round(tkInstRate*(parseInt(area.qty)||1));
        r.lines.push({l:'Track: '+sel.trackType,v:area.qty+' win',a:tkCost});
        r.total+=tkCost;
      }
    } else if(cat==='roman_blind'){
      if(!fp) return null;
      var rb=calcRomanBlind(area,sel,fp);
      r.total=rb.total; r._meta={fabricM:rb.fabricM,sqft:rb.sqft};
      r.lines=[{l:'Mechanism',v:rb.sqft.toFixed(2)+' sqft',a:rb.mechCost},
               {l:'Fabric',v:rb.fabricM+' m',a:rb.fabricCost},
               {l:'Stitching',v:area.qty+' win',a:rb.stitchCost},
               {l:'Lining ('+rb.liningType+')',v:rb.fabricM+' m',a:rb.liningCost},
               {l:'Install',v:area.qty+' win',a:rb.installCost}].filter(function(ln){return ln.a>0;});
    } else if(cat==='blind'){
      if(!fp) return null;
      var bl=calcBlind(area,fp);
      r.total=bl.total; r._meta={sqft:bl.sqft};
      r.lines=[{l:'Area',v:bl.sqft.toFixed(2)+' sqft × ₹'+fmt(fp.product.mrp),a:bl.cost}];
    } else if(cat==='headboard'){
      if(!fp) return null;
      var hb=calcHeadboard(area,sel,fp);
      r.total=hb.total; r._meta={fabricM:hb.fabricM,sqft:hb.sqft};
      r.lines=[{l:'Making',v:hb.sqft.toFixed(2)+' sqft',a:hb.makingCharge},
               {l:'Fabric',v:hb.fabricM+' m',a:hb.fabricCost}];
    } else if(cat==='flooring'){
      if(!fp) return null;
      var fl=calcFlooring(area,sel,fp);
      r.total=fl.total; r._meta={sqft:fl.billedSqft,boxes:fl.boxes};
      r.lines=[{l:fl.boxes+' boxes ('+fl.billedSqft.toFixed(1)+' sqft)',v:'',a:fl.materialCost},
               {l:'Install',v:fl.billedSqft.toFixed(1)+' sqft',a:fl.installCost}].filter(function(ln){return ln.a>0;});
    } else if(cat==='wallpaper'){
      if(!fp) return null;
      var wp=calcWallpaper(area,sel,fp);
      r.total=wp.total;
      if(area.wallpaperMode==='roll'){ r._meta={rolls:wp.rolls}; r.lines=[{l:wp.rolls+' rolls',v:'',a:wp.materialCost},{l:'Labour',v:wp.rolls+' rolls',a:wp.labour}]; }
      else { r._meta={sqft:wp.sqft}; r.lines=[{l:'Area',v:wp.sqft.toFixed(2)+' sqft',a:wp.materialCost},{l:'Labour',v:wp.sqft.toFixed(2)+' sqft',a:wp.labour}]; }
    } else if(cat==='mattress'){
      var mt=calcMattress(area,fp);
      r.total=mt.total; r._meta={qty:area.qty};
      r.lines=[{l:'Mattress × '+area.qty,v:'₹'+fmt(fp?fp.product.mrp:0),a:mt.total}];
    } else if(cat==='tracks_rods'){
      var tr=calcTracks(area,sel);
      r.total=tr.total; r._meta={qty:sel._hwQty||area.qty};
      r.lines=[];
      if(sel.trackType) r.lines.push({l:'Track: '+sel.trackType,v:'',a:0});
      r.lines.push({l:'Install',v:(sel._hwQty||area.qty)+' win',a:tr.installCost});
    } else if(cat==='others'){
      var ot=calcOthers(sel); r.total=ot.total;
    }
  }catch(e){ return null; }
  return r;
}
function _sumBreakdownLines(result){

    return '<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px dotted var(--border)">'
      +'<div style="flex:1;font-size:11px;color:var(--text3)">'+esc(ln.l)+(ln.v?'<span style="font-size:10px;color:var(--text4);margin-left:4px">'+esc(ln.v)+'</span>':'')+'</div>'
      +(ln.a>0?'<span style="font-size:12px;font-weight:700;color:var(--text)">'+fmt(ln.a)+'</span>':'')
      +'</div>';
  }).join('');

function _calcSelTotal_noArea(sel) {
  // For standalone selections (no area), show product list + total from product MRPs only
  var total=0, lines=[];
  activeProds(sel).forEach(function(p){
    var prod=p.product||{};
    var mrp=parseFloat(prod.mrp)||0;
    var disc=parseFloat(p.discount)||0;
    var cost=Math.round(mrp*(1-disc/100));
    if(mrp){
      var pname=[prod.brand,prod.catalog,prod.s_no].filter(Boolean).join(' ')||(prod.manualName||'Item');
      lines.push({l:esc(pname),v:disc>0?disc+'% disc':'',a:cost});
      total+=cost;
    }
  });
  if(!lines.length) lines.push({l:'No products',v:'',a:0});
  return {total:total,lines:lines};
}

  }
  h+='</div>';
  return h;
}

    function liFixed(label,qtyStr,total){

          +'<th style="text-align:center;padding:5px 4px;font-size:10px;font-weight:700;color:var(--text3)">W × H</th>'

            var pl2=e.sheerMeta.panelLen||0;

      // ── Track/Rod area map (for hardware card) ──────────────────────────

          liRate('Belt Making Charges', g.totalPanels+' pcs', g.beltRate, g.beltCost, 'beltRate', gk, 'beltSheer');
        if(g.liningCost>0){
          var lr=g.repSel.rates&&g.repSel.rates.liningRate!=null?g.repSel.rates.liningRate:getLiningRate('curtains_sheer',g.liningType);
          liRate('Lining Charges ('+g.liningType+')', td(g.fabM)+' m', lr, g.liningCost, 'liningRate', gk, 'liningSheer');
          if(g.liningStitchCost>0)
            liRate('Lining Stitching Charges', td(g.fabM)+' m', g.liningStitchRate, g.liningStitchCost, 'liningStitchRate', gk, 'liningStitchSheer');
        }
      });
      // Section total: includes track HW + install
      catTotal=0;
      mainOrd.forEach(function(gk){
        var g=mainG[gk];
        if(!isLineHidden(ri,gk,'fabricMain')) catTotal+=g.fabricCost;
        if(!isLineHidden(ri,gk,'stitchMain')) catTotal+=g.stitchCost;
        if(!isLineHidden(ri,gk,'belt')) catTotal+=g.beltCost;
        if(!isLineHidden(ri,gk,'liningMain')) catTotal+=g.liningCost;
        if(!isLineHidden(ri,gk,'liningStitchMain')) catTotal+=g.liningStitchCost;
      });
      sheerOrd.forEach(function(gk){
        var g=sheerG[gk];
        if(!isLineHidden(ri,gk,'fabricSheer')) catTotal+=g.fabricCost;
        if(!isLineHidden(ri,gk,'stitchSheer')) catTotal+=g.stitchCost;
        if(!isLineHidden(ri,gk,'bottomWeight')) catTotal+=g.bottomWeightCost;
        if(!isLineHidden(ri,gk,'beltSheer')) catTotal+=g.beltCost;
        if(!isLineHidden(ri,gk,'liningSheer')) catTotal+=g.liningCost;
        if(!isLineHidden(ri,gk,'liningStitchSheer')) catTotal+=g.liningStitchCost;
      });
      // Track HW + installation
      ctrkOrd.forEach(function(aid){
        var m=ctrkMap[aid]; if(!m.mainSel) return;
        catTotal+=calcCurtainHWBreakdown(m.area,m.mainSel,m.sheerSel).total;
      });
      catTotal+=totalInstallCost;

    } else if(info.dc==='roman_blind'){
      // ── Measurement table: roman areas only ────────────────────────────
      var romMeasMap={}, romMeasOrd=[];
      areaItems.forEach(function(item){
        if(!romMeasMap[item.area.id]){ romMeasMap[item.area.id]={area:item.area,sqft:0,fabM:0}; romMeasOrd.push(item.area.id); }
        var e=romMeasMap[item.area.id];
        if(item.d&&item.d._meta){
          e.sqft=item.d._meta.sqft||0;
          if(item.d._meta.fabricM) e.fabM=roundTo005(e.fabM+(parseFloat(item.d._meta.fabricM)||0));
        }
      });
      if(romMeasOrd.length){
        h+='<table style="width:100%;border-collapse:collapse;margin-bottom:10px;font-size:12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm);overflow:hidden">';
        h+='<thead><tr style="background:var(--bg2);border-bottom:1px solid var(--border)">'
          +'<th style="text-align:left;padding:5px 8px;font-size:10px;font-weight:700;color:var(--text3)">Area</th>'
          +'<th style="text-align:center;padding:5px 4px;font-size:10px;font-weight:700;color:var(--text3)">W × H</th>'
          +'<th style="text-align:center;padding:5px 4px;font-size:10px;font-weight:700;color:var(--text3)">Qty</th>'
          +'<th style="text-align:right;padding:5px 8px;font-size:10px;font-weight:700;color:var(--text3)">Area / Fabric</th>'
          +'</tr></thead><tbody>';
        var totRomSqft=0, totRomFab=0;
        romMeasOrd.forEach(function(aid){
          var e=romMeasMap[aid], area=e.area;
          var qty=parseInt(area.qty)||1, isMeas=area.width&&area.height;
          h+='<tr style="border-bottom:1px solid var(--border)">';
          h+='<td style="padding:6px 8px;font-size:13px;font-weight:700;color:var(--text)">'+esc(area.name)+'</td>';
          if(isMeas){
            h+='<td style="padding:6px;text-align:center;white-space:nowrap;color:var(--text2)">'+area.width+'" × '+area.height+'"</td>';
            h+='<td style="padding:6px;text-align:center;white-space:nowrap">'
              +'<input type="number" min="1" value="'+qty+'" '
              +'style="width:30px;font-size:11px;padding:2px;border:1px solid var(--border2);border-radius:3px;background:var(--bg);color:var(--text);-webkit-appearance:none;text-align:center" '
              +'onchange="updateAreaQty('+ri+',\''+area.id+'\',this.value)" onclick="this.select();event.stopPropagation()"> Nos</td>';
            h+='<td style="padding:6px 8px;text-align:right;color:var(--text2);font-size:11px">'
              +td(e.sqft).toFixed(2)+' sqft'+(e.fabM>0?' / '+e.fabM+' m':'')+'</td>';
            totRomSqft=td(totRomSqft+e.sqft); totRomFab=roundTo005(totRomFab+e.fabM);
          } else {
            h+='<td colspan="3" style="padding:6px 8px;text-align:center;color:var(--text3);font-style:italic">Not measured</td>';
          }
          h+='</tr>';
        });
        if(totRomSqft>0){
          h+='<tr style="background:var(--bg2)"><td colspan="3" style="padding:5px 8px;font-size:10px;font-weight:800;color:var(--text3)">Total</td>'
            +'<td style="padding:5px 8px;text-align:right;font-size:11px;font-weight:900;color:var(--text)">'+totRomSqft.toFixed(2)+' sqft'+(totRomFab>0?' / '+totRomFab+' m':'')+'</td></tr>';
        }
        h+='</tbody></table>';
      }

      // ── Roman line items ───────────────────────────────────────────────
      var romG={}, romOrd=[];
      areaItems.forEach(function(item){
        if(!item.d||!item.fp) return;
        var gk=item.gk;
        if(!romG[gk]){
          romG[gk]={gk:gk,name:item.prodKey,prod:item.prod,repSel:item.sel,
            sqft:0,mechCost:0,fabM:0,fabricCost:0,stitchCost:0,installCost:0,liningCost:0,qty:0,liningType:'none'};
          romOrd.push(gk);
        }
        var g=romG[gk], rb=calcRomanBlind(item.area,item.sel,item.fp);
        g.sqft=td(g.sqft+rb.sqft); g.mechCost+=rb.mechCost;
        g.fabM=roundTo005(g.fabM+rb.fabricM); g.fabricCost+=rb.fabricCost;
        g.stitchCost+=rb.stitchCost; g.installCost+=rb.installCost;
        g.liningCost+=rb.liningCost; g.qty+=(parseInt(item.area.qty)||1);
        if(rb.liningType&&rb.liningType!=='none') g.liningType=rb.liningType;
      });
      catTotal=0;
      romOrd.forEach(function(gk){
        var g=romG[gk];
        var mr=g.repSel.rates&&g.repSel.rates.mechRate!=null?g.repSel.rates.mechRate:qrate('romanMech');
        liRate('Mechanism', td(g.sqft)+' sqft', mr, g.mechCost, 'mechRate', gk, 'mechanism');
        var sr=g.repSel.rates&&g.repSel.rates.stitchRateRoman!=null?g.repSel.rates.stitchRateRoman:qrate('romanStitch');
        liRate('Blind Stitching', g.qty+' win', sr, g.stitchCost, 'stitchRateRoman', gk, 'stitchRoman');
        var ir=g.repSel.rates&&g.repSel.rates.installRate!=null?g.repSel.rates.installRate:qrate('romanInstall');
        liRate('Fixing Charges', g.qty+' win', ir, g.installCost, 'installRate', gk, 'fixingRoman');
        liMRP('Fabric – Main – '+g.name, td(g.fabM)+' m', parseFloat(g.prod&&g.prod.mrp)||0, g.fabricCost, gk, 'fabricRoman', g.repSel.id);
        if(g.liningCost>0){
          var lr=g.repSel.rates&&g.repSel.rates.liningRate!=null?g.repSel.rates.liningRate:getLiningRate('roman_blind',g.liningType);
          liRate('Lining for Main ('+g.liningType+')', td(g.fabM)+' m', lr, g.liningCost, 'liningRate', gk, 'liningRoman');
        }
        if(!isLineHidden(ri,gk,'mechanism')) catTotal+=g.mechCost;
        if(!isLineHidden(ri,gk,'stitchRoman')) catTotal+=g.stitchCost;
        if(!isLineHidden(ri,gk,'fixingRoman')) catTotal+=g.installCost;
        if(!isLineHidden(ri,gk,'fabricRoman')) catTotal+=g.fabricCost;
        if(!isLineHidden(ri,gk,'liningRoman')) catTotal+=g.liningCost;
      });

    } else if(info.dc==='headboard'){
      var hbG={}, hbOrd=[];
      areaItems.forEach(function(item){
        if(!item.d||!item.fp) return;
        var gk=item.gk;
        if(!hbG[gk]){
          hbG[gk]={gk:gk,name:item.prodKey,prod:item.prod,repSel:item.sel,sqft:0,makingCharge:0,fabM:0,fabricCost:0};
          hbOrd.push(gk);
        }
        var g=hbG[gk], hb=calcHeadboard(item.area,item.sel,item.fp);
        g.sqft=td(g.sqft+hb.sqft); g.makingCharge+=hb.makingCharge;
        g.fabM=roundUpTo025(g.fabM+hb.fabricM); g.fabricCost+=hb.fabricCost;
      });
      hbOrd.forEach(function(gk){
        var g=hbG[gk];
        var mr=g.repSel.rates&&g.repSel.rates.makingRate!=null?g.repSel.rates.makingRate:qrate('headboardAreaRate');
        liRate('Making charge', td(g.sqft)+' sqft', mr, g.makingCharge, 'makingRate', gk);
        liMRP('Fabric – '+g.name, td(g.fabM)+' m', parseFloat(g.prod&&g.prod.mrp)||0, g.fabricCost, gk, null, g.repSel.id);
      });

    } else {
      // Flooring, wallpaper, mattress, tracks, others — use d.lines
      areaItems.forEach(function(item){
        if(!item.d) return;
        item.d.lines.forEach(function(ln){
          if(!ln.a) return;
          liFixed((item.area?item.area.name+': ':'')+ln.l, ln.v, ln.a);
        });
      });
    }

    // Section total (curtains/roman compute their own above; others fall through here)
    if(catTotal<0) catTotal=areaItems.reduce(function(s,item){ return s+(item.d?item.d.total:0); },0);
    h+='<div style="display:flex;justify-content:flex-end;align-items:center;padding:6px 2px;border-top:2px solid var(--border);margin-top:2px">'
      +'<span style="font-size:11px;color:var(--text3);margin-right:10px">'+esc(info.label)+' Total</span>'
      +'<span style="font-size:15px;font-weight:900;color:var(--red)">'+fmt(catTotal)+'</span>'
      +'</div>';
    h+='</div>';
  });

  return h;
}

      +'style="width:68px;padding:3px 5px;font-size:12px;font-weight:700" '
      +'onchange="updateProductMRP('+ri+',\''+sel.id+'\','+pi+',this.value)" onclick="this.select()"></div>'
      +(widthCm?'<span style="font-size:11px;color:var(--text3)">'+widthCm+'cm</span>':'')
      +'</div>';
  });
  if(result){
    sh+='<div style="height:1px;background:var(--border);margin:6px 0"></div>';
    sh+=_sumBreakdownLines(result);
    sh+='<div style="display:flex;justify-content:space-between;padding-top:6px;border-top:1px solid var(--border);margin-top:4px">'
      +'<span style="font-size:12px;font-weight:700;color:var(--text3)">Total</span>'
      +'<span style="font-size:14px;font-weight:900;color:var(--red)">'+fmt(result.total)+'</span></div>';

    sh+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px;padding-top:8px;border-top:1px solid var(--border2)">';
    if(_isFab&&!_isRom){
      var _sr=sel.rates&&sel.rates.stitchRate!=null?sel.rates.stitchRate:'';
      sh+='<div><label style="font-size:10px;color:var(--text3);display:block;margin-bottom:2px">Stitch ₹/m</label>'
        +'<input type="number" class="inp" placeholder="'+qrate('curtainStitchPerM')+'" value="'+_sr+'" style="padding:4px 6px;font-size:12px;font-weight:700" '
        +'onchange="updateSelRate('+ri+',\''+sel.id+'\',\'stitchRate\',this.value)" onclick="this.select()"></div>';
    }
    if(_isRom){
      var _srR=sel.rates&&sel.rates.stitchRateRoman!=null?sel.rates.stitchRateRoman:'';
      sh+='<div><label style="font-size:10px;color:var(--text3);display:block;margin-bottom:2px">Stitch ₹/win</label>'
        +'<input type="number" class="inp" placeholder="'+qrate('romanStitch')+'" value="'+_srR+'" style="padding:4px 6px;font-size:12px;font-weight:700" '
        +'onchange="updateSelRate('+ri+',\''+sel.id+'\',\'stitchRateRoman\',this.value)" onclick="this.select()"></div>';
    }
    if(_isFab){
      var _ir=sel.rates&&sel.rates.installRate!=null?sel.rates.installRate:'';
      sh+='<div><label style="font-size:10px;color:var(--text3);display:block;margin-bottom:2px">Install ₹/win</label>'
        +'<input type="number" class="inp" placeholder="'+(_isRom?qrate('romanInstall'):qrate('curtainInstall'))+'" value="'+_ir+'" style="padding:4px 6px;font-size:12px;font-weight:700" '
        +'onchange="updateSelRate('+ri+',\''+sel.id+'\',\'installRate\',this.value)" onclick="this.select()"></div>';

    }
    sh+='</div>';
  }
  sh+='</div>';
  return sh;
}

function saveToList() {
  var q=APP.quote; if(!q.id) return;
  var gt=grandTotal();
  var list=getList().filter(function(e){ return e.id!==q.id; });
  list.unshift({ id:q.id, date:q.date, staff:q.staff||'', staff2:q.staff2||'',
    name:q.customer.name||'', mobile:q.customer.mobile||'', arch:q.customer.arch||'',
    addr:q.customer.addr||'', total:gt, rooms:q.rooms.length, status:q.status||'draft',
    updated:new Date().toLocaleString('en-IN'), draft:JSON.stringify(q) });
  if(list.length>200) list=list.slice(0,200);
  try{ localStorage.setItem('darla_list', JSON.stringify(list)); }catch(e){}
}
function getList(){ try{ return JSON.parse(localStorage.getItem('darla_list')||'[]'); }catch(e){ return []; } }

function saveQuote() {
  saveDraftLocal(); saveToList();
  clearTimeout(_saveDraftTimer);
  _saveToFirestore(true);
}

function saveAndGoList() {
  saveDraftLocal(); saveToList();
  clearTimeout(_saveDraftTimer);
  _saveToFirestore(false);
  stopQuoteSync();
  switchTab('all');
}

function saveAndExit() {
  saveDraftLocal(); saveToList();
  clearTimeout(_saveDraftTimer);
  _saveToFirestore(false);
  stopQuoteSync();

  switchTab('all');
}

function loadById(id) {
  var local=getList().find(function(q){ return q.id===id; });
  if(local&&local.draft){ try{ applyQ(JSON.parse(local.draft)); }catch(e){} }
  DB.collection('quotes').doc(id).get()
    .then(function(snap){
      if(snap.exists){
        var q=snap.data(); applyQ(q); saveToList(); showToast('Loaded ✓ '+id); startQuoteSync(id);
      } else {
        if(!local) showToast('Not found: '+id);
        else startQuoteSync(id);
      }
    }).catch(function(){
      if(!local) showToast('Offline — could not load');
      else { showToast('Offline — showing cached version'); startQuoteSync(id); }
    });
}
function applyQ(q) {
  // Migrate old v1 rooms (windows[] → areas[]/selections[])
  (q.rooms||[]).forEach(function(r){
    if(!r.areas) r.areas=[];
    if(!r.selections) r.selections=[];
    // Migrate old single-area selections to openingId model
    r.selections.forEach(function(sel){
      if(!sel.openingId && (sel.areaIds||[]).length===1) sel.openingId=sel.areaIds[0];
    });
  });
  APP.quote=q; APP.quote.customerId=q.customerId||null; saveDraft();
  var cr=document.getElementById('custSearchResults'); if(cr) cr.innerHTML='';
  _custResults=[];
  document.getElementById('cName').value=q.customer.name||'';
  document.getElementById('cMobile').value=q.customer.mobile||'';
  document.getElementById('cArch').value=q.customer.arch||'';
  document.getElementById('cAddr').value=q.customer.addr||'';
  var s1=document.getElementById('cSales1'); if(s1) s1.value=q.staff||'';
  buildSales2Drop(q.staff||'');
  var s2=document.getElementById('cSales2'); if(s2) s2.value=q.staff2||'';
  setNavForBuilder();
  goTo('screen-builder');
}
function shareQuote() {
  var url=window.location.origin+window.location.pathname+'?load='+APP.quote.id;
  if(navigator.share) navigator.share({title:CFG.brandName+' Quote – '+APP.quote.customer.name, text:'Quote '+APP.quote.id, url:url});
  else if(navigator.clipboard) navigator.clipboard.writeText(url).then(function(){ showToast('Link copied ✓'); });
  else showToast(url);
}

var _qFiltered=[], _qAll=[], _qListListener=null;

function renderQList() {
  setNavForQuotes();
  // Admin filter row
  var afr=document.getElementById('adminFilterRow');
  var sff=document.getElementById('qSalesFilter');
  if(afr&&sff){
    var isAdmin=APP.staff&&APP.staff.role==='admin';
    afr.style.display=isAdmin?'':'none';
    if(isAdmin){
      var curSF=sff.value;
      sff.innerHTML='<option value="">All Salesmen</option>';
      STAFF.forEach(function(s){ var o=document.createElement('option'); o.value=s.name; o.textContent=s.name; sff.appendChild(o); });
      if(curSF) sff.value=curSF;
    }
  }
  // Show local cache immediately
  var local=getList();
  local.sort(function(a,b){ return(parseInt(b.id.replace(/\D/g,''))||0)-(parseInt(a.id.replace(/\D/g,''))||0); });
  _qAll=local; _qFiltered=local; drawQList(local,false);

  var user=AUTH.currentUser;
  if(!user || user.isAnonymous) return; // anonymous users see local-only list

  // Kill previous listener if any
  if(_qListListener){ _qListListener(); _qListListener=null; }

  var query=DB.collection('quotes')
    .orderBy('updatedAt','desc')
    .limit(300);

  drawQList(local,true);
  _qListListener=query.onSnapshot(function(snap){
    var cloudList=[];
    snap.forEach(function(doc){
      var d=doc.data();
      var local=getList().find(function(q){ return q.id===doc.id; });
      cloudList.push({
        id:doc.id, date:d.date||'', staff:d.staff||'', staff2:d.staff2||'',
        name:d.customerName||'', mobile:d.customerPhone||'',
        arch:d.customer?d.customer.arch:'', addr:d.customer?d.customer.addr:'',
        total:d.grandNet||0, rooms:d.rooms?d.rooms.length:0,
        status:d.status||'draft', updated:d.updatedAt?new Date(d.updatedAt.toDate()).toLocaleString('en-IN'):'',
        fromCloud:true, draft: local ? local.draft : null,
        _fullDoc: d
      });
    });
    // Merge with local drafts that aren't in Firestore yet
    var localOnly=getList().filter(function(q){
      return !cloudList.find(function(c){ return c.id===q.id; });
    });
    _qAll=cloudList.concat(localOnly);
    _qFiltered=_qAll;
    drawQList(_qFiltered,false);
    var cnt=document.getElementById('navSub');
    if(cnt) cnt.textContent=_qAll.length+' quotes · synced';
  }, function(err){
    console.error('[Quote list]', err);
    var cnt=document.getElementById('navSub');
    if(cnt) cnt.textContent='Sync error — showing local only';
    drawQList(_qFiltered,false);
  });
}

function filterQ() {
  var q=(document.getElementById('qSearch').value||'').trim().toLowerCase();
  var sfEl=document.getElementById('qSalesFilter');
  var sf=sfEl?sfEl.value||'':'';
  var list=_qAll;
  if(q) list=list.filter(function(e){
    return['name','mobile','id','staff','staff2','arch'].some(function(k){
      return(e[k]||'').toLowerCase().indexOf(q)!==-1;
    });
  });
  if(sf) list=list.filter(function(e){ return e.staff===sf||e.staff2===sf; });
  _qFiltered=list;
  drawQList(_qFiltered,false);
}

  var h='';

    var status=q.status||'draft';
    h+='<div class="q-card" onclick="openQ('+i+')">'
      +'<div class="q-top"><div class="q-left">'
      +'<div class="q-id">'+esc(q.id||'—')
      +(q.fromCloud?'<span class="q-tag q-tag-cloud" style="margin-left:6px">CLOUD</span>':'')
      +(!q.draft&&q.fromCloud?'<span class="q-tag q-tag-load" style="margin-left:4px">TAP TO LOAD</span>':'')
      +'</div>'
      +'<div class="q-name">'+esc(q.name||'Unknown')+'</div>'
      +'<div class="q-meta">'+esc(q.mobile||'')+(q.arch?' · '+esc(q.arch):'')+'</div>'
      +'<div class="q-meta">'+esc(q.date||'')+'</div>'
      +'</div><div class="q-right">'
      +(q.total?'<div class="q-total">₹'+Number(Math.round(q.total)).toLocaleString('en-IN')+'</div>':'')
      +'<span class="q-status '+status+'">'+status+'</span>'
      +'<button onclick="delQ('+i+',event)" class="q-del-btn">🗑</button>'
      +'</div></div>'
      +'<div class="q-bottom">'
      +'<span class="q-tag q-tag-staff">👤 '+esc(q.staff||'Staff')+(q.staff2?' &amp; '+esc(q.staff2):'')+'</span>'
      +(q.rooms?'<span class="q-tag q-tag-rooms">'+q.rooms+' room'+(q.rooms!==1?'s':'')+'</span>':'')
      +'<span class="q-tag q-tag-rooms" style="margin-left:auto">'+esc(q.updated||q.date||'')+'</span>'
      +'</div></div>';
  });
  el.innerHTML=h;
}
function openQ(i) {
  var e=_qFiltered[i]; if(!e) return;
  if(e.draft){ try{ applyQ(JSON.parse(e.draft)); }catch(ex){} }
  else if(e._fullDoc){ applyQ(e._fullDoc); saveToList(); }
  DB.collection('quotes').doc(e.id).get()
    .then(function(snap){
      if(snap.exists){
        var q=snap.data(); e.draft=JSON.stringify(q); saveQEntry(e);
        applyQ(q); showToast('Opened ✓ '+e.id); startQuoteSync(e.id);
      } else {
        if(!e.draft&&!e._fullDoc) showToast('Not found: '+e.id);
        else { showToast('Opened (cached): '+e.id); startQuoteSync(e.id); }
      }
    }).catch(function(){
      if(!e.draft&&!e._fullDoc) showToast('Error loading');
      else { showToast('Offline — showing cached version'); startQuoteSync(e.id); }
    });
}
function saveQEntry(e) {
  var list=getList(), found=false;
  list=list.map(function(q){ if(q.id===e.id){ found=true; return e; } return q; });
  if(!found) list.unshift(e);
  try{ localStorage.setItem('darla_list',JSON.stringify(list)); }catch(ex){}
}
function delQ(i,ev) {
  ev.stopPropagation();
  var e=_qFiltered[i]; if(!e) return;
  if(!confirm('Delete '+e.id+' for '+e.name+'?')) return;
  try{ localStorage.setItem('darla_list',JSON.stringify(getList().filter(function(q){ return q.id!==e.id; }))); }catch(ex){}
  _qFiltered.splice(i,1);
  _qAll=_qAll.filter(function(q){ return q.id!==e.id; });
  drawQList(_qFiltered,false);
  showToast('Deleted '+e.id);
  // Delete from Firestore (manager+ permission enforced by security rules)
  var user=AUTH.currentUser;
  if(user && !user.isAnonymous){
    DB.collection('quotes').doc(e.id).delete().catch(function(err){
      showToast('Could not delete from cloud: '+err.message);
    });
  }
}

// ═══════════════════════════════════════════════════════════
// MODALS + TOAST
// ═══════════════════════════════════════════════════════════
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function showToast(msg) {
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); },2500);
}
</script>
