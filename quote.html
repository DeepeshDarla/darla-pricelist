<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Cache-Control" content="no-cache,no-store,must-revalidate">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="theme-color" content="#faf8f5">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Darla — Quote Builder</title>
<link rel="stylesheet" href="quote.css">

<!-- Firebase compat SDK (no build step required) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-functions-compat.js"></script>
<script src="firebase-init.js"></script>

</head>
<body>
<!-- ══════════════════════════════════════════
     APP SHELL
══════════════════════════════════════════ -->
<div id="app-shell">

  <!-- TOP NAV -->

  <nav id="top-nav">
    <div class="nav-inner">
      <img class="nav-logo" src="https://DeepeshDarla.github.io/darla-pricelist/Darla%20Final%20Logo%20-%20Copy.jpg" onerror="this.style.display='none'" alt="Darla">
      <div style="flex:1;min-width:0">
        <div class="nav-title" id="navTitle">Quote Builder</div>
        <div class="nav-sub" id="navSub">Darla Sales &amp; Agencies</div>
      </div>
      <span id="autoSaveStatus" style="font-size:10px;font-weight:700;color:var(--text3);transition:opacity 0.6s;opacity:0;white-space:nowrap;padding:0 6px"></span>
      <div class="nav-actions" id="navActions"></div>
    </div>
    <div id="navTabsWrap" style="display:none">
      <div class="nav-tabs" id="navTabs"></div>
    </div>
  </nav>

  <!-- MAIN CONTENT -->

  <main id="main-content">

<!-- SCREEN: LOGIN — iOS lock-screen style fixed overlay -->
<div id="screen-login" class="active">
  <div class="ls-top">
    <img class="login-logo" src="https://DeepeshDarla.github.io/darla-pricelist/Darla%20Final%20Logo%20-%20Copy.jpg" onerror="this.style.display='none'" alt="Darla">
    <div class="login-title">Quote Builder</div>
    <select class="staff-select" id="staffSel" onchange="onStaffPick()">
      <option value="">— Select Staff Member —</option>
    </select>
    <div class="ls-staff-name" id="lsStaffName">—</div>
    <div class="ls-staff-sub" id="loginSub">Select your name to continue</div>
    <div class="ls-dots">
      <div class="pin-dot" id="pd0"></div>
      <div class="pin-dot" id="pd1"></div>
      <div class="pin-dot" id="pd2"></div>
      <div class="pin-dot" id="pd3"></div>
    </div>
  </div>
  <div class="ls-bottom">
    <div class="pin-error" id="pinErr"></div>
    <div class="pin-grid">
      <button class="pin-key" onclick="pk('1')">1</button>
      <button class="pin-key" onclick="pk('2')">2</button>
      <button class="pin-key" onclick="pk('3')">3</button>
      <button class="pin-key" onclick="pk('4')">4</button>
      <button class="pin-key" onclick="pk('5')">5</button>
      <button class="pin-key" onclick="pk('6')">6</button>
      <button class="pin-key" onclick="pk('7')">7</button>
      <button class="pin-key" onclick="pk('8')">8</button>
      <button class="pin-key" onclick="pk('9')">9</button>
      <button class="pin-key ghost"></button>
      <button class="pin-key" onclick="pk('0')">0</button>
      <button class="pin-key del" onclick="pd()">⌫</button>
    </div>
    <button class="login-skip" onclick="skipLogin()">Skip — Demo Mode</button>
  </div>
</div>

<!-- SCREEN: CUSTOMER -->
<div id="screen-customer" class="screen">
  <div class="page-wrap">
    <div class="section-label">Customer Details</div>
    <div class="form-card accent-blue">
      <div class="field">
        <label class="field-label">Mobile Number *</label>
        <input class="inp" id="cMobile" placeholder="10-digit number" type="tel" maxlength="10" inputmode="numeric" oninput="lookupCustomerByMobile(this.value)">
        <div id="custSearchResults"></div>
      </div>
      <div class="field"><label class="field-label">Customer Name *</label><input class="inp" id="cName" placeholder="Full name" type="text" autocapitalize="words"></div>
      <div class="inp-row">
        <div class="field"><label class="field-label">Architect / Designer</label><input class="inp" id="cArch" placeholder="Optional" type="text" autocapitalize="words"></div>
        <div class="field"><label class="field-label">Address / Project</label><input class="inp" id="cAddr" placeholder="Optional" type="text"></div>
      </div>
    </div>
    <div class="section-label">Sales Staff</div>
    <div class="form-card accent-red">
      <div class="inp-row">
        <div class="field"><label class="field-label">Salesman 1 (Primary)</label><select class="inp" id="cSales1"><option value="">— Select Salesman —</option></select></div>
        <div class="field"><label class="field-label">Salesman 2</label><select class="inp" id="cSales2"><option value="">— None —</option></select></div>
      </div>
    </div>
    <button class="btn" onclick="startQuote()">Start Quote →</button>
  </div>
</div>

<!-- SCREEN: BUILDER (room overview) -->
<div id="screen-builder" class="screen">
  <div class="page-wrap bld-wrap">
    <div class="bld-main">
      <div id="roomsWrap"></div>
      <button class="btn add-btn" onclick="openRoomModal()" style="margin-top:4px">+ Add Room</button>
    </div>
    <aside id="bldSidebar" class="bld-sidebar"></aside>
  </div>
  <div class="btm-bar" id="bldBar">
    <button class="btn ghost" style="margin-top:0;flex:1;min-width:0;font-size:13px" onclick="saveAndGoList()">≡ All</button>
    <div style="flex:1.8;text-align:center;min-width:0;padding:0 6px;cursor:default">
      <div style="font-size:8px;font-weight:800;letter-spacing:0.12em;text-transform:uppercase;color:var(--text4)">TOTAL</div>
      <div style="font-size:16px;font-weight:900;color:var(--red);letter-spacing:-0.5px;line-height:1.2" id="bldTotal">₹0</div>
    </div>
    <button class="btn ghost" style="margin-top:0;flex:1;min-width:0;font-size:13px" onclick="saveQuote()">✦ Save</button>
    <button class="btn" style="margin-top:0;flex:2;min-width:0;font-size:13px" onclick="goTo('screen-summary')">Summary →</button>
  </div>
</div>

<!-- SCREEN: ROOM MEASUREMENTS (area list) -->
<div id="screen-room-measurements" class="screen">
  <div class="page-wrap" id="measurementsWrap" style="padding-bottom:100px"></div>
  <div class="btm-bar visible" id="measBar" style="display:none!important"></div>
</div>

<!-- SCREEN: ROOM SELECTIONS (selection list) -->
<div id="screen-room-selections" class="screen">
  <div class="page-wrap" id="selectionsWrap" style="padding-bottom:100px"></div>
</div>

<!-- SCREEN: ADD / EDIT AREA -->
<div id="screen-add-area" class="screen">
  <div class="page-wrap" id="addAreaWrap" style="padding-bottom:100px"></div>
</div>

<!-- SCREEN: ADD / EDIT SELECTION (3-step inline) -->
<div id="screen-add-selection" class="screen">
  <div class="page-wrap" id="addSelWrap" style="padding-bottom:100px"></div>
</div>

<!-- SCREEN: ADD HARDWARE (tracks/rods) -->
<div id="screen-add-hardware" class="screen">
  <div class="page-wrap" id="addHwWrap" style="padding-bottom:100px"></div>
</div>

<!-- SCREEN: SETTINGS -->
<div id="screen-settings" class="screen">
  <div class="page-wrap" id="settingsWrap" style="padding-bottom:100px">
    <div class="section-label">Pricing Defaults</div>
    <div style="font-size:12px;color:var(--text3);margin-bottom:16px">Changes apply to all new quotes. Override per-quote in the selection form.</div>
    <div id="settingsSections"></div>
    <button class="btn ghost" onclick="resetPConfig()" style="margin-top:8px;color:#e74c3c;border-color:#e74c3c">Reset to Defaults</button>
  </div>
</div>

<!-- SCREEN: SUMMARY -->
<div id="screen-summary" class="screen">
  <div class="page-wrap" id="sumContent"></div>
  <div class="btm-bar" id="sumBar">
    <button class="btn ghost" style="margin-top:0;flex:1;font-size:11px;padding:0 6px" onclick="showPrintPicker('measure')" title="Measurements only">📏<br><span style="font-size:9px">Measure</span></button>
    <button class="btn ghost" style="margin-top:0;flex:1;font-size:11px;padding:0 6px" onclick="showPrintPicker('select')" title="Selections only">🎨<br><span style="font-size:9px">Select</span></button>
    <button class="btn ghost" style="margin-top:0;flex:1;font-size:11px;padding:0 6px" onclick="showPrintPicker('quote')" title="Full quote with prices">💰<br><span style="font-size:9px">Quote</span></button>
    <button class="btn ghost" style="margin-top:0;flex:1.5;font-size:13px;border-color:var(--red);color:var(--red)" onclick="saveQuote()">💾 Save</button>
    <button class="btn" style="margin-top:0;flex:1.5;font-size:13px" onclick="saveAndExit()">Exit →</button>
  </div>
</div>

<!-- SCREEN: ALL QUOTES -->
<div id="screen-quotes" class="screen">
  <div class="search-bar-wrap no-print">
    <input class="inp" id="qSearch" placeholder="Search name, mobile, quote ID…" oninput="filterQ()" autocomplete="off" style="margin-top:0;flex:1">
    <button class="btn ghost sm" onclick="document.getElementById('qSearch').value='';filterQ()">Clear</button>
  </div>
  <div id="adminFilterRow" class="search-bar-wrap no-print" style="display:none;padding-top:0;border-top:none">
    <select class="inp" id="qSalesFilter" onchange="filterQ()" style="margin-top:0;flex:1">
      <option value="">All Salesmen</option>
    </select>
  </div>
  <div style="padding:12px 14px 120px"><div id="qList"></div></div>
</div>

  </main>
</div>

<!-- ══════════════════════════════════════════
     PRODUCT SEARCH MODAL (replaces index.html)
══════════════════════════════════════════ -->

<div class="modal-overlay" id="productModal">
  <div class="search-modal">
    <div class="search-modal-hdr">
      <div class="search-modal-handle"></div>
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
        <div class="search-modal-title">Select Product</div>
        <button class="nav-btn" onclick="closeProductModal()" style="height:30px;padding:0 12px;font-size:12px">✕ Cancel</button>
      </div>
      <div class="search-modal-sub" id="productModalSub">Searching for quote</div>
      <div class="search-cat-tabs" id="productCatTabs"></div>
    </div>
    <div class="search-modal-body" id="productModalBody">
      <div id="productSearchFields"></div>
      <button class="btn" id="productSearchBtn" onclick="doProductSearch()" style="margin-top:12px">Search →</button>
      <div id="productResults" style="margin-top:14px"></div>
    </div>
  </div>
</div>

<!-- ══════════════════════════════════════════
     STANDARD MODALS
══════════════════════════════════════════ -->

<!-- ROOM MODAL -->

<div class="std-modal" id="mRoom">
  <div class="std-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Add Room</div>
    <div class="pill-wrap" id="roomPills"></div>
    <div class="field"><label class="field-label">Custom Name</label><input class="inp" id="mRoomName" placeholder="Or type a custom name"></div>
    <div class="btn-row">
      <button class="btn ghost" style="margin-top:0" onclick="closeModal('mRoom')">Cancel</button>
      <button class="btn" style="margin-top:0" onclick="confirmRoom()">Add Room</button>
    </div>
  </div>
</div>

<!-- WINDOW MODAL -->

<div class="std-modal" id="mWin">
  <div class="std-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Add Window</div>
    <input type="hidden" id="mWinRi">
    <div id="mWinCopyHint" style="display:none;background:var(--green-dim);border:1px solid rgba(39,174,96,0.3);border-radius:var(--r-sm);padding:9px 13px;font-size:12px;color:var(--green);margin-bottom:12px;text-align:center;font-weight:600"></div>
    <div class="field"><label class="field-label">Window Name</label><input class="inp" id="mWinName" placeholder="e.g. Bay Window, Main Door"></div>
    <div class="inp-row">
      <div class="field"><label class="field-label">Width (inches)</label><input class="inp" id="mWinW" type="number" placeholder="e.g. 84" inputmode="decimal"></div>
      <div class="field"><label class="field-label">Height (inches)</label><input class="inp" id="mWinH" type="number" placeholder="e.g. 108" inputmode="decimal"></div>
    </div>
    <div class="inp-row">
      <div class="field"><label class="field-label">Qty</label><input class="inp" id="mWinQ" type="number" value="1" min="1" inputmode="numeric"></div>
      <div class="field"><label class="field-label">Remarks</label><input class="inp" id="mWinR" placeholder="Optional"></div>
    </div>
    <div class="btn-row">
      <button class="btn ghost" style="margin-top:0" onclick="closeModal('mWin')">Cancel</button>
      <button class="btn" style="margin-top:0" onclick="confirmWin()">Add Window</button>
    </div>
  </div>
</div>

<!-- TREATMENT MODAL -->

<div class="std-modal" id="mTx">
  <div class="std-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Select Treatment</div>
    <input type="hidden" id="mTxRi"><input type="hidden" id="mTxWi">
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:14px">
      <button class="btn blue" style="margin-top:0" onclick="confirmTx('curtains')">🪟 Curtains</button>
      <button class="btn green" style="margin-top:0" onclick="confirmTx('roman_blinds')">🟩 Roman Blinds</button>
      <button class="btn amber-btn" style="margin-top:0" onclick="confirmTx('blinds')">⊙ Blinds</button>
    </div>
    <button class="btn ghost" style="margin-top:0" onclick="closeModal('mTx')">Cancel</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- PROFILE BOTTOM SHEET -->
<div id="profileSheet">
  <div class="profile-card">
    <div class="modal-handle"></div>
    <div class="profile-name" id="profileName">—</div>
    <div class="profile-role" id="profileRole"></div>
    <div class="profile-divider"></div>
    <button class="profile-action" onclick="hideProfile();goTo('screen-settings')">⚙ Settings</button>
    <button class="profile-action" onclick="hideProfile();saveQuote();showToast('Synced ✓')">↻ Sync Data</button>
    <div class="profile-divider"></div>
    <button class="profile-action danger" onclick="confirmLogout()">⎋ Logout</button>
    <button class="btn ghost" onclick="hideProfile()" style="margin-top:8px">Cancel</button>
  </div>
</div>

<script src="quote.js"></script>
</body>
</html>
