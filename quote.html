function showAcDrop(drop,items,inp,onSel) {
  if(!drop||!items||!items.length){ if(drop) drop.classList.remove('open'); return; }
  var q=(inp.value||'').trim().toLowerCase();
  drop.innerHTML=items.map(function(item){
    var s=esc(String(item));
    if(q){ s=s.replace(new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<mark>$1</mark>'); }
    return '<div class="ac-item" onmousedown="selAcItem(this,event)">'+s+'</div>';
  }).join('');
  drop.classList.add('open'); drop._cb=onSel;
}
function selAcItem(el,ev){ ev.preventDefault(); var cb=el.parentElement._cb; if(cb) cb(el.textContent); }
function filtAc(arr,q){ if(!arr||!arr.length) return []; if(!q||!q.trim()) return arr.slice(0,50); var l=q.trim().toLowerCase(); return arr.filter(function(x){ return String(x).toLowerCase().indexOf(l)!==-1; }).slice(0,50); }

function doProductSearch() {
  var cat=_prodCat, ci=CATS[cat];
  var results=document.getElementById('productResults');
  results.innerHTML='<div class="loading-state"><span class="spin"></span>Searching...</div>';
  _openExpIdx=-1;
  if(ci.codeSearch){
    var code=((document.getElementById('pf_code')||{}).value||'').trim().toUpperCase().replace(/[^A-Z0-9\-]/g,'');
    if(!code){ results.innerHTML=''; return; }
    fetch(CFG.firebase+'/'+cat+'/by_code/'+encodeURIComponent(code)+'.json')
      .then(function(r){ return r.json(); })
      .then(function(d){ renderProdResults(d?[].concat(Array.isArray(d)?d:Object.values(d)):[]); })
      .catch(function(){ results.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3)">Error loading results.</div>'; });
    return;
  }
  var brand=getProdFieldVal(ci.inputs[0])||'';
  var lvl1 =ci.inputs[1]?getProdFieldVal(ci.inputs[1])||'':'';
  var lvl2 =ci.inputs[2]?getProdFieldVal(ci.inputs[2])||'':'';
  var bKey=sk(brand), cKey=sk(lvl1), sKey=sk(lvl2);
  var url;
  if(bKey&&bKey!=='_'&&cKey&&cKey!=='_'&&sKey&&sKey!=='_')
    url=CFG.firebase+'/'+cat+'/by_brand/'+encodeURIComponent(bKey)+'/'+encodeURIComponent(cKey)+'/'+encodeURIComponent(sKey)+'.json';
  else if(bKey&&bKey!=='_'&&cKey&&cKey!=='_')
    url=CFG.firebase+'/'+cat+'/by_brand/'+encodeURIComponent(bKey)+'/'+encodeURIComponent(cKey)+'.json';
  else if(bKey&&bKey!=='_')
    url=CFG.firebase+'/'+cat+'/by_brand/'+encodeURIComponent(bKey)+'.json';
  else
    url=CFG.firebase+'/'+cat+'/by_code.json';
  fetch(url)
    .then(function(r){ return r.json(); })
    .then(function(data){
      if(!data){ renderProdResults([]); return; }
      var rows=[];
      (function flatten(obj){ if(Array.isArray(obj)) obj.forEach(function(item){ if(item&&item.code) rows.push(item); }); else if(obj&&typeof obj==='object') Object.values(obj).forEach(function(v){ flatten(v); }); })(data);
      renderProdResults(rows);
    })
    .catch(function(){ results.innerHTML='<div style="padding:20px;text-align:center;color:var(--text3)">Error loading results.</div>'; });
}

function renderProdResults(rows) {
  _prodRows=rows;
  var el=document.getElementById('productResults');
  if(!rows||!rows.length){
    el.innerHTML='<div style="padding:40px 20px;text-align:center;color:var(--text3)">No products found</div>'; return;
  }
  var cat=_prodCat;
  var html='<div class="results-count"><span class="results-count-lbl">Found</span><span class="results-count-num">'+rows.length+' items</span></div>'
    +'<div class="result-table">';
  rows.forEach(function(r,idx){
    var brand=gv(r,'brand'), catalog=gv(r,'catalog')||gv(r,'model')||gv(r,'product')||'', sno=gv(r,'s_no')||'';
    var mainLabel=[brand,catalog].filter(Boolean).join(' / ')||gv(r,'blind_type')||'—';
    var mrp=gv(r,'mrp')||r.mrp||'';
    html+='<div class="result-row" onclick="toggleResultRow('+idx+')" id="rrow_'+idx+'">'
      +'<div class="result-row-main">'+esc(mainLabel)+'</div>'
      +(sno?'<div class="result-row-sub">'+esc(sno)+'</div>':'')
      +(mrp?'<div class="result-row-mrp">₹'+esc(mrp)+(cat==='blinds'?'/sqft':'/mtr')+'</div>':'')
      +'</div>'
      +'<div class="result-expand" id="rexp_'+idx+'">'
      +buildExpPanel(r,cat,idx)
      +'</div>';
  });
  html+='</div>';
  el.innerHTML=html;
}
function buildExpPanel(r,cat,idx) {
  var fields=[['Brand','brand'],['Catalog','catalog'],['S.No','s_no'],['Blind Type','blind_type'],
    ['Mechanism','mechanism'],['Other Details','other_details'],['Design Details','design_details'],
    ['Model','model'],['Size','size'],['Width','width'],['Item Details','item_details'],['MRP','mrp']];
  var html='';
  fields.forEach(function(f){ var v=gv(r,f[1])||r[f[1]]||''; if(v) html+='<div class="exp-line"><span class="exp-lbl">'+f[0]+'</span><span class="exp-val">'+esc(v)+'</span></div>'; });
  html+='<button class="select-product-btn" onclick="selectProduct('+idx+')">✓ Select This Product</button>';
  return html;
}
function toggleResultRow(idx) {
  if(_openExpIdx===idx){
    document.getElementById('rexp_'+idx).classList.remove('open');
    _openExpIdx=-1; return;
  }
  if(_openExpIdx>=0){ var old=document.getElementById('rexp_'+_openExpIdx); if(old) old.classList.remove('open'); }
  var exp=document.getElementById('rexp_'+idx); if(exp) exp.classList.add('open');
  _openExpIdx=idx;
}
function selectProduct(idx) {
  var r=_prodRows[idx]; if(!r||!_prodCtx) return;
  var ctx=_prodCtx;
  var c=APP.quote.rooms[ctx.ri].windows[ctx.wi].treatments[ctx.ti].components[ctx.ci];
  if(!c) return;
  c.product={
    code:r.code||'', brand:gv(r,'brand'), catalog:gv(r,'catalog')||gv(r,'model')||gv(r,'product')||'',
    s_no:gv(r,'s_no')||gv(r,'s.no')||'', mrp:parseFloat(r.mrp||gv(r,'mrp'))||0,

}

function _compCalcRows(win, c, tx) {
  // Returns HTML rows for calc breakdown of a single component
  if(!c.product) return '';
  var cc = calcComp(win, Object.assign({},c,{treatmentType:tx.type}));
  var h = '';
  var disc = c.discount || 0;
  if(tx.type==='curtains') {
    var panelLine = cc.numPanels+'panels×'+cc.panelLen+'m = '+cc.fabricQty+'m';
    h += '<div style="font-size:11px;color:var(--text3);margin:3px 0 5px">'+panelLine+'</div>';
    (cc.lines||[]).forEach(function(ln){
      h += '<div style="display:flex;justify-content:space-between;align-items:baseline;padding:2px 0;border-bottom:1px dotted var(--border)">'
        +'<span style="font-size:11px;color:var(--text3)">'+esc(ln.lbl)+'</span>'
        +'<span style="font-size:11px;color:var(--text2)">'+esc(String(ln.qty))+' × '+fmt(ln.rate)+'</span>'
        +'<span style="font-size:12px;font-weight:700;color:var(--text);min-width:60px;text-align:right">'+fmt(ln.amt)+'</span>'
        +'</div>';
    });
  } else if(tx.type==='roman_blinds') {
    var rpLine = cc.panels+'panels×'+cc.panelLen+'m = '+cc.fabricQty+'m';
    h += '<div style="font-size:11px;color:var(--text3);margin:3px 0 5px">'+rpLine+'</div>';
    [{lbl:'Mechanism',s:cc.sqft+'sqft',a:cc.matCost},
     {lbl:'Fabric',s:cc.fabricQty+'m×'+fmt(c.product.mrp),a:cc.fabCost},
     {lbl:'Lining',s:cc.fabricQty+'m',a:cc.lining},
     {lbl:'Installation',s:'per win',a:cc.installation},
     {lbl:'Stitching',s:'per win',a:cc.stitching}
    ].forEach(function(ln){
      h += '<div style="display:flex;justify-content:space-between;align-items:baseline;padding:2px 0;border-bottom:1px dotted var(--border)">'
        +'<span style="font-size:11px;color:var(--text3)">'+esc(ln.lbl)+'</span>'
        +'<span style="font-size:11px;color:var(--text2)">'+esc(String(ln.s))+'</span>'
        +'<span style="font-size:12px;font-weight:700;color:var(--text);min-width:60px;text-align:right">'+fmt(ln.a)+'</span>'
        +'</div>';
    });
  } else {
    h += '<div style="display:flex;justify-content:space-between;padding:2px 0">'
      +'<span style="font-size:11px;color:var(--text3)">Area</span>'
      +'<span style="font-size:12px;font-weight:700;color:var(--text)">'+cc.sqft+' sqft</span></div>'
      +'<div style="display:flex;justify-content:space-between;padding:2px 0">'
      +'<span style="font-size:11px;color:var(--text3)">'+fmt(cc.sqft)+' × '+fmt(c.product.mrp)+'</span>'
      +'<span style="font-size:12px;font-weight:700;color:var(--text)">'+fmt(cc.unitTotal)+'</span></div>';
  }
  if((parseInt(win.qty)||1)>1) {
    h += '<div style="display:flex;justify-content:space-between;padding:2px 0;margin-top:2px;border-top:1px solid var(--border)">'
      +'<span style="font-size:11px;color:var(--text3)">× '+win.qty+' windows</span>'
      +'<span style="font-size:12px;font-weight:700;color:var(--text)">'+fmt(cc.total)+'</span></div>';
  }
  if(disc>0) {
    var d=applyDiscount(cc.total,disc);
    h += '<div style="display:flex;justify-content:space-between;padding:2px 0;color:#f39c12">'
      +'<span style="font-size:11px">Discount '+disc+'%</span>'
      +'<span style="font-size:12px;font-weight:700">–'+fmt(d.discountAmt)+'</span></div>';
  }
  return h;
}

          var txLbl=tx.type==='curtains'?'Curtains':tx.type==='roman_blinds'?'Roman Blinds':'Blinds';
          var lyr=c.layer==='blind'?'BLIND':c.layer.toUpperCase();
          if(tx.type==='blinds'){
            h+='<div style="font-size:7pt;color:#555;margin-bottom:0.5mm"><b>'+txLbl+'</b> · '+cc.sqft+' sqft</div>';

        });
      });
      if(!hasProduct) h+='<div style="font-size:7pt;color:#bbb;font-style:italic">No selection yet</div>';
      h+='</div></div>';
    });
    h+='</div>';
  });
  return h;
}

// ── PRINT MODE 2: SELECTIONS ONLY ──────────────────────────────────────────
function _winSelKey(win) {
  var parts=[];
  win.treatments.forEach(function(tx){
    tx.components.forEach(function(c){
      if(!c.product) return;
      var p=c.product;
      parts.push([tx.type,c.layer,p.brand||'',p.catalog||'',p.s_no||'',c.stitchStyle||''].join('|'));
    });
  });
  return parts.sort().join('::');
}
function _selectionHTML(win) {
  var h='';
  win.treatments.forEach(function(tx){
    var hasItems=tx.components.some(function(c){ return !!c.product; });
    if(!hasItems) return;
    var txLbl=tx.type==='curtains'?'Curtains':tx.type==='roman_blinds'?'Roman Blinds':'Blinds';
    h+='<div style="font-size:6.5pt;font-weight:900;letter-spacing:1.2pt;color:#aaa;text-transform:uppercase;margin:1.5mm 0 0.8mm">'+txLbl+'</div>';
    tx.components.forEach(function(c){
      if(!c.product) return;
      var p=c.product;

      var lyr=c.layer==='blind'?'BLIND':c.layer.toUpperCase();

function _buildPrintSelect() {
  var q=APP.quote, h=_printHdr(q)+_printCust(q);
  h+='<div style="font-size:7pt;font-weight:800;letter-spacing:2pt;text-transform:uppercase;color:#999;margin-bottom:3mm">SELECTIONS</div>';
  q.rooms.forEach(function(room){
    h+='<div style="break-inside:avoid;margin-bottom:4mm">'
      +'<div style="background:#000;color:#fff;padding:2mm 3mm;font-size:10pt;font-weight:900;margin-bottom:0">'+esc(room.name)+'</div>';
    // Group windows by selection fingerprint
    var groups={}, order=[];
    room.windows.forEach(function(win,wi){
      var key=_winSelKey(win);
      if(!key){ groups['__empty__'+wi]=[{win:win,wi:wi}]; order.push('__empty__'+wi); return; }
      if(!groups[key]){ groups[key]=[]; order.push(key); }
      groups[key].push({win:win,wi:wi});
    });
    order.forEach(function(key){
      var grp=groups[key];
      // Window names row
      h+='<div style="padding:2mm 3mm;border-bottom:0.5pt solid #eee;break-inside:avoid">'
        +'<div style="display:flex;flex-wrap:wrap;gap:2mm;margin-bottom:1.5mm">';

  return h;

function printMode(mode) {
  try {
    var html;
    if(mode==='measure') html=_buildPrintMeasure();
    else if(mode==='select') html=_buildPrintSelect();
    else html=_buildPrintQuote();
    var pd=document.getElementById('printDoc');
    if(!pd){ pd=document.createElement('div'); pd.id='printDoc'; document.body.appendChild(pd); }
    // Toolbar: close + print — hidden during actual print via CSS
    var modeLabel=mode==='measure'?'📏 Measurements':mode==='select'?'🎨 Selections':'💰 Quote';
    pd.innerHTML='<div id="printToolbar" style="position:sticky;top:0;z-index:10;background:#fff;border-bottom:2px solid #eee;padding:10px 16px;display:flex;justify-content:space-between;align-items:center">'
      +'<button onclick="closePrintDoc()" style="background:#f5f5f5;border:1px solid #ddd;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer;color:#333">✕ Close</button>'
      +'<span style="font-size:13px;font-weight:800;color:#333">'+modeLabel+'</span>'
      +'<button onclick="window.print()" style="background:#c0392b;color:#fff;border:none;border-radius:8px;padding:7px 16px;font-size:13px;font-weight:700;cursor:pointer">🖨 Print</button>'
      +'</div>'
      +'<div style="padding:5mm 5mm 10mm">'+html+'</div>';
    // Show as full-screen overlay
    pd.style.cssText='display:block!important;position:fixed;inset:0;z-index:950;background:#fff;overflow-y:auto;-webkit-overflow-scrolling:touch;color:#000;font-family:-apple-system,BlinkMacSystemFont,sans-serif';

function closePrintDoc() {
  var pd=document.getElementById('printDoc');

}

function saveToList() {
  var q=APP.quote; if(!q.id) return;
  var gt=grandTotal();
  var list=getList().filter(function(e){ return e.id!==q.id; });
  list.unshift({ id:q.id, date:q.date, staff:q.staff||'', staff2:q.staff2||'',
    name:q.customer.name||'', mobile:q.customer.mobile||'', arch:q.customer.arch||'',
    addr:q.customer.addr||'', total:gt, rooms:q.rooms.length, status:q.status||'draft',
    updated:new Date().toLocaleString('en-IN'), draft:JSON.stringify(q) });
  if(list.length>200) list=list.slice(0,200);
  try{ localStorage.setItem('darla_list', JSON.stringify(list)); }catch(e){}
}
function getList(){ try{ return JSON.parse(localStorage.getItem('darla_list')||'[]'); }catch(e){ return []; } }

function saveQuote() {
  saveDraftLocal(); saveToList();
  clearTimeout(_saveDraftTimer);
  _saveToFirestore(true);
}

function saveAndGoList() {
  saveDraftLocal(); saveToList();
  clearTimeout(_saveDraftTimer);
  _saveToFirestore(false);
  stopQuoteSync();
  switchTab('all');
}

function saveAndExit() {
  saveDraftLocal(); saveToList();
  clearTimeout(_saveDraftTimer);
  _saveToFirestore(false);
  stopQuoteSync();
  showToast('Saved ✓');
  switchTab('all');
}

function loadById(id) {
  // Check local cache first for instant load
  var local=getList().find(function(q){ return q.id===id; });
  if(local&&local.draft){ applyQ(JSON.parse(local.draft)); showToast('Loaded: '+id); startQuoteSync(id); return; }
  // Load from Firestore
  showToast('Loading…');
  DB.collection('quotes').doc(id).get()
    .then(function(snap){
      if(snap.exists){
        var q=snap.data(); applyQ(q); saveToList(); showToast('Loaded: '+id); startQuoteSync(id);
      } else { showToast('Not found: '+id); }
    }).catch(function(){ showToast('Not found — check connection'); });
}
function applyQ(q) {
  APP.quote=q; saveDraft();
  document.getElementById('cName').value=q.customer.name||'';
  document.getElementById('cMobile').value=q.customer.mobile||'';
  document.getElementById('cArch').value=q.customer.arch||'';
  document.getElementById('cAddr').value=q.customer.addr||'';
  var s1=document.getElementById('cSales1'),s2=document.getElementById('cSales2');
  if(s1) s1.value=q.staff||''; if(s2) s2.value=q.staff2||'';
  setNavForBuilder();
  goTo('screen-builder');
}
function shareQuote() {
  var url=window.location.origin+window.location.pathname+'?load='+APP.quote.id;
  if(navigator.share) navigator.share({title:CFG.brandName+' Quote – '+APP.quote.customer.name, text:'Quote '+APP.quote.id, url:url});
  else if(navigator.clipboard) navigator.clipboard.writeText(url).then(function(){ showToast('Link copied ✓'); });
  else showToast(url);
}

var _qFiltered=[], _qAll=[], _qListListener=null;

function renderQList() {
  setNavForQuotes();
  // Show local cache immediately
  var local=getList();
  local.sort(function(a,b){ return(parseInt(b.id.replace(/\D/g,''))||0)-(parseInt(a.id.replace(/\D/g,''))||0); });
  _qAll=local; _qFiltered=local; drawQList(local,false);

  var user=AUTH.currentUser;
  if(!user || user.isAnonymous) return; // anonymous users see local-only list

  // Kill previous listener if any
  if(_qListListener){ _qListListener(); _qListListener=null; }

  var query=DB.collection('quotes')
    .where('tenantId','==','darla')
    .orderBy('updatedAt','desc')
    .limit(200);

  drawQList(local,true);
  _qListListener=query.onSnapshot(function(snap){
    var cloudList=[];
    snap.forEach(function(doc){
      var d=doc.data();
      var local=getList().find(function(q){ return q.id===doc.id; });
      cloudList.push({
        id:doc.id, date:d.date||'', staff:d.staff||'', staff2:d.staff2||'',
        name:d.customerName||'', mobile:d.customerPhone||'',
        arch:d.customer?d.customer.arch:'', addr:d.customer?d.customer.addr:'',
        total:d.grandNet||0, rooms:d.rooms?d.rooms.length:0,
        status:d.status||'draft', updated:d.updatedAt?new Date(d.updatedAt.toDate()).toLocaleString('en-IN'):'',
        fromCloud:true, draft: local ? local.draft : null,
        _fullDoc: d
      });
    });
    // Merge with local drafts that aren't in Firestore yet
    var localOnly=getList().filter(function(q){
      return !cloudList.find(function(c){ return c.id===q.id; });
    });
    _qAll=cloudList.concat(localOnly);
    _qFiltered=_qAll;
    drawQList(_qFiltered,false);
    var cnt=document.getElementById('navSub');
    if(cnt) cnt.textContent=_qAll.length+' quotes · synced';
  }, function(){ drawQList(_qFiltered,false); });
}

function filterQ() {
  var q=(document.getElementById('qSearch').value||'').trim().toLowerCase();
  _qFiltered=q?_qAll.filter(function(e){
    return['name','mobile','id','staff','staff2','arch'].some(function(k){
      return(e[k]||'').toLowerCase().indexOf(q)!==-1;
    });
  }):_qAll;
  drawQList(_qFiltered,false);
}
function drawQList(list,loading) {
  var el=document.getElementById('qList'); if(!el) return;
  if(loading){ el.innerHTML='<div class="loading-state"><span class="spin"></span>Loading quotes…</div>'; return; }
  if(!list.length){ el.innerHTML='<div class="q-empty"><div class="ico">📄</div>No quotes found</div>'; return; }
  var h='';
  list.forEach(function(q,i){
    var status=q.status||'draft';
    h+='<div class="q-card" onclick="openQ('+i+')">'
      +'<div class="q-top"><div class="q-left">'
      +'<div class="q-id">'+esc(q.id||'—')
      +(q.fromCloud?'<span class="q-tag q-tag-cloud" style="margin-left:6px">CLOUD</span>':'')
      +(!q.draft&&q.fromCloud?'<span class="q-tag q-tag-load" style="margin-left:4px">TAP TO LOAD</span>':'')
      +'</div>'
      +'<div class="q-name">'+esc(q.name||'Unknown')+'</div>'
      +'<div class="q-meta">'+esc(q.mobile||'')+(q.arch?' · '+esc(q.arch):'')+'</div>'
      +'<div class="q-meta">'+esc(q.date||'')+'</div>'
      +'</div><div class="q-right">'
      +(q.total?'<div class="q-total">₹'+Number(Math.round(q.total)).toLocaleString('en-IN')+'</div>':'')
      +'<span class="q-status '+status+'">'+status+'</span>'
      +'<button onclick="delQ('+i+',event)" class="q-del-btn">🗑</button>'
      +'</div></div>'
      +'<div class="q-bottom">'
      +'<span class="q-tag q-tag-staff">👤 '+esc(q.staff||'Staff')+(q.staff2?' &amp; '+esc(q.staff2):'')+'</span>'
      +(q.rooms?'<span class="q-tag q-tag-rooms">'+q.rooms+' room'+(q.rooms!==1?'s':'')+'</span>':'')
      +'<span class="q-tag q-tag-rooms" style="margin-left:auto">'+esc(q.updated||q.date||'')+'</span>'
      +'</div></div>';
  });
  el.innerHTML=h;
}
function openQ(i) {
  var e=_qFiltered[i]; if(!e) return;
  // Use local draft if available
  if(e.draft){ try{ applyQ(JSON.parse(e.draft)); showToast('Opened: '+e.id); startQuoteSync(e.id); return; }catch(ex){} }
  // Use embedded full doc from onSnapshot
  if(e._fullDoc){ applyQ(e._fullDoc); saveToList(); showToast('Opened: '+e.id); startQuoteSync(e.id); return; }
  // Fetch from Firestore
  showToast('Loading…');
  DB.collection('quotes').doc(e.id).get()
    .then(function(snap){
      if(snap.exists){ var q=snap.data(); e.draft=JSON.stringify(q); saveQEntry(e); applyQ(q); showToast('Loaded: '+e.id); startQuoteSync(e.id); }
      else showToast('Not found: '+e.id);
    }).catch(function(){ showToast('Error loading'); });
}
function saveQEntry(e) {
  var list=getList(), found=false;
  list=list.map(function(q){ if(q.id===e.id){ found=true; return e; } return q; });
  if(!found) list.unshift(e);
  try{ localStorage.setItem('darla_list',JSON.stringify(list)); }catch(ex){}
}
function delQ(i,ev) {
  ev.stopPropagation();
  var e=_qFiltered[i]; if(!e) return;
  if(!confirm('Delete '+e.id+' for '+e.name+'?')) return;
  try{ localStorage.setItem('darla_list',JSON.stringify(getList().filter(function(q){ return q.id!==e.id; }))); }catch(ex){}
  _qFiltered.splice(i,1);
  _qAll=_qAll.filter(function(q){ return q.id!==e.id; });
  drawQList(_qFiltered,false);
  showToast('Deleted '+e.id);
  // Delete from Firestore (manager+ permission enforced by security rules)
  var user=AUTH.currentUser;
  if(user && !user.isAnonymous){
    DB.collection('quotes').doc(e.id).delete().catch(function(err){
      showToast('Could not delete from cloud: '+err.message);
    });
  }
}

// MODALS + TOAST
// ═══════════════════════════════════════════════════════════
function openModal(id)  { document.getElementById(id).classList.add('open'); }
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function showToast(msg) {
  var t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(function(){ t.classList.remove('show'); },2500);
}
</script>
